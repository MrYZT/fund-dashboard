// API: 历史净值 (F10DataApi) + 实时估算 (并行批量)
// F10DataApi: 返回仅指定日期范围数据，~7KB/只 (vs pingzhongdata ~300KB/只)
// 无 Referer 限制，涨跌幅直接提供，数据更完整准确
// ============================================================
const BATCH_SIZE = 6; // 并发批量大小

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- 历史净值: F10DataApi (东方财富历史净值接口) ----

async function fetchHistory(code, startDate, endDate) {
  const MAX_RETRIES = 2;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      // 第1页
      const page1 = await _fetchHistoryF10(code, startDate, endDate, 1);
      if (page1 === null || page1.records.length === 0) {
        if (attempt < MAX_RETRIES) { await sleep(300); continue; }
        return null;
      }
      let allRecords = [...page1.records];
      // 如果有多页，继续获取后续页
      if (page1.totalPages > 1) {
        for (let p = 2; p <= page1.totalPages; p++) {
          await sleep(100); // 避免请求过快
          const pageN = await _fetchHistoryF10(code, startDate, endDate, p);
          if (pageN && pageN.records.length > 0) {
            allRecords = allRecords.concat(pageN.records);
          }
        }
      }
      console.log(`[fetchHistory] ${code} 成功获取 ${allRecords.length} 条 (共${page1.totalPages}页, F10DataApi)`);
      return allRecords;
    } catch(e) {
      console.warn(`[fetchHistory] ${code} 第${attempt}次失败: ${e.message}`);
      if (attempt < MAX_RETRIES) await sleep(300);
      else return null;
    }
  }
  return null;
}

async function _fetchHistoryF10(code, startDate, endDate, page) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${code}&page=${page}&sdate=${startDate}&edate=${endDate}&per=20`;
    let done = false;
    const timeout = setTimeout(() => {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error('F10DataApi timeout'));
    }, 10000);

    function cleanup() {
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
      delete window.apidata;
    }

    script.onload = () => {
      if (done) return;
      done = true;
      try {
        const raw = window.apidata;
        if (!raw) { cleanup(); resolve(null); return; }
        const totalPages = raw.pages || 1;
        const totalRecords = raw.records || 0;
        if (!raw.content || totalRecords === 0) { cleanup(); resolve(null); return; }
        // 解析 HTML 表格提取日期、净值、涨跌幅
        const tmp = document.createElement('div');
        tmp.innerHTML = raw.content;
        const rows = tmp.querySelectorAll('tbody tr');
        const records = [];
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length >= 4) {
            const date = cells[0].textContent.trim();                         // 2026-06-15
            const nav = cells[1].textContent.trim();                           // 1.5616
            const changeRate = cells[3].textContent.trim().replace('%', '');   // 0.26
            if (date && nav) records.push({ FSRQ: date, DWJZ: nav, JZZZL: changeRate });
          }
        });
        cleanup();
        resolve({ records, totalPages, totalRecords, page });
      } catch(e) { cleanup(); reject(e); }
    };

    script.onerror = () => {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error('F10DataApi load error'));
    };

    document.head.appendChild(script);
  });
}

// ============================================================
const HOLDINGS_CACHE_KEY = 'fund_holdings_cache_v1';
const HOLDINGS_TTL = 7 * 24 * 60 * 60 * 1000; // 7天缓存

function getHoldingsCache() {
  try { return JSON.parse(localStorage.getItem(HOLDINGS_CACHE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function setHoldingsCache(c) { localStorage.setItem(HOLDINGS_CACHE_KEY, JSON.stringify(c)); }

// 获取当前季度年份参数 {year, month}
function _jjccYearMonth() {
  const now = bjNow();
  const y = now.getUTCFullYear();
  const m = now.getUTCMonth() + 1; // 1-12
  // 季度末月份: 3月→Q1, 6月→Q2, 9月→Q3, 12月→Q4
  // 如果当前月 <= 3，取去年Q4数据（当年Q1可能还没公布）
  // 基金季报通常在季度结束15个交易日内公布
  const quarterEndMonth = m <= 3 ? 12 : m <= 6 ? 3 : m <= 9 ? 6 : 9;
  const useYear = m <= 3 ? y - 1 : y;
  return { year: useYear, month: quarterEndMonth };
}

// 抓取单只基金前10大重仓股
async function fetchFundHoldings(code) {
  const { year, month } = _jjccYearMonth();
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = `https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jjcc&code=${code}&topline=10&year=${year}&month=${String(month).padStart(2,'0')}`;
    let done = false;
    const timeout = setTimeout(() => {
      if (done) return;
      done = true;
      _cleanupHoldingScript(script);
      resolve(null);
    }, 10000);

    script.onload = () => {
      if (done) return;
      done = true;
      try {
        const raw = window.apidata;
        _cleanupHoldingScript(script);
        if (!raw || !raw.content) { resolve(null); return; }
        // 解析 HTML 表格
        const tmp = document.createElement('div');
        tmp.innerHTML = raw.content;
        const rows = tmp.querySelectorAll('tbody tr');
        const stocks = [];
        // 提取报告日期
        let reportDate = '';
        const dateMatch = raw.content.match(/截止至[：:]?\s*<font[^>]*>(\d{4}-\d{2}-\d{2})<\/font>/);
        if (dateMatch) reportDate = dateMatch[1];

        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length >= 7) {
            const stockCode = cells[1]?.textContent.trim() || '';
            const stockName = cells[2]?.textContent.trim() || '';
            const pctText = cells[6]?.textContent.trim().replace('%','') || '0';
            const pct = parseFloat(pctText);
            if (stockName) stocks.push({ code: stockCode, name: stockName, pct: isNaN(pct) ? 0 : pct });
          }
        });
        resolve({ stocks, reportDate, fetchTime: Date.now() });
      } catch(e) {
        console.warn(`[fetchFundHoldings] ${code} 解析失败:`, e);
        resolve(null);
      }
    };

    script.onerror = () => {
      if (done) return;
      done = true;
      _cleanupHoldingScript(script);
      resolve(null);
    };

    document.head.appendChild(script);
  });
}

function _cleanupHoldingScript(script) {
  try { document.head.removeChild(script); } catch(e) {}
  delete window.apidata;
}

    '环保': ['环保', '低碳', '绿色'],
    '安全': ['安全', '战略', '国防']
  };

  // 1. 从基金名称匹配
  for (const [dir, keywords] of Object.entries(dirMap)) {
    for (const kw of keywords) {
      if (name.includes(kw)) return dir;
    }
  }

  // 2. 从重仓股名称推断
  if (holdings && holdings.stocks) {
    const stockNames = holdings.stocks.map(s => s.name).join('');
    // 检查常见重仓股行业特征
    if (/新易盛|中际旭创|光迅|亨通|中天|太辰光|天孚/.test(stockNames)) return '通信';
    if (/宁德|比亚迪|隆基|阳光|通威|天合|晶澳|派能/.test(stockNames)) return '新能源';
    if (/中芯|北方华创|韦尔|兆易|长电|通富|华天|紫光/.test(stockNames)) return '半导体';
    if (/恒瑞|药明|迈瑞|爱尔|通策|百济|信达/.test(stockNames)) return '医药';
    if (/贵州茅台|五粮液|泸州老窖|伊利|海天|海底捞/.test(stockNames)) return '消费';
    if (/招商银行|兴业银行|中信证券|东方财富|中国平安/.test(stockNames)) return '金融';
    if (/中航|航发|航天|洪都|沈飞|成飞/.test(stockNames)) return '军工';
    if (/科大讯飞|寒武纪|海光|浪潮|紫光|中科曙光/.test(stockNames)) return '人工智能';
  }

  // 3. 从基金名称的"混合"/"股票"等类型推断
  if (name.includes('混合')) return '混合';
  if (name.includes('股票')) return '股票';

  return '综合';
}

// fundgz.1234567.com.cn 固定回调名 jsonpgz
// 通过全局回调 + fundcode 路由实现并行获取（每批6只）

const _estCallbacks = {};

// 全局 jsonpgz 回调 - 按 fundcode 路由到对应的 Promise
window.jsonpgz = function(data) {
  if (data && data.fundcode && _estCallbacks[data.fundcode]) {
    const cb = _estCallbacks[data.fundcode];
    delete _estCallbacks[data.fundcode];
    cb(data);
  }
};

async function fetchEstimatesBatch(fundCodes) {
  const results = {};
  for (let i = 0; i < fundCodes.length; i += BATCH_SIZE) {
    const batch = fundCodes.slice(i, i + BATCH_SIZE);
    const promises = batch.map(code => new Promise((resolve) => {
      const script = document.createElement('script');
      script.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
      const cleanup = () => { try { document.head.removeChild(script); } catch(e) {} };
      const timer = setTimeout(() => { delete _estCallbacks[code]; resolve(null); cleanup(); }, 8000);
      _estCallbacks[code] = (data) => { clearTimeout(timer); resolve(data); cleanup(); };
      script.onerror = () => { delete _estCallbacks[code]; clearTimeout(timer); resolve(null); cleanup(); };
      document.head.appendChild(script);
    }));
    const batchResults = await Promise.all(promises);
    batch.forEach((code, j) => { results[code] = batchResults[j]; });
    if (i + BATCH_SIZE < fundCodes.length) await sleep(50);
  }
  return results;
}

let displayDates = [];
let sortCol = 'score';     // 当前排序列（默认：总评分降序）
let sortDir = 'desc';    // 排序方向: asc / desc

// 计算某基金从4/27到当天的盈利天数/亏损天数
function calcUpDownDays(f) {
  const cache = getCache();
  const today = todayKey();
  let up = 0, dn = 0;
  DATES.forEach((d) => {
    if (normDate(d) > normDate(today)) return;
    let v = cache[cacheKey(f.code, d)];
    if (v === undefined) {
      const seedIdx = SEED_DATE_MAP[normDate(d)];
      if (seedIdx !== undefined) v = f.dr[seedIdx];
    }
    if (v == null) return;  // 跳过无数据日期
    if (v > 0) up++;
    else if (v < 0) dn++;
  });
  return { up, dn };
}

// 动态计算平均日收益：总收益率 / 盈亏总天数
function calcAvgDailyReturn(f) {
  const dynRet = calcRet(f);
  if (dynRet === null) return null;
  const ud = calcUpDownDays(f);
  const totalDays = ud.up + ud.dn;
  if (totalDays === 0) return null;
  return dynRet / totalDays;
}

// 对基金列表排序（仅活跃基金）
function getSortedFunds() {
  const list = [...getAccountFunds()];
  const cache = getCache();
  const today = todayKey();
  
  const valFn = (f) => {
    switch (sortCol) {
      case 'seq': return f.seq;
      case 'name': return f.name;
      case 'mark': return getFundMark(f.code) || '';
      case 'code': return f.code;
      case 'dir': return inferFundDirection(f.name, getFundHoldings(f.code));
      case 'ret': {
        const dynRet = calcRet(f);
        return dynRet !== null ? dynRet : (f.sumR || 0);
      }
      case 'sharpe': return calcSharpe(f.code, cache) ?? null;
      case 'maxdd': return calcMaxDrawdown(f, getNavCache(), cache) ?? null;
      case 'recovery': return calcRecoveryDays(f, getNavCache(), cache) ?? null;
      case 'calmar': return calcCalmar(f, getNavCache(), cache) ?? null;
      case 'vol': return calcVolatility(f.code, cache) ?? null;
      case 'winrate': return calcWinRate(f.code, cache) ?? null;
      case 'score': return calcTotalScore(f, cache, getNavCache()).total ?? null;
      case 'amount': return f.amount ?? 0;
      case 'buy': return f.buy ?? null;
      case 'def': return f.def ?? null;
      case 'avg': return calcAvgDailyReturn(f) ?? null;
      case 'upDays': return calcUpDownDays(f).up;
      case 'dnDays': return calcUpDownDays(f).dn;
      case 'todayGain': {
        const amt = getFundAmount(f.code, currentAccountId);
        const tv = cache[cacheKey(f.code, bjTodayKey())];
        return (amt > 0 && tv != null) ? amt * tv / 100 : null;
      }
      default: {
        const v = cache[cacheKey(f.code, sortCol)];
        return v ?? null;
      }
    }
  };
  
  list.sort((a, b) => {
    const va = valFn(a), vb = valFn(b);
    // 处理字符串排序
    if (typeof va === 'string' && typeof vb === 'string') {
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    // 数字排序，null/undefined 排最后
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  
  return list;
}

function buildDisplayDates() {
  displayDates = [...DATES];
  const today = todayKey();
  if (!displayDates.some(d => normDate(d) === normDate(today))) {
    displayDates.push(today);
  }
  // 从缓存中找出 DATES 之外的新日期（如 5/28 历史数据已拉取），按日期排序插入
  const cache = getCache();
  const seen = new Set(displayDates.map(d => normDate(d)));
  const extraDates = [];
  FUNDS.forEach(f => {
    Object.keys(cache).forEach(k => {
      const prefix = f.code + '__';
      if (k.startsWith(prefix)) {
        const d = k.substring(prefix.length);
        const nd = normDate(d);
        if (!seen.has(nd)) {
          seen.add(nd);
          extraDates.push(d);
        }
      }
    });
  });
  // 去重排序：按 M/D 解析后排序
  const parseMD = s => { const [m,d]=s.split('/'); return parseInt(m)*100+parseInt(d); };
  extraDates.sort((a,b) => parseMD(a)-parseMD(b));
  // 插入到合适位置（today 之前，DATES 末尾之后）
  displayDates = [...DATES];
  extraDates.forEach(d => {
    if (!displayDates.some(dd => normDate(dd) === normDate(d))) {
      displayDates.push(d);
    }
  });
  if (!displayDates.some(d => normDate(d) === normDate(today))) {
    displayDates.push(today);
  }
  // 最终按日期降序排列（最新日期在左）
  displayDates.sort((a,b) => parseMD(b)-parseMD(a));
}

    <th class="${sortCls('todayGain')}" style="min-width:72px" onclick="setSort('todayGain')" title="当前持仓金额×今日涨跌幅/100，需已设置持仓金额">今日<span style="font-size:10px;color:var(--muted)">收益</span></th>
  `;
  const dateThs = displayDates.map(d => {
    const nd = normDate(d);
    const isToday = nd === todayN;
    return `<th class="date-col sortable${isToday?' today':''} ${sortCls(d)}" style="min-width:54px" onclick="setSort('${d}')">${fmtDate(d)}${isToday?'<br><span style="font-size:9px">今日</span>':''}</th>`;
  }).join('');
  document.getElementById('thead').innerHTML = `<tr>${fixedThs}${dateThs}</tr>`;
  
  // Rows (sorted)
  const sorted = getSortedFunds();
  const navCacheAll = getNavCache();
  const rows = sorted.map(f => {
    // 动态总收益率：优先用净值缓存计算，否则用固定sumR
    const dynRet = calcRet(f);
    const retVal = dynRet !== null ? dynRet : f.sumR;
    const retCls = retVal >= 0 ? 'total-up' : 'total-dn';
    const retSign = retVal >= 0 ? '+' : '';
    
    // 净值来源标注
    const navEntry = getLatestNavFromCache(f.code);
    const navTip = navEntry ? `title="净值日期: ${navEntry.date} | 净值: ${navEntry.nav}"` : '';
    
    // === 模型评估指标（基于缓存数据，每日自动更新） ===
    const sharpe = calcSharpe(f.code, cache);
    const maxdd = calcMaxDrawdown(f, navCacheAll, cache);
    const vol = calcVolatility(f.code, cache);
    const wr = calcWinRate(f.code, cache);
    const recovery = calcRecoveryDays(f, navCacheAll, cache);
    const calmar = calcCalmar(f, navCacheAll, cache);
    const scoreData = calcTotalScore(f, cache, navCacheAll);
    
    const sharpeHtml = sharpe !== null
      ? `<span class="${sharpe >= 1 ? 'model-good' : sharpe >= 0.5 ? 'model-mid' : 'model-bad'}">${sharpe.toFixed(2)}</span>`
      : '<span class="pct na">—</span>';
    const maxddHtml = maxdd !== null
      ? `<span class="${maxdd > -5 ? 'model-good' : maxdd > -15 ? 'model-mid' : 'model-bad'}">${maxdd.toFixed(2)}%</span>`
      : '<span class="pct na">—</span>';
    const recHtml = recovery !== null
      ? recovery > 0
        ? `<span class="${recovery <= 3 ? 'model-good' : recovery <= 10 ? 'model-mid' : 'model-bad'}">${recovery}天</span>`
        : `<span class="model-bad" title="尚未恢复，距谷底已${-recovery}天">未恢复</span>`
      : '<span class="pct na">—</span>';
    const calmarHtml = calmar !== null
      ? `<span class="${calmar >= 2 ? 'model-good' : calmar >= 1 ? 'model-mid' : 'model-bad'}">${calmar.toFixed(2)}</span>`
      : '<span class="pct na">—</span>';
    const volHtml = vol !== null
      ? `<span class="${vol < 20 ? 'model-good' : vol < 40 ? 'model-mid' : 'model-bad'}">${vol.toFixed(1)}%</span>`
      : '<span class="pct na">—</span>';
    const wrHtml = wr !== null
      ? `<span class="${wr >= 60 ? 'model-good' : wr >= 45 ? 'model-mid' : 'model-bad'}">${wr.toFixed(0)}%</span>`
      : '<span class="pct na">—</span>';

    // 总评分
    const sc = scoreData.total;
    const scoreHtml = `<span class="${sc >= 70 ? 'model-good' : sc >= 45 ? 'model-mid' : 'model-bad'}" title="夏普:${scoreData.sScore.toFixed(1)}/25 回撤:${scoreData.dScore.toFixed(1)}/20 卡尔玛:${scoreData.cScore.toFixed(1)}/15 修复:${scoreData.rScore.toFixed(1)}/20 胜率:${scoreData.wScore.toFixed(1)}/20">${sc.toFixed(0)}</span>`;

    // 持仓金额 — 点击弹窗调整，多账户管理
    const amountVal = getFundAmount(f.code, currentAccountId);
    f.amount = amountVal;
    const amountDisplay = amountVal > 0 ? '¥' + amountVal.toLocaleString('zh-CN') : '点击设置';
    const amountColor = amountVal > 0 ? 'var(--text)' : 'var(--muted)';
    const amountHtml = `<span style="cursor:pointer;color:${amountColor};font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid var(--border);background:rgba(255,255,255,0.03)" onclick="showAmountDialog('${f.code}','${f.name.replace(/'/g,'\\\'')}')">${amountDisplay}</span>`;
    
    // 盈利/亏损天数
    const ud = calcUpDownDays(f);
    const upHtml = `<span style="color:var(--red);font-weight:600">${ud.up}</span>`;
    const dnHtml = `<span style="color:var(--green);font-weight:600">${ud.dn}</span>`;
    
    // 今日收益（持仓金额 × 今日涨跌幅 / 100）
    const todayVal = cache[cacheKey(f.code, today)];
    const todayAmt = getFundAmount(f.code, currentAccountId);
    let todayGainHtml;
    if (todayAmt > 0 && todayVal != null) {
      const gain = todayAmt * todayVal / 100;
      const gainSign = gain >= 0 ? '+' : '';
      todayGainHtml = `<span style="color:${gain>=0?'var(--red)':'var(--green)'};font-weight:600">${gainSign}${gain.toFixed(1)}</span>`;
    } else if (todayAmt <= 0) {
      todayGainHtml = '<span style="color:var(--muted);font-size:11px">未持仓</span>';
    } else {
      todayGainHtml = '<span style="color:var(--muted)">—</span>';
    }
    
    const buyHtml = f.buy != null
      ? `<div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:${f.buy}%;background:${f.buy>85?'var(--red)':'var(--blue)'}"></div></div><span class="bar-num">${f.buy}</span></div>`
      : '<span style="color:var(--muted)">—</span>';
    
    const defHtml = f.def != null
      ? `<div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:${f.def}%;background:var(--green)"></div></div><span class="bar-num">${f.def}</span></div>`
      : '<span style="color:var(--muted)">—</span>';
    
    const dynAvg = calcAvgDailyReturn(f);
    const avgHtml = dynAvg != null
      ? `<span class="pct ${dynAvg>0?'up':'dn'}">${dynAvg>0?'+':''}${dynAvg.toFixed(3)}%</span>`
      : '<span class="pct na">—</span>';
    
    const tagHtml = f.tag
      ? `<span class="tag ${f.tag==='压舱石'?'tag-blue':f.tag==='波动较大'?'tag-red':'tag-orange'}">${f.tag}</span>`
      : '';
    
    // 方向与重仓股
    const holdingsData = getFundHoldings(f.code);
    const direction = inferFundDirection(f.name, holdingsData);
    let dirHoldingsHtml;
    if (holdingsData && holdingsData.stocks && holdingsData.stocks.length > 0) {
      // 按股票名称首字母（拼音）排序
      const sortedStocks = [...holdingsData.stocks].sort((a, b) => a.name.localeCompare(b.name, 'zh-Hans-CN'));
      const totalPct = sortedStocks.reduce((sum, s) => sum + s.pct, 0);
      // 列出全部重仓股票名称及各自占比，不省略，超出自动换行
      const stocksListHtml = sortedStocks.map(s =>
        `<span style="display:inline">${s.name}<span style="color:var(--text);opacity:0.7;font-size:9px;margin-left:1px">${s.pct.toFixed(1)}%</span></span>`
      ).join('、');
      dirHoldingsHtml = `<div style="cursor:pointer;padding:2px 4px;border-radius:4px;line-height:1.6;word-wrap:break-word;overflow-wrap:break-word" onclick="showHoldingsDialog('${f.code}','${f.name.replace(/'/g,'\\\'')}')" title="点击查看重仓股详情">
        <span class="tag tag-blue" style="font-size:10px;padding:1px 5px;margin-bottom:2px;display:inline-block">${direction}</span>
        <div style="font-size:10px;color:var(--muted);margin-top:1px;word-wrap:break-word;overflow-wrap:break-word">${stocksListHtml}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:1px">合计${totalPct.toFixed(1)}%</div>
      </div>`;
    } else {
      dirHoldingsHtml = `<div style="cursor:pointer;padding:2px 4px" onclick="showHoldingsDialog('${f.code}','${f.name.replace(/'/g,'\\\'')}')" title="点击获取重仓股数据">
        <span class="tag tag-blue" style="font-size:10px;padding:1px 5px">${direction}</span>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">加载中...</div>
      </div>`;
    }
    
    const dailyCells = displayDates.map(d => {
      const nd = normDate(d);
      const isToday = nd === normDate(today);
      const v = getVal(f.code, d);
      
      let inner;
      if (v === null) {
        inner = isToday
          ? `<span class="pct na" id="c_${f.code}">—</span>`
          : `<span class="pct na">—</span>`;
      } else {
        const cls = v > 0 ? 'up' : v < 0 ? 'dn' : 'zero';
        const sign = v > 0 ? '+' : '';
        inner = `<span class="pct ${cls}" id="c_${f.code}">${sign}${v.toFixed(2)}%</span>`;
      }
      return `<td${isToday?' class="today-td"':''}>${inner}</td>`;
    }).join('');
    
    return `<tr>
      <td class="name-col" style="width:180px;min-width:180px;max-width:180px;white-space:normal;word-break:break-word;overflow-wrap:break-word">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:4px">
          <div style="min-width:0;overflow:hidden;word-break:break-word">
            <div class="fname">${f.name}${tagHtml}</div>
            <div class="fcode">${f.code}</div>
          </div>
          <span style="cursor:pointer;color:var(--muted);font-size:12px;opacity:0.6;padding:2px;flex-shrink:0" onclick="removeFund('${f.code}')" title="移至回收站">✕</span>
        </div>
      </td>
      <td style="text-align:center"><span class="mark-cell" style="cursor:pointer;display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;white-space:nowrap;${(() => { const mk = getFundMark(f.code); return mk ? `background:${markBg(mk)};color:${markColor(mk)};font-weight:600` : 'color:var(--muted);opacity:0.5' })()}" onclick="showMarkDialog('${f.code}','${f.name.replace(/'/g,'\\\'')}')" title="点击设置标记">${getFundMark(f.code) || '＋'}</span></td>
      <td style="width:400px;min-width:400px;max-width:400px;overflow:hidden;white-space:normal;word-break:break-word;overflow-wrap:break-word">${dirHoldingsHtml}</td>
      <td><span class="${retCls}" id="ret_${f.code}" ${navTip}>${retSign}${retVal.toFixed(2)}%</span></td>
      <td>${sharpeHtml}</td>
      <td>${maxddHtml}</td>
      <td>${recHtml}</td>
      <td>${calmarHtml}</td>
      <td>${volHtml}</td>
      <td>${wrHtml}</td>
      <td>${scoreHtml}</td>
      <td>${amountHtml}</td>
      <td>${buyHtml}</td>
      <td>${defHtml}</td>
      <td>${avgHtml}</td>
      <td>${upHtml}</td>
      <td>${dnHtml}</td>
      <td>${todayGainHtml}</td>
      ${dailyCells}
    </tr>`;
  }).join('');
  
  document.getElementById('tbody').innerHTML = rows;
  document.getElementById('cnt').textContent = getAccountFunds().length;

  // 更新数据健康状态
  updateDataHealth();
}

// 排序切换函数
const SORT_LABELS = {
  'name': '基金名称', 'mark': '标记', 'code': '代码', 'dir': '方向与重仓', 'ret': '总收益率', 'sharpe': '夏普比率',
  'maxdd': '最大回撤', 'recovery': '修复天数', 'vol': '年化波动率', 'winrate': '胜率',
  'score': '总评分', 'amount': '持仓金额',
  'buy': '收益能力', 'def': '防守能力',
  'avg': '平均日收益', 'upDays': '盈利天数', 'dnDays': '亏损天数', 'todayGain': '今日收益', 'seq': '默认'
};

function setSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  // 更新排序信息提示
  const label = SORT_LABELS[col] || col;
  document.getElementById('sortInfo').textContent = `排序: ${label} ${sortDir==='asc'?'↑':'↓'}`;
  renderTable();
  renderCards();
}

function resetSort() {
  sortCol = 'score';
  sortDir = 'desc';
  document.getElementById('sortInfo').textContent = '';
  renderTable();
  renderCards();
}

function updateCellUI(code, date, val) {
  const nd = normDate(date);
  const todayN = normDate(todayKey());
  if (nd !== todayN) return;  // Only update today cell in real-time
  
  const el = document.getElementById(`c_${code}`);
  if (!el) return;
  const cls = val > 0 ? 'up' : val < 0 ? 'dn' : 'zero';
  const sign = val > 0 ? '+' : '';
  el.className = `pct ${cls}`;
  el.textContent = `${sign}${val.toFixed(2)}%`;
}

// 实时更新总收益率单元格
function updateRetUI(f) {
  const el = document.getElementById(`ret_${f.code}`);
  if (!el) return;
  const dynRet = calcRet(f);
  if (dynRet === null) return;
  const cls = dynRet >= 0 ? 'total-up' : 'total-dn';
  const sign = dynRet >= 0 ? '+' : '';
  el.className = cls;
  el.textContent = `${sign}${dynRet.toFixed(2)}%`;
  
  // 更新tooltip
  const navEntry = getLatestNavFromCache(f.code);
  if (navEntry) el.title = `净值日期: ${navEntry.date} | 净值: ${navEntry.nav}`;
}

// ============================================================
// 获取操作
// ============================================================
async function fetchTodayData() {
  const btn = document.getElementById('fetchTodayBtn');
  const dot = document.getElementById('statusDot');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> 获取中...';
  dot.className = 'dot loading';
  
  const today = todayKey();
  const todayN = normDate(today);
  const cache = getCache();
  const navCache = getNavCache();
  const todayISO = bjTodayISO();
  
  let ok = 0, fail = 0;
  showProg('正在获取今日估算涨跌幅...', 0);

  // 并行批量获取（每批6只，仅活跃基金）
  const codes = getActiveFunds().map(f => f.code);
  const estimates = await fetchEstimatesBatch(codes);

  getActiveFunds().forEach((f, idx) => {
    const d = estimates[f.code];
    if (d && d.gszzl !== '' && d.gszzl !== undefined) {
      const val = parseFloat(d.gszzl);
      if (!isNaN(val)) {
        cache[cacheKey(f.code, today)] = val;
        updateCellUI(f.code, today, val);
        ok++;
        // 同时存储估算净值用于实时总收益率计算
        if (d.gsz && parseFloat(d.gsz) > 0) {
          const estimatedNav = parseFloat(d.gsz);
          navCache[navCacheKey(f.code, todayISO)] = estimatedNav;
          updateRetUI(f);
        }
      } else fail++;
    } else fail++;
  });
  
  setCache(cache);
  setNavCache(navCache);
  hideProg();
  renderCards();
  renderTable();
  
  const nowT = bjNow();
  document.getElementById('updateTime').textContent =
    `更新于 ${nowT.getUTCHours()}:${String(nowT.getUTCMinutes()).padStart(2,'0')}`;
  dot.className = `dot ${fail > ok ? 'err' : 'ok'}`;
  btn.disabled = false;
  btn.innerHTML = '⟳ 获取今日涨跌幅';
  
  toast(fail === 0 
    ? `✅ 已更新全部 ${ok} 支基金今日涨跌幅及收益率` 
    : `✅ 更新 ${ok} 支 | ⚠️ ${fail} 支获取失败`, 
    fail > 0 ? 'err' : 'ok');
}

// 只获取单支基金的历史数据（用于新增基金后自动补齐）
async function fetchSingleFundHistory(fund) {
  const startDate = '2026-04-27';
  const endDate = bjTodayISO();
  const cache = getCache();
  const navCache = getNavCache();

  const hist = await fetchHistory(fund.code, startDate, endDate);
  if (!hist || hist.length === 0) {
    console.warn(`[fetchSingleFundHistory] ${fund.code} 历史数据为空`);
    return 0;
  }

  let count = 0;
  hist.forEach(item => {
    const isoDate = item.FSRQ.substring(0, 10);
    const [yyyy, mm, dd] = isoDate.split('-');
    const dk = `${parseInt(mm)}/${dd}`;
    const val = parseFloat(item.JZZZL);
    if (!isNaN(val)) {
      cache[cacheKey(fund.code, dk)] = val;
      count++;
    }
    const dwjz = parseFloat(item.DWJZ);
    if (!isNaN(dwjz)) {
      navCache[navCacheKey(fund.code, isoDate)] = dwjz;
      // 更新 sNav（4/27净值）
      if (isoDate === '2026-04-27') fund.sNav = dwjz;
    }
  });

  setCache(cache);
  setNavCache(navCache);

  // 更新 displayDates（加入新日期）
  buildDisplayDates();
  console.log(`[fetchSingleFundHistory] ${fund.code} (${fund.name}) 获取 ${count} 条历史数据`);
  return count;
}

// 补齐所有缺失历史数据的基金（任何有缺失数据的都补齐，确保所有基金数据都完整到4/27）
async function fetchMissingHistory() {
  const btn = document.getElementById('fetchTodayBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> 补齐中...';

  const cache = getCache();
  const allDates = [...DATES];
  // 找出有任何缺失数据的基金（覆盖率 < 100% 即补齐）
  const missing = getActiveFunds().filter(f => {
    const missingDates = allDates.filter(d => cache[cacheKey(f.code, d)] === undefined);
    return missingDates.length > 0;
  });

  if (missing.length === 0) {
    toast('✅ 所有基金历史数据完整', 'ok');
    btn.disabled = false;
    btn.innerHTML = '⟳ 获取今日涨跌幅';
    return;
  }

  showProg(`补齐 ${missing.length} 支基金历史数据...`, 0);
  let ok = 0, fail = 0;
  for (let i = 0; i < missing.length; i++) {
    showProg(`补齐 ${missing[i].name.substring(0,8)}... (${i+1}/${missing.length})`, Math.round((i/missing.length)*100));
    try {
      const count = await fetchSingleFundHistory(missing[i]);
      if (count > 0) ok++; else fail++;
    } catch(e) {
      fail++;
      console.error(`[fetchMissingHistory] ${missing[i].code} 失败:`, e.message);
    }
  }
  hideProg();
  renderAll();
  btn.disabled = false;
  btn.innerHTML = '⟳ 获取今日涨跌幅';
  toast(fail === 0
    ? `✅ 已补齐 ${ok} 支基金历史数据`
    : `✅ 补齐 ${ok} 支 | ⚠️ ${fail} 支失败`,
    fail > 0 ? 'err' : 'ok');
}

async function fetchAllHistory({ autoFetchToday = true, force = false } = {}) {
  const btn = document.getElementById('fetchTodayBtn');
  const dot = document.getElementById('statusDot');
  btn.disabled = true;
  dot.className = 'dot loading';

  const endDate = bjTodayISO();
  const startDate = '2026-04-27';

  const cache = getCache();
  const navCache = getNavCache();
  let updated = 0, yesterdayUpdated = 0, failedFunds = [];

  // 计算昨天日期 (M/D 格式)，用北京时间避免 UTC 偏移
  const yesterdayBJ = new Date(bjNow().getTime() - 86400 * 1000);
  const yesterdayKeyStr = `${yesterdayBJ.getUTCMonth()+1}/${yesterdayBJ.getUTCDate()}`;

  // ---- 增量缓存：检查哪些基金需要更新 ----
  const lastTradingDay = getLastTradingDay();
  const allDates = [...DATES]; // 统计区间内所有交易日
  const fundsToFetch = force ? getActiveFunds() : getActiveFunds().filter(f => {
    // 检查最近交易日是否有数据
    if (cache[cacheKey(f.code, lastTradingDay)] === undefined) return true;
    // 检查是否有任何缺失日期（只要缺1天就补齐）
    const missingCount = allDates.filter(d => cache[cacheKey(f.code, d)] === undefined).length;
    if (missingCount > 0) return true;
    return false;
  });

  if (fundsToFetch.length === 0 && !force) {
    console.log('[fetchAllHistory] 所有基金最近交易日数据完整，跳过历史获取');
    hideProg();
    btn.disabled = false;
    dot.className = 'dot ok';
    document.getElementById('dataHealth').textContent = '✅ 数据已是最新';
    document.getElementById('dataHealth').style.color = 'var(--green)';
    if (autoFetchToday) setTimeout(() => fetchTodayData(), 300);
    return;
  }

  console.log(`[fetchAllHistory] 需要更新 ${fundsToFetch.length}/${FUNDS.length} 支基金`);
  showProg(`正在补全历史净值数据（${fundsToFetch.length}支）...`, 0);

  for (let i = 0; i < fundsToFetch.length; i++) {
    const f = fundsToFetch[i];
    showProg(`补全 ${f.name.substring(0,8)}... (${i+1}/${fundsToFetch.length})`, Math.round((i/fundsToFetch.length)*100));

    try {
      const hist = await fetchHistory(f.code, startDate, endDate);
      if (hist && hist.length > 0) {
        hist.forEach(item => {
          const isoDate = item.FSRQ.substring(0, 10); // YYYY-MM-DD
          // 直接从字符串解析，完全避免 Date 对象时区问题
          const [yyyy, mm, dd] = isoDate.split('-');
          const dk = `${parseInt(mm)}/${dd}`; // M/DD 格式，如 6/10

          // 存涨跌幅（允许覆盖，确保最新数据）
          const val = parseFloat(item.JZZZL);
          if (!isNaN(val)) {
            const k = cacheKey(f.code, dk);
            const wasUndef = cache[k] === undefined;
            cache[k] = val;
            if (wasUndef) updated++;
            if (dk === yesterdayKeyStr) yesterdayUpdated++;
          }

          // 存净值（总是用最新值覆盖）
          const dwjz = parseFloat(item.DWJZ);
          if (!isNaN(dwjz)) {
            navCache[navCacheKey(f.code, isoDate)] = dwjz;
          }
        });
      } else {
        failedFunds.push(f.code);
        console.warn(`[fetchAllHistory] ${f.code} (${f.name}) 历史数据为空`);
      }
    } catch(e) {
      failedFunds.push(f.code);
      console.error(`[fetchAllHistory] ${f.code} 获取失败:`, e.message);
    }
  }

  // 确保昨天日期在 displayDates 中
  if (!displayDates.some(d => normDate(d) === normDate(yesterdayKeyStr))) {
    displayDates.push(yesterdayKeyStr);
    displayDates.sort((a,b) => {
      const pa = (s => {const [m,d]=s.split('/');return parseInt(m)*100+parseInt(d);})(a);
      const pb = (s => {const [m,d]=s.split('/');return parseInt(m)*100+parseInt(d);})(b);
      return pa - pb;
    });
  }

  // 数据验证：检查最近3个交易日是否有数据
  const recentDates = DATES.filter(d => normDate(d) <= normDate(lastTradingDay)).slice(-3);
  let missingRecent = 0;
  recentDates.forEach(d => {
    let hasAny = false;
    getActiveFunds().forEach(f => {
      if (cache[cacheKey(f.code, d)] !== undefined) hasAny = true;
    });
    if (!hasAny) missingRecent++;
  });

  setCache(cache);
  setNavCache(navCache);

  // 记录最后更新时间
  try {
    localStorage.setItem('fund_last_fetch', new Date().toISOString());
  } catch(e) {}

  renderCards();
  renderTable();
  buildDisplayDates();
  renderTable();
  hideProg();

  dot.className = failedFunds.length > FUNDS.length / 2 ? 'dot err' : 'dot ok';
  btn.disabled = false;

  // 反馈信息
  const yMsg = yesterdayUpdated > 0 ? ` 含昨日 ${yesterdayKeyStr} 共${yesterdayUpdated}条` : '';
  if (failedFunds.length === 0) {
    toast(`📅 历史数据补全完成，新增 ${updated} 条涨跌幅记录${yMsg}`, 'ok');
  } else if (failedFunds.length < FUNDS.length) {
    toast(`⚠️ ${failedFunds.length} 支基金历史数据获取失败，其余 ${updated} 条已更新${yMsg}`, 'err');
  } else {
    toast(`❌ 全部基金历史数据获取失败！可能网络受限，请检查后重试`, 'err');
  }

  // 数据缺失警告
  if (missingRecent > 0) {
    setTimeout(() => {
      toast(`⚠️ 最近 ${missingRecent} 个交易日数据缺失，可点击「补全历史数据」重试`, 'err');
    }, 5000);
  }

  console.log(`[fetchAllHistory] 完成: 更新${updated}条, 失败${failedFunds.length}支, 最近交易日数据缺失${missingRecent}天`);

  // 历史数据拉完后，自动获取今日实时估算（由调用方控制）
  if (autoFetchToday) {
    // 确保按钮可用才触发今日获取
    setTimeout(() => {
      if (!document.getElementById('fetchTodayBtn').disabled) {
        fetchTodayData();
      }
    }, 600);
  }
}

// ============================================================
// UI 工具
// ============================================================
function updateDataHealth() {
  const cache = getCache();
  const lastTradingDay = getLastTradingDay();
  const recentDates = DATES.filter(d => normDate(d) <= normDate(lastTradingDay)).slice(-5);
  let filled = 0;
  recentDates.forEach(d => {
    let hasAny = false;
    getActiveFunds().forEach(f => {
      if (cache[cacheKey(f.code, d)] !== undefined) hasAny = true;
    });
    if (hasAny) filled++;
  });
  const healthEl = document.getElementById('dataHealth');
  if (!healthEl) return;
  if (filled === recentDates.length) {
    healthEl.textContent = `✅ 近${recentDates.length}日数据完整`;
    healthEl.style.color = 'var(--green)';
  } else {
    healthEl.textContent = `⚠️ 近${recentDates.length}日仅${filled}日有数据`;
    healthEl.style.color = '#f0883e';
  }
}

function showProg(txt, pct) {
  const el = document.getElementById('progOverlay');
  el.className = 'progress-overlay show';
  document.getElementById('progText').textContent = txt;
  document.getElementById('progBar').style.width = pct + '%';
}
function hideProg() {
  document.getElementById('progOverlay').className = 'progress-overlay';
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 4000);
}

// ============================================================
// 启动
// ============================================================

// 判断当前是否在交易时间（北京时间 工作日 9:00-15:00）
function isTradingTime() {
  const d = bjNow();
  const day = d.getUTCDay();
  if (day === 0 || day === 6) return false;
  const h = d.getUTCHours();
  const m = d.getUTCMinutes();
  const t = h * 60 + m;
  return t >= 9 * 60 && t < 15 * 60;
}

// 自动刷新定时器
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => {
    if (isTradingTime()) {
      console.log('[AutoRefresh] 交易时间自动刷新...');
      fetchTodayData();
    }
  }, 5 * 60 * 1000); // 每5分钟
}

// 获取最近一个交易日（向前查找，使用北京时间）
function getLastTradingDay() {
  const d = bjNow();
  for (let i = 0; i < 7; i++) {
    const day = d.getUTCDay();
    const iso = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      return normDate(`${d.getUTCMonth()+1}/${d.getUTCDate()}`);
    }
    d.setUTCDate(d.getUTCDate() - 1);
  }
  return todayKey();
}

async function init() {
  // 迁移旧格式持仓金额（fund_amount_* → fund_acc_amount_*）
  migrateOldAmounts();
  // 从 localStorage 恢复自定义基金
  loadCustomFunds();
  // 初始化统计起始日期选择器
  const dateInput = document.getElementById('statStartDate');
  if (dateInput) dateInput.value = STAT_START_ISO;

  initCache();
  buildDisplayDates();
  updateTokenStatus();
  renderAccountBar();
  renderCards();
  renderTable();

  // 自动获取数据：增量缓存 + 并行估值
  setTimeout(async () => {
    toast('🔄 正在自动获取最新数据...', '');
    // 如果有 GitHub Token，先从云端拉取持仓数据
    if (getGhToken()) {
      try { await cloudPull(); } catch(e) { console.error('[init] cloudPull error:', e); }
    }
    try {
      await fetchAllHistory({ autoFetchToday: false });
      settlePendingDividends(); // 历史数据加载完成后结算每日分红
    } catch(e) {
      console.error('[init] fetchAllHistory 出错:', e);
      toast('⚠️ 自动获取数据失败，请尝试手动点击按钮', 'err');
    }
    setTimeout(() => {
      try { fetchTodayData(); } catch(e) {
        console.error('[init] fetchTodayData 出错:', e);
      }
    }, 300);
    // 异步抓取重仓股数据（不阻塞主流程）
    setTimeout(() => {
      try { fetchAllHoldings(); } catch(e) {
        console.error('[init] fetchAllHoldings 出错:', e);
      }
    }, 2000);
  }, 500);

  // 启动交易时间自动刷新
  startAutoRefresh();
}

window.addEventListener('load', init);
</script>
