<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>基金表现统计看板</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --red: #f85149;
  --green: #3fb950;
  --red-bg: rgba(248,81,73,0.12);
  --green-bg: rgba(63,185,80,0.12);
  --blue: #58a6ff;
  --hover: rgba(31,39,51,0.8);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
}
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 11px; color: var(--muted); }
.actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #21262d;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn:hover { border-color: var(--blue); background: rgba(88,166,255,0.08); }
.btn.primary { background: #1f6feb; border-color: #1f6feb; }
.btn.primary:hover { background: #388bfd; border-color: #388bfd; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
.dot.ok { background: var(--green); }
.dot.err { background: var(--red); }
.dot.loading { background: #f0883e; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main { padding: 14px 16px; overflow-x: auto; }
.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 14px;
  min-width: 800px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.card-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.card-val { font-size: 20px; font-weight: 700; }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: auto;
  max-height: calc(100vh - 260px);
}
.table-caption {
  padding: 8px 14px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: rgba(88,166,255,0.03);
  display: flex;
  align-items: center;
  gap: 8px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
}
thead th {
  background: #1c2128;
  color: var(--muted);
  font-weight: 500;
  padding: 8px 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
th.name-col {
  text-align: left;
  min-width: 200px;
  position: sticky;
  left: 0;
  z-index: 20;
  background: #1c2128;
  border-right: 1px solid var(--border);
}
th.today { background: #1a2535; color: var(--blue); }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { background: #252d3a; color: #c9d1d9; }
th.sort-asc, th.sort-desc { color: var(--blue); }
th.sort-asc::after { content: " ▲"; font-size: 9px; }
th.sort-desc::after { content: " ▼"; font-size: 9px; }
th.fixed-th { position: sticky; z-index: 11; background: #1c2128; }
th.fixed-th.name-col { z-index: 21; }
.sort-reset { cursor: pointer; font-size: 11px; color: var(--muted); margin-left: 8px; }
.sort-reset:hover { color: var(--text); }
tbody tr { border-bottom: 1px solid rgba(48,54,61,0.5); }
tbody tr:hover { background: var(--hover); }
tbody tr:last-child { border-bottom: none; }
td {
  padding: 8px 10px;
  text-align: center;
  vertical-align: middle;
}
td.name-col {
  text-align: left;
  position: sticky;
  left: 0;
  background: var(--card);
  z-index: 5;
  border-right: 1px solid var(--border);
}
tbody tr:hover td.name-col { background: rgba(22,27,34,0.95); }
.fname { font-weight: 500; }
.fcode { display: inline-block; font-size: 10px; color: var(--muted); background: #21262d; padding: 1px 5px; border-radius: 3px; margin-top: 2px; }
.tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
  vertical-align: middle;
}
.tag-blue { background: rgba(88,166,255,0.12); color: var(--blue); }
.tag-orange { background: rgba(240,136,62,0.12); color: #f0883e; }
.tag-red { background: var(--red-bg); color: var(--red); }

.pct {
  display: inline-block;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 11.5px;
  min-width: 52px;
  text-align: center;
}
.up { color: var(--red); background: var(--red-bg); }
.dn { color: var(--green); background: var(--green-bg); }
.zero { color: var(--muted); }
.na { color: var(--muted); font-style: italic; font-weight: 400; background: none; }
.total-up { color: var(--red); font-weight: 700; font-size: 13px; }
.total-dn { color: var(--green); font-weight: 700; font-size: 13px; }

/* 模型评估列样式 */
.model-good { color: var(--red); font-weight: 700; }
.model-mid  { color: #f0883e; font-weight: 600; }
.model-bad  { color: var(--green); font-weight: 600; }
th.model-col { font-size: 11px; cursor: help; }
th.model-col:hover { color: var(--blue); }
.model-wrap { display: inline-block; text-align: center; min-width: 52px; }
.model-sub { font-size: 9px; color: var(--muted); font-weight: 400; display: block; line-height: 1; margin-top: 1px; }

td.today-td { background: rgba(88,166,255,0.04); }

.bar-wrap { display: flex; align-items: center; gap: 5px; justify-content: center; }
.bar { flex: 1; max-width: 55px; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-num { font-size: 11px; color: var(--text); min-width: 26px; text-align: right; }

.amount-input {
  width: 72px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  padding: 3px 5px;
  text-align: right;
  outline: none;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.amount-input::-webkit-inner-spin-button,
.amount-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.amount-input:focus { border-color: var(--blue); background: rgba(88,166,255,0.06); }
.amount-input::placeholder { color: var(--muted); font-size: 10px; }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12px;
  z-index: 999;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-width: 340px;
}
.toast.show { display: block; animation: toastIn 0.25s ease; }
.toast.ok { border-color: var(--green); }
.toast.err { border-color: var(--red); }
@keyframes toastIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }

.progress-overlay {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 12px;
  z-index: 998;
  display: none;
  min-width: 260px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.progress-overlay.show { display: block; }
.prog-bar-outer { background: rgba(255,255,255,0.08); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
.prog-bar-inner { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.3s; }

/* 账户切换 tab 栏 */
.account-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 8px 16px;
  background: rgba(22,27,34,0.6);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.account-tab {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  white-space: nowrap;
}
.account-tab:hover { border-color: var(--blue); color: var(--text); }
.account-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
.account-tab.manage { border-style: dashed; color: var(--muted); }
.account-tab.manage:hover { border-color: var(--blue); color: var(--blue); }

/* 日期选择器 */
.date-picker-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.date-picker-wrap input[type="date"] {
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  outline: none;
  cursor: pointer;
  color-scheme: dark;
}
.date-picker-wrap input[type="date"]:hover { border-color: var(--blue); }
.date-picker-wrap input[type="date"]:focus { border-color: var(--blue); }
.date-picker-reset {
  cursor: pointer;
  color: var(--muted);
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 4px;
}
.date-picker-reset:hover { color: var(--text); }

/* 弹窗通用 */
.modal-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 420px;
  max-width: 92vw;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 600; margin: 0 0 16px; color: var(--text); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* 账户金额输入行 */
.acc-amount-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0; border-bottom: 1px solid rgba(48,54,61,0.6);
}
.acc-amount-row:last-child { border-bottom: none; }
.acc-name-badge {
  display: inline-block;
  background: rgba(88,166,255,0.12);
  color: var(--blue);
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  min-width: 70px;
  text-align: center;
}
.acc-amount-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  text-align: right;
}
.acc-amount-input:focus { border-color: var(--blue); }
.acc-total-hint { font-size: 11px; color: var(--muted); white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 基金表现统计看板</h1>
    <div class="header-sub" id="headerSub">东方财富 · 每5分钟自动刷新</div>
  </div>
  <div class="actions">
    <div class="date-picker-wrap">
      <span>统计起始</span>
      <input type="date" id="statStartDate" value="2026-04-27" min="2026-04-27" onchange="onStatStartChange(this.value)">
      <span class="date-picker-reset" onclick="resetStatStart()" title="恢复默认4/27">↺</span>
    </div>
    <span id="updateTime" style="font-size:11px;color:var(--muted)">—</span>
    <span class="dot" id="statusDot"></span>
    <span id="dataHealth" style="font-size:10px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="btn" onclick="showAddFundDialog()">➕ 添加基金</button>
    <button class="btn" onclick="showRecycleBin()">🗑️ 回收站</button>
    <button class="btn" onclick="cloudPull()">☁️ 拉取</button>
    <button class="btn" onclick="cloudPush()">☁️ 推送</button>
    <button class="btn" onclick="showCloudSettings()">⚙️ 云同步</button>
    <button class="btn" onclick="fetchAllHistory({force:true})">📅 补全历史数据</button>
    <button class="btn primary" id="fetchTodayBtn" onclick="fetchTodayData()">⟳ 获取今日涨跌幅</button>
  </div>
</div>

<!-- 账户切换栏 -->
<div class="account-bar" id="accountBar"></div>

<div class="main">
  <div class="cards" id="cards"></div>
  <div class="table-wrap">
    <div class="table-caption">
      <span>📋 持仓基金列表 · 共 <b id="cnt">0</b> 支</span>
      <span id="sortInfo" style="margin-left:12px;font-size:10px;color:var(--muted)"></span>
      <span style="margin-left:auto" id="sortResetWrap" class="sort-reset" onclick="resetSort()" title="恢复默认排序">↺ 默认排序</span>
      <span style="margin-left:8px;margin-right:0">收益能力/防守能力：越高越好（满分100）</span>
    </div>
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="progress-overlay" id="progOverlay">
  <div id="progText">正在获取数据...</div>
  <div class="prog-bar-outer"><div class="prog-bar-inner" id="progBar" style="width:0%"></div></div>
</div>

<script>
// ============================================================
// 基础数据（来自Excel）
// ============================================================

// ============================================================
// 北京时间工具函数（所有日期计算统一使用，避免时区问题）
// ============================================================
function bjNow() {
  // 返回一个 Date 对象，其 UTC 表示 = 当前北京时间
  return new Date(Date.now() + 8 * 3600 * 1000);
}
function bjTodayKey() {
  // 返回今天北京时间，格式 M/DD
  const d = bjNow();
  return `${d.getUTCMonth()+1}/${String(d.getUTCDate()).padStart(2,'0')}`;
}
function bjTodayISO() {
  // 返回今天北京时间，格式 YYYY-MM-DD
  const d = bjNow();
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

// ============================================================
// 统计起始日期（可由用户通过日期选择器修改）
// 默认 2026-04-27，修改后影响 getDailyReturns/getNavSeries/DATES 切片
// ============================================================
let STAT_START_ISO = localStorage.getItem('stat_start_date') || '2026-04-27';

function isoToMD(iso) {
  // '2026-04-27' → '4/27'
  const [,mm,dd] = iso.split('-');
  return `${parseInt(mm)}/${dd}`;
}
function mdToISO(md) {
  // '4/27' → '2026-04-27'
  const [m, d] = md.split('/');
  return `2026-${String(parseInt(m)).padStart(2,'0')}-${String(parseInt(d)).padStart(2,'0')}`;
}

function onStatStartChange(val) {
  if (!val) return;
  STAT_START_ISO = val;
  localStorage.setItem('stat_start_date', val);
  // 重新计算 DATES（从新起点到今天）
  rebuildDates();
  buildDisplayDates();
  renderAll();
}

function resetStatStart() {
  STAT_START_ISO = '2026-04-27';
  localStorage.removeItem('stat_start_date');
  document.getElementById('statStartDate').value = '2026-04-27';
  rebuildDates();
  buildDisplayDates();
  renderAll();
}

// 根据 STAT_START_ISO 重新生成 DATES 数组
function rebuildDates() {
  const [sy, sm, sd] = STAT_START_ISO.split('-').map(Number);
  const start = new Date(Date.UTC(sy, sm-1, sd));
  const end = bjNow();
  const dates = [];
  const d = new Date(start);
  while (d <= end) {
    const day = d.getUTCDay();
    const iso = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      dates.push(`${d.getUTCMonth()+1}/${String(d.getUTCDate()).padStart(2,'0')}`);
    }
    d.setUTCDate(d.getUTCDate() + 1);
  }
  // 替换全局 DATES
  DATES.length = 0;
  dates.forEach(d => DATES.push(d));
}

// ============================================================
// 多账户管理系统（最多5个账户）
// 存储格式 localStorage:
//   'fund_accounts' → [{id, name}]
//   'fund_acc_amount_{accId}_{code}' → 当前持仓金额（正负均可，最终取各账户之和的正数）
// ============================================================
const MAX_ACCOUNTS = 5;
const ACCOUNTS_KEY = 'fund_accounts';
const DEFAULT_ACCOUNT = { id: 'all', name: '全部账户' }; // 虚拟"全部"账户，不可删

let currentAccountId = localStorage.getItem('current_account') || 'all'; // 当前选中账户

function getAccounts() {
  try { return JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '[]'); } catch { return []; }
}
function setAccounts(arr) { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(arr)); }

function accAmountKey(accId, code) { return `fund_acc_amount_${accId}_${code}`; }

// 读单个账户下某基金的金额（null 表示未设置）
function loadAccAmount(accId, code) {
  const v = localStorage.getItem(accAmountKey(accId, code));
  return v !== null ? parseFloat(v) : 0;
}
// 写单个账户下某基金的金额（delta=加减仓变化量，正负均可）
function saveAccAmount(accId, code, delta) {
  const current = loadAccAmount(accId, code);
  const newVal = current + delta;
  if (newVal <= 0) localStorage.removeItem(accAmountKey(accId, code));
  else localStorage.setItem(accAmountKey(accId, code), String(newVal));
}

// 获取某基金在指定账户下的持仓（accId='all' 返回所有账户之和）
function getFundAmount(code, accId) {
  if (accId === 'all' || !accId) {
    // 所有账户之和
    const accs = getAccounts();
    let total = 0;
    accs.forEach(acc => { total += loadAccAmount(acc.id, code); });
    return total;
  }
  return loadAccAmount(accId, code);
}

// 判断某基金是否在指定账户下有持仓（用于筛选）
function isFundInAccount(code, accId) {
  if (accId === 'all' || !accId) return true;
  return loadAccAmount(accId, code) > 0;
}

// 获取当前账户下的活跃基金
function getAccountFunds() {
  const active = getActiveFunds();
  if (currentAccountId === 'all') return active;
  return active.filter(f => isFundInAccount(f.code, currentAccountId));
}

// ============================================================
// 账户栏渲染
// ============================================================
function renderAccountBar() {
  const accounts = getAccounts();
  const bar = document.getElementById('accountBar');
  if (!bar) return;
  const tabs = [
    `<button class="account-tab ${currentAccountId==='all'?'active':''}" onclick="switchAccount('all')">全部账户</button>`
  ];
  accounts.forEach(acc => {
    tabs.push(`<button class="account-tab ${currentAccountId===acc.id?'active':''}" onclick="switchAccount('${acc.id}')" title="点击切换到${acc.name}">${acc.name}</button>`);
  });
  if (accounts.length < MAX_ACCOUNTS) {
    tabs.push(`<button class="account-tab manage" onclick="showAccountManager()">＋ 新建账户</button>`);
  } else {
    tabs.push(`<button class="account-tab manage" onclick="showAccountManager()">⚙ 管理账户</button>`);
  }
  bar.innerHTML = tabs.join('');
}

function switchAccount(accId) {
  currentAccountId = accId;
  localStorage.setItem('current_account', accId);
  renderAccountBar();
  renderAll();
}

// ============================================================
// 账户管理弹窗
// ============================================================
function showAccountManager() {
  const accounts = getAccounts();
  const rows = accounts.map(acc => `
    <div class="acc-amount-row" style="gap:8px">
      <span class="acc-name-badge">${acc.name}</span>
      <span style="flex:1;font-size:11px;color:var(--muted)">账户ID: ${acc.id.substring(0,8)}...</span>
      <button class="btn" style="font-size:11px;padding:3px 8px;color:var(--red);border-color:var(--red)" onclick="deleteAccount('${acc.id}')">删除</button>
    </div>`).join('');
  const canAdd = accounts.length < MAX_ACCOUNTS;
  const html = `

// 云同步系统（GitHub REST API）
// 将持仓金额+账户信息+统计起始日期 存为仓库的 fund-positions.json
// 用户配置 GitHub Personal Access Token 后即可跨设备同步
// ============================================================
const GH_TOKEN_KEY = 'fund_gh_token';
const GH_REPO = 'MrYZT/fund-dashboard';
const GH_FILE = 'fund-positions.json';
const GH_BRANCH = 'main';

function getGhToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function setGhToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

// 导出所有持仓数据为 JSON 对象
function exportPositionsData() {
  const data = {
    version: 1,
    updatedAt: bjTodayISO() + ' ' + new Date().toLocaleTimeString(),
    accounts: getAccounts(),
    statStartDate: STAT_START_ISO,
    positions: {}
  };
  // 收集所有账户下所有基金的持仓金额
  const accs = getAccounts();
  const codes = FUNDS.map(f => f.code);
  accs.forEach(acc => {
    codes.forEach(code => {
      const v = loadAccAmount(acc.id, code);
      if (v > 0) {
        const key = `${acc.id}_${code}`;
        data.positions[key] = v;
      }
    });
  });
  return data;
}

// 导入持仓数据到 localStorage
function importPositionsData(data) {
  if (!data || data.version !== 1) return false;
  // 导入账户
  if (data.accounts && data.accounts.length > 0) {
    setAccounts(data.accounts);
  }
  // 导入统计起始日期
  if (data.statStartDate) {
    STAT_START_ISO = data.statStartDate;
    localStorage.setItem('stat_start_date', data.statStartDate);
    const dateInput = document.getElementById('statStartDate');
    if (dateInput) dateInput.value = data.statStartDate;
    rebuildDates();
    buildDisplayDates();
  }
  // 导入持仓金额
  if (data.positions) {
    // 先清除旧的持仓数据
    Object.keys(localStorage).filter(k => k.startsWith('fund_acc_amount_')).forEach(k => localStorage.removeItem(k));
    Object.entries(data.positions).forEach(([key, val]) => {
      localStorage.setItem(`fund_acc_amount_${key}`, String(val));
    });
  }
  return true;
}

// 推送持仓数据到 GitHub
async function cloudPush() {
  const token = getGhToken();
  if (!token) {
    toast('⚠️ 请先配置 GitHub Token', 'err');
    showCloudSettings();
    return;
  }
  const data = exportPositionsData();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  // 先获取文件当前 SHA（用于更新）
  const apiUrl = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
  let sha = null;
  try {
    const resp = await fetch(apiUrl, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.ok) {
      const json = await resp.json();
      sha = json.sha;
    }
  } catch(e) { /* 文件可能不存在 */ }

  const body = {
    message: `sync positions ${data.updatedAt}`,
    content: content,
    branch: GH_BRANCH
  };
  if (sha) body.sha = sha;

  try {
    const resp = await fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (resp.ok || resp.status === 201) {
      toast('☁️ 持仓数据已同步至云端', 'ok');
    } else {
      const err = await resp.json();
      toast('⚠️ 同步失败：' + (err.message || resp.status), 'err');
    }
  } catch(e) {
    toast('⚠️ 网络错误：' + e.message, 'err');
  }
}

// 从 GitHub 拉取持仓数据
async function cloudPull() {
  const token = getGhToken();
  if (!token) {
    toast('⚠️ 请先配置 GitHub Token', 'err');
    showCloudSettings();
    return;
  }
  const apiUrl = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
  try {
    const resp = await fetch(apiUrl, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) {
      toast('ℹ️ 云端尚无数据，请先推送', '');
      return;
    }
    if (!resp.ok) {
      toast('⚠️ 拉取失败：' + resp.status, 'err');
      return;
    }
    const json = await resp.json();
    const content = decodeURIComponent(escape(atob(json.content)));
    const data = JSON.parse(content);
    if (importPositionsData(data)) {
      renderAccountBar();
      renderCards();
      renderTable();
      toast('☁️ 已从云端恢复持仓数据', 'ok');
    } else {
      toast('⚠️ 云端数据格式不兼容', 'err');
    }
  } catch(e) {
    toast('⚠️ 网络错误：' + e.message, 'err');
  }
}

// 自动生成从指定日期到今天（北京时间）的所有交易日（工作日-节假日）
function generateWorkdays(startISO) {
  const [sy, sm, sd] = (startISO || '2026-04-27').split('-').map(Number);
  const start = new Date(Date.UTC(sy, sm-1, sd));
  const end = bjNow(); // 北京时间当前
  const dates = [];
  const d = new Date(start);
  while (d <= end) {
    const day = d.getUTCDay();
    const iso = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      dates.push(`${d.getUTCMonth()+1}/${String(d.getUTCDate()).padStart(2,'0')}`);
    }
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return dates;
}

// 基金增减管理 + 回收站（localStorage）
// ============================================================
const RECYCLE_KEY = 'fund_recycle_bin';
const HIDDEN_KEY = 'fund_hidden_codes';

function getHiddenCodes() {
  try { return JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]'); } catch { return []; }
}
function setHiddenCodes(arr) { localStorage.setItem(HIDDEN_KEY, JSON.stringify(arr)); }

function getActiveFunds() {
  const hidden = getHiddenCodes();
  return FUNDS.filter(f => !hidden.includes(f.code));
}

function getRecycledFunds() {
  const hidden = getHiddenCodes();
  return FUNDS.filter(f => hidden.includes(f.code));
}

function removeFund(code) {
  const hidden = getHiddenCodes();
  if (!hidden.includes(code)) {
    hidden.push(code);
    setHiddenCodes(hidden);
  }
  renderAll();
}

function restoreFund(code) {
  const hidden = getHiddenCodes().filter(c => c !== code);
  setHiddenCodes(hidden);
  renderAll();
}

// 搜索基金（通过名称或代码）—— 改版：支持多结果列表选择
async function addFundBySearch(query) {
  const q = query.trim();
  if (!q) return null;
  // 先检查是否已在列表中
  const existing = FUNDS.find(f => f.code === q || f.name.includes(q));
  if (existing) {
    const hidden = getHiddenCodes();
    if (hidden.includes(existing.code)) {
      restoreFund(existing.code);
      return existing;
    }
    alert(`该基金已在看板中：${existing.name} (${existing.code})`);
    return null;
  }
  // 搜索：代码→精确匹配，名称→多结果列表
  try {
    let results;
    if (q.match(/^\d{6}$/)) {
      // 精确代码搜索
      const info = await fetchFundInfoByCodeJsonp(q);
      if (!info) {
        // jsonpgz失败时fallback到F10DataApi
        const info2 = await fetchFundInfoByF10(q);
        if (!info2) { alert('未找到该基金代码'); return null; }
        results = [info2];
      } else {
        results = [info];
      }
    } else {
      // 名称关键词搜索，返回列表供选择
      results = await fetchFundInfoByName(q);
      if (!results || results.length === 0) { alert('未找到匹配的基金'); return null; }
      if (results.length > 1) {
        // 多结果：让用户选择
        const chosen = await showSearchResultPicker(results);
        if (!chosen) return null;
        results = [chosen];
      }
    }
    const info = results[0];
    // 再次检查是否已在列表中
    if (FUNDS.find(f => f.code === info.code)) {
      alert(`该基金已在看板中`);
      return null;
    }
    const newFund = {
      seq: FUNDS.length + 1,
      name: info.name,
      code: info.code,
      buy: null, def: null, tag: null,
      sNav: info.nav || 1,
      latestNav: null, ret: null, days: 0, sumR: 0, up: 0, dn: 0, avg: 0,
      amount: 0, dr: []
    };
    FUNDS.push(newFund);
    await fetchAllHistory();
    renderAll();
    return newFund;
  } catch(e) {
    console.error('[addFundBySearch]', e);
    alert('添加基金失败：' + e.message);
    return null;
  }
}

// 通过 fundgz JSONP 按代码精确查询（复用 _estCallbacks 路由机制）
function fetchFundInfoByCodeJsonp(code) {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
    const cleanup = () => { try { document.head.removeChild(script); } catch(e) {} };
    const timer = setTimeout(() => { delete _estCallbacks[code]; resolve(null); cleanup(); }, 8000);
    _estCallbacks[code] = (data) => {
      clearTimeout(timer);
      delete _estCallbacks[code];
      if (data && data.fundcode) {
        resolve({ code: data.fundcode, name: data.name, nav: parseFloat(data.dwjz) || null });
      } else {
        resolve(null);
      }
      cleanup();
    };
    script.onerror = () => { clearTimeout(timer); delete _estCallbacks[code]; resolve(null); cleanup(); };
    document.head.appendChild(script);
  });
}

// 通过东方财富基金搜索API按名称关键词搜索（返回多结果）
function fetchFundInfoByName(keyword) {
  return new Promise((resolve) => {
    const cbName = '_fundSearchCb_' + Date.now();
    window[cbName] = function(data) {
      cleanup();
      if (!data || !data.Datas || data.Datas.length === 0) { resolve([]); return; }
      const results = data.Datas.slice(0, 20).map(d => ({
        code: d.CODE || d.FundCode,
        name: d.NAME || d.ShortName,
        nav: null
      }));
      resolve(results);
    };
    const script = document.createElement('script');
    script.src = `https://fundsuggest.eastmoney.com/FundSearch/api/FundSearchAPI.ashx?m=1&key=${encodeURIComponent(keyword)}&cb=${cbName}`;
    let done = false;
    const cleanup = () => {
      done = true;
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
      delete window[cbName];
    };
    const timeout = setTimeout(() => {
      if (done) return;
      cleanup();
      resolve([]);
    }, 8000);
    script.onerror = () => {
      if (done) return;
      cleanup();
      resolve([]);
    };
    document.head.appendChild(script);
  });
}

// 通过F10DataApi按代码获取基本信息（fallback）
function fetchFundInfoByF10(code) {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    const todayISO = bjTodayISO();
    script.src = `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${code}&page=1&sdate=2026-04-27&edate=${todayISO}&per=3`;
    let done = false;
    const cleanup = () => {
      done = true;
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
      delete window.apidata;
    };
    const timeout = setTimeout(() => {
      if (done) return;
      cleanup();
      resolve(null);
    }, 8000);
    script.onload = () => {
      if (done) return;
      try {
        const raw = window.apidata;
        if (!raw || !raw.content) { cleanup(); resolve(null); return; }
        const tmp = document.createElement('div');
        tmp.innerHTML = raw.content;
        const rows = tmp.querySelectorAll('tbody tr');
        if (rows.length === 0) { cleanup(); resolve(null); return; }
        const nameMatch = raw.content.match(/<t[h][^>]*>([^<]+)/);
        const name = nameMatch ? nameMatch[1].trim() : code;
        const lastRow = rows[rows.length - 1];
        const cells = lastRow.querySelectorAll('td');
        const nav = cells.length >= 2 ? parseFloat(cells[1].textContent.trim()) : null;
        cleanup();
        resolve({ code, name, nav });
      } catch(e) { cleanup(); resolve(null); }
    };
    script.onerror = () => { if (done) return; cleanup(); resolve(null); };
    document.head.appendChild(script);
  });
}

// 搜索结果选择弹窗（名称搜索返回多条时使用）
function showSearchResultPicker(results) {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.id = 'searchPickerOverlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center';
    const listHtml = results.map((r, i) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s" 
           onmouseover="this.style.background='rgba(88,166,255,0.08)'" onmouseout="this.style.background=''"
           onclick="window._pickSearchResult(${i})">
        <span style="color:var(--text);font-size:14px">${r.name}</span>
        <span style="color:var(--muted);font-size:12px">${r.code}</span>
      </div>`).join('');
    overlay.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:90vw">
        <h3 style="margin:0 0 12px;font-size:16px;color:var(--text)">🔍 选择基金</h3>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">共找到 ${results.length} 个结果，点击选择要添加的基金</div>
        <div style="max-height:300px;overflow-y:auto">${listHtml}</div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button class="btn" onclick="window._cancelSearchPicker()">取消</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.remove(); resolve(null); } });
    window._pickSearchResult = (idx) => { overlay.remove(); resolve(results[idx]); };
    window._cancelSearchPicker = () => { overlay.remove(); resolve(null); };
  });
}

// 弹窗：添加基金
function showAddFundDialog() {
  const overlay = document.createElement('div');
  overlay.id = 'addFundOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center';

        <input id="addFundInput" type="text" placeholder="输入基金代码（如006533）或名称关键词" style="width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:13px;outline:none">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="closeAddFundDialog()">取消</button>
        <button class="btn primary" onclick="doAddFund()">添加</button>
      </div>
      <div id="addFundStatus" style="margin-top:10px;font-size:11px;color:var(--muted)"></div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('addFundInput').focus();
}

function closeAddFundDialog() {
  const overlay = document.getElementById('addFundOverlay');
  if (overlay) overlay.remove();
}

async function doAddFund() {
  const input = document.getElementById('addFundInput');
  const status = document.getElementById('addFundStatus');
  const q = input.value.trim();
  if (!q) { status.textContent = '请输入基金代码或名称'; status.style.color = 'var(--red)'; return; }
  status.textContent = '搜索中...'; status.style.color = 'var(--muted)';
  const result = await addFundBySearch(q);
  if (result) {
    status.textContent = `已添加：${result.name} (${result.code})`; status.style.color = 'var(--green)';
    setTimeout(() => closeAddFundDialog(), 1200);
  }
}

// 弹窗：回收站
function showRecycleBin() {
  const recycled = getRecycledFunds();
  const overlay = document.createElement('div');
  overlay.id = 'recycleOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center';

    ? recycled.map(f => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="color:var(--text);font-size:13px">${f.name} <span style="color:var(--muted);font-size:11px">(${f.code})</span></span>
          <button class="btn" style="font-size:11px;padding:4px 8px" onclick="doRestore('${f.code}')">恢复</button>
        </div>`).join('')
    : '<div style="color:var(--muted);text-align:center;padding:20px">回收站为空</div>';
  overlay.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:90vw">
      <h3 style="margin:0 0 16px;font-size:16px;color:var(--text)">🗑️ 回收站</h3>
      <div style="max-height:300px;overflow-y:auto">${listHtml}</div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" onclick="closeRecycleBin()">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeRecycleBin() {
  const overlay = document.getElementById('recycleOverlay');
  if (overlay) overlay.remove();
}

function doRestore(code) {
  restoreFund(code);
  closeRecycleBin();
  if (getRecycledFunds().length > 0) showRecycleBin(); // 如果还有回收的，刷新弹窗
}

function navCacheKey(code, isoDate) { return `nav_${code}__${isoDate}`; }

function getNavCache() {
  try { return JSON.parse(localStorage.getItem('fund_nav_cache_v1') || '{}'); } catch { return {}; }
}
function setNavCache(c) { localStorage.setItem('fund_nav_cache_v1', JSON.stringify(c)); }

// 从净值缓存中取最新净值（取最近日期）
function getLatestNavFromCache(code) {
  const nc = getNavCache();
  // 找所有该基金的净值条目
  const prefix = `nav_${code}__`;
  const entries = Object.keys(nc)
    .filter(k => k.startsWith(prefix))
    .map(k => ({ date: k.replace(prefix, ''), nav: nc[k] }))
    .sort((a, b) => b.date.localeCompare(a.date)); // 降序
  return entries.length > 0 ? entries[0] : null;
}

// 计算总收益率：(latestNav / startNav - 1) * 100
// startNav 优先取统计起始日的净值，没有则用 sNav（4/27）
function calcRet(f) {
  const entry = getLatestNavFromCache(f.code);
  if (!entry) return null;
  const nc = getNavCache();
  const startNav = nc[navCacheKey(f.code, STAT_START_ISO)] || f.sNav;
  return (entry.nav / startNav - 1) * 100;
}

// Init cache from excel data (使用SEED_DATES对齐dr数组)
function initCache() {
  const cache = getCache();
  FUNDS.forEach(f => {
    SEED_DATES.forEach((d, i) => {
      const v = f.dr[i];
      if (v !== null && v !== undefined) {
        const k = cacheKey(f.code, d);
        if (cache[k] === undefined) cache[k] = v;
      }
    });
  });
  setCache(cache);
}

// Get value for a fund on a date
function getVal(code, date) {
  const cache = getCache();
  return cache[cacheKey(code, date)] ?? null;
}

// ============================================================
// 基金评估模型指标计算
// 每日自动更新，无需额外 API 调用
// ============================================================
const RISK_FREE = 0.015; // 无风险利率 1.5%（中国1年期国债估算）

// 获取日收益率数组（小数形式）
function getDailyReturns(code, cache) {
  const fund = FUNDS.find(f => f.code === code);
  const returns = [];
  DATES.forEach((d) => {
    let v = cache ? cache[cacheKey(code, d)] : getVal(code, d);
    if (v === null && fund) {
      const seedIdx = SEED_DATE_MAP[normDate(d)];
      if (seedIdx !== undefined) v = fund.dr[seedIdx];
    }
    if (v != null) returns.push(v / 100);
  });
  return returns;
}

// 获取净值时间序列（从统计起点开始）
// 优先从净值缓存取，不足时从日收益率重建
function getNavSeries(f, navCache, cache) {
  const nc = navCache || getNavCache();
  const prefix = `nav_${f.code}__`;
  // 从缓存中找起点净值（统计起始日）
  const startISO = STAT_START_ISO;
  // 起点净值：如果缓存中有该日期净值则使用，否则用 sNav（原始4/27净值）
  const startNavCached = nc[navCacheKey(f.code, startISO)];
  const startNav = startNavCached || f.sNav;

  let series = Object.keys(nc)
    .filter(k => k.startsWith(prefix))
    .map(k => ({ date: k.replace(prefix, ''), nav: nc[k] }))
    .filter(e => e.date >= startISO)
    .sort((a, b) => a.date.localeCompare(b.date));
  // 确保起点
  if (series.length === 0 || series[0].date > startISO) {
    series.unshift({ date: startISO, nav: startNav });
  }
  // 净值缓存不足（<2条），从日收益率重建
  if (series.length < 2) {
    const c = cache || getCache();
    series = [{ date: startISO, nav: startNav }];
    let nav = startNav;
    DATES.forEach((d) => {
      let v = c[cacheKey(f.code, d)];
      if (v === undefined) {
        const seedIdx = SEED_DATE_MAP[normDate(d)];
        if (seedIdx !== undefined) v = f.dr[seedIdx];
      }
      if (v != null) {
        nav = nav * (1 + v / 100);
        const [m, day] = d.split('/');
        const iso = `2026-${String(parseInt(m)).padStart(2,'0')}-${String(parseInt(day)).padStart(2,'0')}`;
        series.push({ date: iso, nav: parseFloat(nav.toFixed(4)) });
      }
    });
  }
  return series;
}

// 1. 年化波动率 = stdev(daily) × √252
function calcVolatility(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length < 5) return null;
  const mean = returns.reduce((a,b)=>a+b,0) / returns.length;
  const sumSq = returns.reduce((s,r)=>s + (r-mean)*(r-mean), 0);
  const stdev = Math.sqrt(sumSq / (returns.length - 1));
  return stdev * Math.sqrt(252) * 100;
}

// 2. 最大回撤 = 从峰值到谷底的最大跌幅
function calcMaxDrawdown(f, navCache, cache) {
  const series = getNavSeries(f, navCache, cache);
  if (series.length < 2) return null;
  let peak = series[0].nav;
  let maxDD = 0;
  for (let i = 1; i < series.length; i++) {
    if (series[i].nav > peak) peak = series[i].nav;
    const dd = (series[i].nav - peak) / peak;
    if (dd < maxDD) maxDD = dd;
  }
  return maxDD * 100;
}

// 3. 夏普比率 = (年化收益率 - Rf) / 年化波动率
function calcSharpe(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length < 5) return null;
  let cumulative = 1;
  returns.forEach(r => cumulative *= (1 + r));
  const days = returns.length;
  const annualReturn = Math.pow(cumulative, 252 / days) - 1;
  const mean = returns.reduce((a,b)=>a+b,0) / returns.length;
  const sumSq = returns.reduce((s,r)=>s + (r-mean)*(r-mean), 0);
  const annualVol = Math.sqrt(sumSq / (returns.length - 1)) * Math.sqrt(252);
  if (annualVol === 0) return null;
  return (annualReturn - RISK_FREE) / annualVol;
}

// 4. 胜率 = 盈利天数占比
function calcWinRate(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length === 0) return null;
  const up = returns.filter(r => r > 0).length;
  return (up / returns.length) * 100;
}

// ============================================================
// 总评分模型（满分100）
// 基于经典基金评价理论 五维度加权
// 权重：夏普比率25% + 最大回撤20% + 卡尔玛比率15% + 修复天数20% + 胜率20%
// ============================================================
function calcTotalScore(f, cache, navCacheArg) {
  const nc = navCacheArg || getNavCache();
  const c  = cache || getCache();

  // 1. 夏普比率 (25分) — 分段打分：>=2:25, >=1.5:22, >=1:18, >=0.5:12, >=0:6, <0:0
  const sharpe = calcSharpe(f.code, c);
  let sScore = 0;
  if (sharpe !== null) {
    if (sharpe >= 2)   sScore = 25;
    else if (sharpe >= 1.5) sScore = 22;
    else if (sharpe >= 1)   sScore = 18;
    else if (sharpe >= 0.5) sScore = 12;
    else if (sharpe >= 0)   sScore =  6;
    else                    sScore =  0;
  }

  // 2. 最大回撤 (20分) — 越小越好：>-5%:20, >-10%:16, >-15%:11, >-25%:6, <=−25%:0
  const maxdd = calcMaxDrawdown(f, nc, c);
  let dScore = 0;
  if (maxdd !== null) {
    if      (maxdd > -5)  dScore = 20;
    else if (maxdd > -10) dScore = 16;
    else if (maxdd > -15) dScore = 11;
    else if (maxdd > -25) dScore =  6;
    else                  dScore =  0;
  }

  // 3. 卡尔玛比率 (15分) — 越大越好：>=3:15, >=2:13, >=1:10, >=0.5:6, >=0:3, <0:0
  const calmar = calcCalmar(f, nc, c);
  let cScore = 0;
  if (calmar !== null) {
    if      (calmar >= 3)   cScore = 15;
    else if (calmar >= 2)   cScore = 13;
    else if (calmar >= 1)   cScore = 10;
    else if (calmar >= 0.5) cScore =  6;
    else if (calmar >= 0)   cScore =  3;
    else                    cScore =  0;
  }

  // 4. 修复天数 (20分) — 越短越好：<=3天:20, <=7:16, <=14:11, <=21:6, 未恢复:0
  const recovery = calcRecoveryDays(f, nc, c);
  let rScore = 0;
  if (recovery !== null) {
    if      (recovery > 0 && recovery <= 3)  rScore = 20;
    else if (recovery > 0 && recovery <= 7)  rScore = 16;
    else if (recovery > 0 && recovery <= 14) rScore = 11;
    else if (recovery > 0 && recovery <= 21) rScore =  6;
    else if (recovery > 0)                   rScore =  3;
    // recovery <= 0 (未恢复) 得0分
  }

  // 5. 胜率 (20分) — >=65%:20, >=60%:17, >=55%:13, >=50%:9, >=45%:5, <45%:0
  const wr = calcWinRate(f.code, c);
  let wScore = 0;
  if (wr !== null) {
    if      (wr >= 65) wScore = 20;
    else if (wr >= 60) wScore = 17;
    else if (wr >= 55) wScore = 13;
    else if (wr >= 50) wScore =  9;
    else if (wr >= 45) wScore =  5;
    else               wScore =  0;
  }

  const total = sScore + dScore + cScore + rScore + wScore;
  return { total, sScore, dScore, cScore, rScore, wScore };
}

// 5. 修复天数 = 最大回撤后净值恢复到前高所需交易日数
// 返回 null 无数据 / 数字 已恢复 / 负数 未恢复(取绝对值=距谷底天数)

// 6. 卡尔玛比率 = 年化收益率 / |最大回撤|（越大越好）
function calcCalmar(f, navCache, cache) {
  const nc = navCache || getNavCache();
  const c  = cache || getCache();
  const maxdd = calcMaxDrawdown(f, nc, c);
  if (maxdd === null || maxdd >= 0 || maxdd === 0) return null; // 无回撤时无意义
  const returns = getDailyReturns(f.code, c);
  if (returns.length < 5) return null;
  let cumulative = 1;
  returns.forEach(r => cumulative *= (1 + r));
  const days = returns.length;
  const annualReturn = Math.pow(cumulative, 252 / days) - 1;
  return annualReturn / Math.abs(maxdd);
}

function calcRecoveryDays(f, navCache, cache) {
  const series = getNavSeries(f, navCache, cache);
  if (series.length < 3) return null;
  
  let peak = series[0].nav;
  let maxDD = 0, troughIdx = 0, peakAtTrough = series[0].nav;
  
  for (let i = 1; i < series.length; i++) {
    if (series[i].nav > peak) peak = series[i].nav;
    const dd = (series[i].nav - peak) / peak;
    if (dd < maxDD) {
      maxDD = dd;
      troughIdx = i;
      peakAtTrough = peak;
    }
  }
  
  // 已从谷底完全恢复
  for (let i = troughIdx + 1; i < series.length; i++) {
    if (series[i].nav >= peakAtTrough) {
      return i - troughIdx;
    }
  }
  
  // 尚未恢复：返回负值（绝对值=距谷底天数），方便展示时区分
  return -(series.length - 1 - troughIdx);
}

// ============================================================
// API: 历史净值 (F10DataApi) + 实时估算 (并行批量)
// F10DataApi: 返回仅指定日期范围数据，~7KB/只 (vs pingzhongdata ~300KB/只)
// 无 Referer 限制，涨跌幅直接提供，数据更完整准确
// ============================================================
const BATCH_SIZE = 6; // 并发批量大小

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- 历史净值: F10DataApi (东方财富历史净值接口) ----

async function fetchHistory(code, startDate, endDate) {
  const MAX_RETRIES = 2;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      const result = await _fetchHistoryF10(code, startDate, endDate);
      if (result !== null && result.length > 0) return result;
      if (attempt < MAX_RETRIES) await sleep(200);
    } catch(e) {
      console.warn(`[fetchHistory] ${code} 第${attempt}次失败: ${e.message}`);
      if (attempt < MAX_RETRIES) await sleep(200);
      else return null;
    }
  }
  return null;
}

async function _fetchHistoryF10(code, startDate, endDate) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${code}&page=1&sdate=${startDate}&edate=${endDate}&per=90`;
    let done = false;
    const timeout = setTimeout(() => {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error('F10DataApi timeout'));
    }, 10000);

    function cleanup() {
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
      delete window.apidata;
    }

    script.onload = () => {
      if (done) return;
      done = true;
      try {
        const raw = window.apidata;
        if (!raw || !raw.content) { cleanup(); resolve(null); return; }
        // 解析 HTML 表格提取日期、净值、涨跌幅
        const tmp = document.createElement('div');
        tmp.innerHTML = raw.content;
        const rows = tmp.querySelectorAll('tbody tr');
        const records = [];
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          if (cells.length >= 4) {
            const date = cells[0].textContent.trim();                         // 2026-06-15
            const nav = cells[1].textContent.trim();                           // 1.5616
            const changeRate = cells[3].textContent.trim().replace('%', '');   // 0.26
            if (date && nav) records.push({ FSRQ: date, DWJZ: nav, JZZZL: changeRate });
          }
        });
        cleanup();
        console.log(`[fetchHistory] ${code} 成功获取 ${records.length} 条 (F10DataApi)`);
        resolve(records);
      } catch(e) { cleanup(); reject(e); }
    };

    script.onerror = () => {
      if (done) return;
      done = true;
      cleanup();
      reject(new Error('F10DataApi load error'));
    };

    document.head.appendChild(script);
  });
}

// ---- 实时估算: 并行批量获取 ----
// fundgz.1234567.com.cn 固定回调名 jsonpgz
// 通过全局回调 + fundcode 路由实现并行获取（每批6只）

const _estCallbacks = {};

// 全局 jsonpgz 回调 - 按 fundcode 路由到对应的 Promise
window.jsonpgz = function(data) {
  if (data && data.fundcode && _estCallbacks[data.fundcode]) {
    const cb = _estCallbacks[data.fundcode];
    delete _estCallbacks[data.fundcode];
    cb(data);
  }
};

async function fetchEstimatesBatch(fundCodes) {
  const results = {};
  for (let i = 0; i < fundCodes.length; i += BATCH_SIZE) {
    const batch = fundCodes.slice(i, i + BATCH_SIZE);
    const promises = batch.map(code => new Promise((resolve) => {
      const script = document.createElement('script');
      script.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
      const cleanup = () => { try { document.head.removeChild(script); } catch(e) {} };
      const timer = setTimeout(() => { delete _estCallbacks[code]; resolve(null); cleanup(); }, 8000);
      _estCallbacks[code] = (data) => { clearTimeout(timer); resolve(data); cleanup(); };
      script.onerror = () => { delete _estCallbacks[code]; clearTimeout(timer); resolve(null); cleanup(); };
      document.head.appendChild(script);
    }));
    const batchResults = await Promise.all(promises);
    batch.forEach((code, j) => { results[code] = batchResults[j]; });
    if (i + BATCH_SIZE < fundCodes.length) await sleep(50);
  }
  return results;
}

// ============================================================
// 渲染
// ============================================================
let displayDates = [];
let sortCol = 'score';     // 当前排序列（默认：总评分降序）
let sortDir = 'desc';    // 排序方向: asc / desc

// 计算某基金从4/27到当天的盈利天数/亏损天数
function calcUpDownDays(f) {
  const cache = getCache();
  const today = todayKey();
  let up = 0, dn = 0;
  DATES.forEach((d) => {
    if (normDate(d) > normDate(today)) return;
    let v = cache[cacheKey(f.code, d)];
    if (v === undefined) {
      const seedIdx = SEED_DATE_MAP[normDate(d)];
      if (seedIdx !== undefined) v = f.dr[seedIdx];
    }
    if (v == null) return;  // 跳过无数据日期
    if (v > 0) up++;
    else if (v < 0) dn++;
  });
  return { up, dn };
}

// 对基金列表排序（仅活跃基金）
function getSortedFunds() {
  const list = [...getAccountFunds()];
  const cache = getCache();
  const today = todayKey();
  
  const valFn = (f) => {
    switch (sortCol) {
      case 'seq': return f.seq;
      case 'name': return f.name;
      case 'code': return f.code;
      case 'ret': {
        const dynRet = calcRet(f);
        return dynRet !== null ? dynRet : (f.sumR || 0);
      }
      case 'sharpe': return calcSharpe(f.code, cache) ?? null;
      case 'maxdd': return calcMaxDrawdown(f, getNavCache(), cache) ?? null;
      case 'recovery': return calcRecoveryDays(f, getNavCache(), cache) ?? null;
      case 'calmar': return calcCalmar(f, getNavCache(), cache) ?? null;
      case 'vol': return calcVolatility(f.code, cache) ?? null;
      case 'winrate': return calcWinRate(f.code, cache) ?? null;
      case 'score': return calcTotalScore(f, cache, getNavCache()).total ?? null;
      case 'amount': return f.amount ?? 0;
      case 'buy': return f.buy ?? null;
      case 'def': return f.def ?? null;
      case 'avg': return f.avg ?? null;
      case 'upDays': return calcUpDownDays(f).up;
      case 'dnDays': return calcUpDownDays(f).dn;
      default: {
        const v = cache[cacheKey(f.code, sortCol)];
        return v ?? null;
      }
    }
  };
  
  list.sort((a, b) => {
    const va = valFn(a), vb = valFn(b);
    // 处理字符串排序
    if (typeof va === 'string' && typeof vb === 'string') {
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    // 数字排序，null/undefined 排最后
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  
  return list;
}

function buildDisplayDates() {
  displayDates = [...DATES];
  const today = todayKey();
  if (!displayDates.some(d => normDate(d) === normDate(today))) {
    displayDates.push(today);
  }
  // 从缓存中找出 DATES 之外的新日期（如 5/28 历史数据已拉取），按日期排序插入
  const cache = getCache();
  const seen = new Set(displayDates.map(d => normDate(d)));
  const extraDates = [];
  FUNDS.forEach(f => {
    Object.keys(cache).forEach(k => {
      const prefix = f.code + '__';
      if (k.startsWith(prefix)) {
        const d = k.substring(prefix.length);
        const nd = normDate(d);
        if (!seen.has(nd)) {
          seen.add(nd);
          extraDates.push(d);
        }
      }
    });
  });
  // 去重排序：按 M/D 解析后排序
  const parseMD = s => { const [m,d]=s.split('/'); return parseInt(m)*100+parseInt(d); };
  extraDates.sort((a,b) => parseMD(a)-parseMD(b));
  // 插入到合适位置（today 之前，DATES 末尾之后）
  displayDates = [...DATES];
  extraDates.forEach(d => {
    if (!displayDates.some(dd => normDate(dd) === normDate(d))) {
      displayDates.push(d);
    }
  });
  if (!displayDates.some(d => normDate(d) === normDate(today))) {
    displayDates.push(today);
  }
  // 最终按日期降序排列（最新日期在左）
  displayDates.sort((a,b) => parseMD(b)-parseMD(a));
}

function renderCards() {
  const today = todayKey();
  const cache = getCache();
  // 根据当前账户筛选基金
  const displayFunds = getAccountFunds();
  const isAccountView = currentAccountId !== 'all';
  const accName = isAccountView ? (getAccounts().find(a => a.id === currentAccountId) || {}).name : '全部';

  // 今日收益汇总（有持仓金额的基金才计入）
  let todayGain = 0, hasTodayGain = false;
  let totalAmount = 0;
  displayFunds.forEach(f => {
    const amt = getFundAmount(f.code, currentAccountId);
    f.amount = amt;
    totalAmount += amt;
    if (!amt) return;
    const v = cache[cacheKey(f.code, today)];
    if (v != null) {
      todayGain += amt * v / 100;
      hasTodayGain = true;
    }
  });

  // 今日收益率（仅账户视图）
  let todayRateHtml = '';
  if (isAccountView && totalAmount > 0) {
    const rate = todayGain / totalAmount * 100;
    const rateColor = rate >= 0 ? 'var(--red)' : 'var(--green)';
    todayRateHtml = `
      <div class="card" style="border-color:rgba(88,166,255,0.3);background:rgba(88,166,255,0.04)">
        <div class="card-label">📈 ${accName} 今日收益率</div>
        <div class="card-val" style="color:${rateColor}">${hasTodayGain ? (rate >= 0 ? '+' : '') + rate.toFixed(3) + '%' : '—'}</div>
        <div class="card-sub">基于当前账户持仓估算</div>
      </div>`;
  }

  // 今日行情：涨/跌/待
  let up=0, dn=0, noData=0;
  displayFunds.forEach(f => {
    const v = cache[cacheKey(f.code, today)];
    if (v == null) noData++;
    else if (v > 0) up++;
    else if (v < 0) dn++;
  });

  // 今日涨幅排序（前5最亮眼，后5最需努力）
  const withToday = displayFunds.map(f => ({
    name: f.name, code: f.code, v: cache[cacheKey(f.code, today)]
  })).filter(x => x.v != null);
  const sortedByVal = [...withToday].sort((a,b) => b.v - a.v);
  const top5 = sortedByVal.slice(0, 5);
  const bottom5 = [...sortedByVal].sort((a,b) => a.v - b.v).slice(0, 5);

  // 颜色按实际涨跌值动态设色（涨红跌绿）
  function valColor(v) { return v > 0 ? 'var(--red)' : v < 0 ? 'var(--green)' : 'var(--muted)'; }

function setSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  // 更新排序信息提示
  const label = SORT_LABELS[col] || col;
  document.getElementById('sortInfo').textContent = `排序: ${label} ${sortDir==='asc'?'↑':'↓'}`;
  renderTable();
  renderCards();
}

function resetSort() {
  sortCol = 'score';
  sortDir = 'desc';
  document.getElementById('sortInfo').textContent = '';
  renderTable();
  renderCards();
}

function updateCellUI(code, date, val) {
  const nd = normDate(date);
  const todayN = normDate(todayKey());
  if (nd !== todayN) return;  // Only update today cell in real-time
  
  const el = document.getElementById(`c_${code}`);
  if (!el) return;
  const cls = val > 0 ? 'up' : val < 0 ? 'dn' : 'zero';
  const sign = val > 0 ? '+' : '';
  el.className = `pct ${cls}`;
  el.textContent = `${sign}${val.toFixed(2)}%`;
}

// 实时更新总收益率单元格
function updateRetUI(f) {
  const el = document.getElementById(`ret_${f.code}`);
  if (!el) return;
  const dynRet = calcRet(f);
  if (dynRet === null) return;
  const cls = dynRet >= 0 ? 'total-up' : 'total-dn';
  const sign = dynRet >= 0 ? '+' : '';
  el.className = cls;
  el.textContent = `${sign}${dynRet.toFixed(2)}%`;
  
  // 更新tooltip
  const navEntry = getLatestNavFromCache(f.code);
  if (navEntry) el.title = `净值日期: ${navEntry.date} | 净值: ${navEntry.nav}`;
}

async function fetchTodayData() {
  const btn = document.getElementById('fetchTodayBtn');
  const dot = document.getElementById('statusDot');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> 获取中...';
  dot.className = 'dot loading';
  
  const today = todayKey();
  const todayN = normDate(today);
  const cache = getCache();
  const navCache = getNavCache();
  const todayISO = bjTodayISO();
  
  let ok = 0, fail = 0;
  showProg('正在获取今日估算涨跌幅...', 0);

  // 并行批量获取（每批6只，仅活跃基金）
  const codes = getActiveFunds().map(f => f.code);
  const estimates = await fetchEstimatesBatch(codes);

  getActiveFunds().forEach((f, idx) => {
    const d = estimates[f.code];
    if (d && d.gszzl !== '' && d.gszzl !== undefined) {
      const val = parseFloat(d.gszzl);
      if (!isNaN(val)) {
        cache[cacheKey(f.code, today)] = val;
        updateCellUI(f.code, today, val);
        ok++;
        // 同时存储估算净值用于实时总收益率计算
        if (d.gsz && parseFloat(d.gsz) > 0) {
          const estimatedNav = parseFloat(d.gsz);
          navCache[navCacheKey(f.code, todayISO)] = estimatedNav;
          updateRetUI(f);
        }
      } else fail++;
    } else fail++;
  });
  
  setCache(cache);
  setNavCache(navCache);
  hideProg();
  renderCards();
  renderTable();
  
  const nowT = bjNow();
  document.getElementById('updateTime').textContent =
    `更新于 ${nowT.getUTCHours()}:${String(nowT.getUTCMinutes()).padStart(2,'0')}`;
  dot.className = `dot ${fail > ok ? 'err' : 'ok'}`;
  btn.disabled = false;
  btn.innerHTML = '⟳ 获取今日涨跌幅';
  
  toast(fail === 0 
    ? `✅ 已更新全部 ${ok} 支基金今日涨跌幅及收益率` 
    : `✅ 更新 ${ok} 支 | ⚠️ ${fail} 支获取失败`, 
    fail > 0 ? 'err' : 'ok');
}

async function fetchAllHistory({ autoFetchToday = true, force = false } = {}) {
  const btn = document.getElementById('fetchTodayBtn');
  const dot = document.getElementById('statusDot');
  btn.disabled = true;
  dot.className = 'dot loading';

  const endDate = bjTodayISO();
  const startDate = '2026-04-27';

  const cache = getCache();
  const navCache = getNavCache();
  let updated = 0, yesterdayUpdated = 0, failedFunds = [];

  // 计算昨天日期 (M/D 格式)，用北京时间避免 UTC 偏移
  const yesterdayBJ = new Date(bjNow().getTime() - 86400 * 1000);
  const yesterdayKeyStr = `${yesterdayBJ.getUTCMonth()+1}/${yesterdayBJ.getUTCDate()}`;

  // ---- 增量缓存：检查哪些基金需要更新 ----
  const lastTradingDay = getLastTradingDay();
  const fundsToFetch = force ? getActiveFunds() : getActiveFunds().filter(f => {
    return cache[cacheKey(f.code, lastTradingDay)] === undefined;
  });

  if (fundsToFetch.length === 0 && !force) {
    console.log('[fetchAllHistory] 所有基金最近交易日数据完整，跳过历史获取');
    hideProg();
    btn.disabled = false;
    dot.className = 'dot ok';
    document.getElementById('dataHealth').textContent = '✅ 数据已是最新';
    document.getElementById('dataHealth').style.color = 'var(--green)';
    if (autoFetchToday) setTimeout(() => fetchTodayData(), 300);
    return;
  }

  console.log(`[fetchAllHistory] 需要更新 ${fundsToFetch.length}/${FUNDS.length} 支基金`);
  showProg(`正在补全历史净值数据（${fundsToFetch.length}支）...`, 0);

  for (let i = 0; i < fundsToFetch.length; i++) {
    const f = fundsToFetch[i];
    showProg(`补全 ${f.name.substring(0,8)}... (${i+1}/${fundsToFetch.length})`, Math.round((i/fundsToFetch.length)*100));

    try {
      const hist = await fetchHistory(f.code, startDate, endDate);
      if (hist && hist.length > 0) {
        hist.forEach(item => {
          const isoDate = item.FSRQ.substring(0, 10); // YYYY-MM-DD
          // 直接从字符串解析，完全避免 Date 对象时区问题
          const [yyyy, mm, dd] = isoDate.split('-');
          const dk = `${parseInt(mm)}/${dd}`; // M/DD 格式，如 6/10

          // 存涨跌幅（允许覆盖，确保最新数据）
          const val = parseFloat(item.JZZZL);
          if (!isNaN(val)) {
            const k = cacheKey(f.code, dk);
            const wasUndef = cache[k] === undefined;
            cache[k] = val;
            if (wasUndef) updated++;
            if (dk === yesterdayKeyStr) yesterdayUpdated++;
          }

          // 存净值（总是用最新值覆盖）
          const dwjz = parseFloat(item.DWJZ);
          if (!isNaN(dwjz)) {
            navCache[navCacheKey(f.code, isoDate)] = dwjz;
          }
        });
      } else {
        failedFunds.push(f.code);
        console.warn(`[fetchAllHistory] ${f.code} (${f.name}) 历史数据为空`);
      }
    } catch(e) {
      failedFunds.push(f.code);
      console.error(`[fetchAllHistory] ${f.code} 获取失败:`, e.message);
    }
  }

  // 确保昨天日期在 displayDates 中
  if (!displayDates.some(d => normDate(d) === normDate(yesterdayKeyStr))) {
    displayDates.push(yesterdayKeyStr);
    displayDates.sort((a,b) => {
      const pa = (s => {const [m,d]=s.split('/');return parseInt(m)*100+parseInt(d);})(a);
      const pb = (s => {const [m,d]=s.split('/');return parseInt(m)*100+parseInt(d);})(b);
      return pa - pb;
    });
  }

  // 数据验证：检查最近3个交易日是否有数据
  const recentDates = DATES.filter(d => normDate(d) <= normDate(lastTradingDay)).slice(-3);
  let missingRecent = 0;
  recentDates.forEach(d => {
    let hasAny = false;
    getActiveFunds().forEach(f => {
      if (cache[cacheKey(f.code, d)] !== undefined) hasAny = true;
    });
    if (!hasAny) missingRecent++;
  });

  setCache(cache);
  setNavCache(navCache);

  // 记录最后更新时间
  try {
    localStorage.setItem('fund_last_fetch', new Date().toISOString());
  } catch(e) {}

  renderCards();
  renderTable();
  buildDisplayDates();
  renderTable();
  hideProg();

  dot.className = failedFunds.length > FUNDS.length / 2 ? 'dot err' : 'dot ok';
  btn.disabled = false;

  // 反馈信息
  const yMsg = yesterdayUpdated > 0 ? ` 含昨日 ${yesterdayKeyStr} 共${yesterdayUpdated}条` : '';
  if (failedFunds.length === 0) {
    toast(`📅 历史数据补全完成，新增 ${updated} 条涨跌幅记录${yMsg}`, 'ok');
  } else if (failedFunds.length < FUNDS.length) {
    toast(`⚠️ ${failedFunds.length} 支基金历史数据获取失败，其余 ${updated} 条已更新${yMsg}`, 'err');
  } else {
    toast(`❌ 全部基金历史数据获取失败！可能网络受限，请检查后重试`, 'err');
  }

  // 数据缺失警告
  if (missingRecent > 0) {
    setTimeout(() => {
      toast(`⚠️ 最近 ${missingRecent} 个交易日数据缺失，可点击「补全历史数据」重试`, 'err');
    }, 5000);
  }

  console.log(`[fetchAllHistory] 完成: 更新${updated}条, 失败${failedFunds.length}支, 最近交易日数据缺失${missingRecent}天`);

  // 历史数据拉完后，自动获取今日实时估算（由调用方控制）
  if (autoFetchToday) {
    // 确保按钮可用才触发今日获取
    setTimeout(() => {
      if (!document.getElementById('fetchTodayBtn').disabled) {
        fetchTodayData();
      }
    }, 600);
  }
}

// ============================================================
// UI 工具
// ============================================================
function updateDataHealth() {
  const cache = getCache();
  const lastTradingDay = getLastTradingDay();
  const recentDates = DATES.filter(d => normDate(d) <= normDate(lastTradingDay)).slice(-5);
  let filled = 0;
  recentDates.forEach(d => {
    let hasAny = false;
    getActiveFunds().forEach(f => {
      if (cache[cacheKey(f.code, d)] !== undefined) hasAny = true;
    });
    if (hasAny) filled++;
  });
  const healthEl = document.getElementById('dataHealth');
  if (!healthEl) return;
  if (filled === recentDates.length) {
    healthEl.textContent = `✅ 近${recentDates.length}日数据完整`;
    healthEl.style.color = 'var(--green)';
  } else {
    healthEl.textContent = `⚠️ 近${recentDates.length}日仅${filled}日有数据`;
    healthEl.style.color = '#f0883e';
  }
}

function showProg(txt, pct) {
  const el = document.getElementById('progOverlay');
  el.className = 'progress-overlay show';
  document.getElementById('progText').textContent = txt;
  document.getElementById('progBar').style.width = pct + '%';
}
function hideProg() {
  document.getElementById('progOverlay').className = 'progress-overlay';
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 4000);
}

// ============================================================
// 启动
// ============================================================

// 判断当前是否在交易时间（北京时间 工作日 9:00-15:00）
function isTradingTime() {
  const d = bjNow();
  const day = d.getUTCDay();
  if (day === 0 || day === 6) return false;
  const h = d.getUTCHours();
  const m = d.getUTCMinutes();
  const t = h * 60 + m;
  return t >= 9 * 60 && t < 15 * 60;
}

// 自动刷新定时器
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => {
    if (isTradingTime()) {
      console.log('[AutoRefresh] 交易时间自动刷新...');
      fetchTodayData();
    }
  }, 5 * 60 * 1000); // 每5分钟
}

// 获取最近一个交易日（向前查找，使用北京时间）
function getLastTradingDay() {
  const d = bjNow();
  for (let i = 0; i < 7; i++) {
    const day = d.getUTCDay();
    const iso = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      return normDate(`${d.getUTCMonth()+1}/${d.getUTCDate()}`);
    }
    d.setUTCDate(d.getUTCDate() - 1);
  }
  return todayKey();
}

async function init() {
  // 初始化统计起始日期选择器
  const dateInput = document.getElementById('statStartDate');
  if (dateInput) dateInput.value = STAT_START_ISO;

  initCache();
  buildDisplayDates();
  renderAccountBar();
  renderCards();
  renderTable();

  // 自动获取数据：增量缓存 + 并行估值
  setTimeout(async () => {
    toast('🔄 正在自动获取最新数据...', '');
    // 如果有 GitHub Token，先从云端拉取持仓数据
    if (getGhToken()) {
      try { await cloudPull(); } catch(e) { console.error('[init] cloudPull error:', e); }
    }
    try {
      await fetchAllHistory({ autoFetchToday: false });
    } catch(e) {
      console.error('[init] fetchAllHistory 出错:', e);
      toast('⚠️ 自动获取数据失败，请尝试手动点击按钮', 'err');
    }
    setTimeout(() => {
      try { fetchTodayData(); } catch(e) {
        console.error('[init] fetchTodayData 出错:', e);
      }
    }, 300);
  }, 500);

  // 启动交易时间自动刷新
  startAutoRefresh();
}

window.addEventListener('load', init);
</script>
