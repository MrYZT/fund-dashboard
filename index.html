<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>基金表现统计看板</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="基金看板">
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --red: #f85149;
  --green: #3fb950;
  --red-bg: rgba(248,81,73,0.12);
  --green-bg: rgba(63,185,80,0.12);
  --blue: #58a6ff;
  --hover: rgba(31,39,51,0.8);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
}
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 11px; color: var(--muted); }
.actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #21262d;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn:hover { border-color: var(--blue); background: rgba(88,166,255,0.08); }
.btn.primary { background: #1f6feb; border-color: #1f6feb; }
.btn.primary:hover { background: #388bfd; border-color: #388bfd; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
.dot.ok { background: var(--green); }
.dot.err { background: var(--red); }
.dot.loading { background: #f0883e; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main { padding: 14px 16px; overflow-x: auto; }
.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 14px;
  min-width: 800px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.card-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.card-val { font-size: 20px; font-weight: 700; }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ============================================================
   自定义滚动条样式 — 让横向/纵向滚动条更明显
   ============================================================ */
.table-wrap::-webkit-scrollbar,
.main::-webkit-scrollbar,
.scroll-body::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
.table-wrap::-webkit-scrollbar-track,
.main::-webkit-scrollbar-track,
.scroll-body::-webkit-scrollbar-track {
  background: rgba(88,166,255,0.06);
  border-radius: 5px;
}
.table-wrap::-webkit-scrollbar-thumb,
.main::-webkit-scrollbar-thumb,
.scroll-body::-webkit-scrollbar-thumb {
  background: rgba(88,166,255,0.35);
  border-radius: 5px;
  border: 2px solid transparent;
  background-clip: content-box;
}
.table-wrap::-webkit-scrollbar-thumb:hover,
.main::-webkit-scrollbar-thumb:hover,
.scroll-body::-webkit-scrollbar-thumb:hover {
  background: rgba(88,166,255,0.6);
  background-clip: content-box;
}
/* Firefox */
.table-wrap, .main, .scroll-body {
  scrollbar-width: thin;
  scrollbar-color: rgba(88,166,255,0.4) rgba(88,166,255,0.06);
}

.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: auto;
  max-height: calc(100vh - 260px);
}
.table-caption {
  padding: 8px 14px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: rgba(88,166,255,0.03);
  display: flex;
  align-items: center;
  gap: 8px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
}
thead th {
  background: #1c2128;
  color: var(--muted);
  font-weight: 500;
  padding: 8px 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
th.name-col {
  text-align: left;
  min-width: 120px;
  position: sticky;
  left: 0;
  z-index: 20;
  background: #1c2128;
  border-right: 1px solid var(--border);
}
th.today { background: #1a2535; color: var(--blue); }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { background: #252d3a; color: #c9d1d9; }
th.sort-asc, th.sort-desc { color: var(--blue); }
th.sort-asc::after { content: " ▲"; font-size: 9px; }
th.sort-desc::after { content: " ▼"; font-size: 9px; }
th.fixed-th { position: sticky; z-index: 11; background: #1c2128; }
th.fixed-th.name-col { z-index: 21; }
.sort-reset { cursor: pointer; font-size: 11px; color: var(--muted); margin-left: 8px; }
.sort-reset:hover { color: var(--text); }
tbody tr { border-bottom: 1px solid rgba(48,54,61,0.5); }
tbody tr:hover { background: var(--hover); }
tbody tr:last-child { border-bottom: none; }
td {
  padding: 8px 10px;
  text-align: center;
  vertical-align: middle;
}
td.name-col {
  text-align: left;
  position: sticky;
  left: 0;
  background: var(--card);
  z-index: 5;
  border-right: 1px solid var(--border);
}
tbody tr:hover td.name-col { background: rgba(22,27,34,0.95); }
.fname { font-weight: 500; }
.fcode { display: inline-block; font-size: 10px; color: var(--muted); background: #21262d; padding: 1px 5px; border-radius: 3px; margin-top: 2px; }
.tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
  vertical-align: middle;
}
.tag-blue { background: rgba(88,166,255,0.12); color: var(--blue); }
.tag-orange { background: rgba(240,136,62,0.12); color: #f0883e; }
.tag-red { background: var(--red-bg); color: var(--red); }

.pct {
  display: inline-block;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 11.5px;
  min-width: 52px;
  text-align: center;
}
.up { color: var(--red); background: var(--red-bg); }
.dn { color: var(--green); background: var(--green-bg); }
.zero { color: var(--muted); }
.na { color: var(--muted); font-style: italic; font-weight: 400; background: none; }
.total-up { color: var(--red); font-weight: 700; font-size: 13px; }
.total-dn { color: var(--green); font-weight: 700; font-size: 13px; }

/* 模型评估列样式 */
.model-good { color: var(--red); font-weight: 700; }
.model-mid  { color: #f0883e; font-weight: 600; }
.model-bad  { color: var(--green); font-weight: 600; }
th.model-col { font-size: 11px; cursor: help; }
th.model-col:hover { color: var(--blue); }
.model-wrap { display: inline-block; text-align: center; min-width: 52px; }
.model-sub { font-size: 9px; color: var(--muted); font-weight: 400; display: block; line-height: 1; margin-top: 1px; }

td.today-td { background: rgba(88,166,255,0.04); }

.bar-wrap { display: flex; align-items: center; gap: 5px; justify-content: center; }
.bar { flex: 1; max-width: 55px; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-num { font-size: 11px; color: var(--text); min-width: 26px; text-align: right; }

.amount-input {
  width: 72px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 11px;
  padding: 3px 5px;
  text-align: right;
  outline: none;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.amount-input::-webkit-inner-spin-button,
.amount-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.amount-input:focus { border-color: var(--blue); background: rgba(88,166,255,0.06); }
.amount-input::placeholder { color: var(--muted); font-size: 10px; }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12px;
  z-index: 999;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-width: 340px;
}
.toast.show { display: block; animation: toastIn 0.25s ease; }
.toast.ok { border-color: var(--green); }
.toast.err { border-color: var(--red); }
@keyframes toastIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }

.progress-overlay {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 12px;
  z-index: 998;
  display: none;
  min-width: 260px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.progress-overlay.show { display: block; }
.prog-bar-outer { background: rgba(255,255,255,0.08); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
.prog-bar-inner { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.3s; }

/* 账户切换 tab 栏 */
.account-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 8px 16px;
  background: rgba(22,27,34,0.6);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.account-tab {
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  white-space: nowrap;
}
.account-tab:hover { border-color: var(--blue); color: var(--text); }
.account-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
.account-tab.manage { border-style: dashed; color: var(--muted); }
.account-tab.manage:hover { border-color: var(--blue); color: var(--blue); }

/* 日期选择器 */
.date-picker-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
}
.date-picker-wrap input[type="date"] {
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 4px 8px;
  outline: none;
  cursor: pointer;
  color-scheme: dark;
}
.date-picker-wrap input[type="date"]:hover { border-color: var(--blue); }
.date-picker-wrap input[type="date"]:focus { border-color: var(--blue); }
.date-picker-reset {
  cursor: pointer;
  color: var(--muted);
  font-size: 11px;
  padding: 2px 4px;
  border-radius: 4px;
}
.date-picker-reset:hover { color: var(--text); }

/* 弹窗通用 */
.modal-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.55);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  width: 420px;
  max-width: 92vw;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 600; margin: 0 0 16px; color: var(--text); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* 账户金额输入行 */
.acc-amount-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0; border-bottom: 1px solid rgba(48,54,61,0.6);
}
.acc-amount-row:last-child { border-bottom: none; }
.acc-name-badge {
  display: inline-block;
  background: rgba(88,166,255,0.12);
  color: var(--blue);
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  min-width: 70px;
  text-align: center;
}
.acc-amount-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 5px 8px;
  outline: none;
  text-align: right;
}
.acc-amount-input:focus { border-color: var(--blue); }
.acc-total-hint { font-size: 11px; color: var(--muted); white-space: nowrap; }

/* ============================================================
   手机端响应式（≤767px）
   - header/账户栏 取消 sticky，随页面滚动
   - 卡片横向缩小
   - table-wrap 取消 max-height 限制，整体页面滚动
   - 仅 thead th 保留 sticky（由浏览器随表格容器滚动）
   ============================================================ */
@media (max-width: 767px) {
  /* Header 不再固定在顶部 */
  .header {
    position: static;
    flex-wrap: wrap;
    padding: 10px 12px;
    gap: 8px;
  }
  .header h1 { font-size: 15px; }
  .actions {
    width: 100%;
    flex-wrap: wrap;
    gap: 6px;
  }
  .actions .btn { font-size: 11px; padding: 5px 8px; }

  /* 账户栏不再是任何 sticky 容器 */
  .account-bar { position: static; }

  /* main 正常流，不 overflow */
  .main { padding: 8px; overflow-x: visible; }

  /* 卡片改为2列 */
  .cards {
    grid-template-columns: repeat(2, 1fr);
    min-width: unset;
  }

  /* table-wrap：移动端取消 max-height，整页自由滚动 */
  .table-wrap {
    max-height: none;
    overflow-x: auto;
    overflow-y: visible;
    border-radius: 6px;
  }

  /* thead th sticky：在整页滚动时，需要相对于视口冻结 */
  thead th {
    position: sticky;
    top: 0;
    z-index: 10;
  }
  th.name-col {
    position: sticky;
    left: 0;
    top: 0;
    z-index: 20;
  }

  /* 基金名列稍窄 */
  th.name-col, td.name-col { min-width: 140px; }

  /* 日期选择器在手机上也折行 */
  .date-picker-wrap { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 基金表现统计看板</h1>
    <div class="header-sub" id="headerSub">东方财富 · 每5分钟自动刷新</div>
  </div>
  <div class="actions">
    <div class="date-picker-wrap">
      <span>统计起始</span>
      <input type="date" id="statStartDate" value="2026-04-27" min="2026-04-27" onchange="onStatStartChange(this.value)">
      <span class="date-picker-reset" onclick="resetStatStart()" title="恢复默认4/27">↺</span>
    </div>
    <span id="updateTime" style="font-size:11px;color:var(--muted)">—</span>
    <span class="dot" id="statusDot"></span>
    <span id="dataHealth" style="font-size:10px;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
    <button class="btn" onclick="showAddFundDialog()">➕ 添加基金</button>
    <button class="btn" onclick="showRecycleBin()">🗑️ 回收站</button>
    <button class="btn" onclick="cloudPull()">☁️ 拉取</button>
    <button class="btn" onclick="cloudPush()">☁️ 推送</button>
    <span id="tokenStatus" style="font-size:10px;color:var(--muted);cursor:pointer" onclick="showCloudSettings()" title="点击配置 GitHub Token">🔑 未配置</span>
    <button class="btn" onclick="showCloudSettings()">⚙️ 云同步</button>
    <button class="btn" onclick="fetchMissingHistory()">📅 补全历史数据</button>
    <button class="btn" onclick="showHistoryReturns()">📈 历史收益</button>
    <button class="btn" onclick="showInvestAnalysis()">🧠 投资分析</button>
    <button class="btn primary" id="fetchTodayBtn" onclick="fetchTodayData()">⟳ 获取今日涨跌幅</button>
  </div>
</div>

<!-- 账户切换栏 -->
<div class="account-bar" id="accountBar"></div>

<div class="main">
  <div class="cards" id="cards"></div>
  <div class="table-wrap">
    <div class="table-caption">
      <span>📋 持仓基金列表 · 共 <b id="cnt">0</b> 支</span>
      <span id="sortInfo" style="margin-left:12px;font-size:10px;color:var(--muted)"></span>
      <span style="margin-left:auto" id="sortResetWrap" class="sort-reset" onclick="resetSort()" title="恢复默认排序">↺ 默认排序</span>
      <span style="margin-left:8px;margin-right:0">收益能力/防守能力：越高越好（满分100）</span>
    </div>
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="progress-overlay" id="progOverlay">
  <div id="progText">正在获取数据...</div>
  <div class="prog-bar-outer"><div class="prog-bar-inner" id="progBar" style="width:0%"></div></div>
</div>

<script>
// ============================================================
// 基础数据（来自Excel）
// ============================================================

// ============================================================
// 北京时间工具函数（所有日期计算统一使用，避免时区问题）
// ============================================================
function bjNow() {
  // 返回一个 Date 对象，其 UTC 表示 = 当前北京时间
  return new Date(Date.now() + 8 * 3600 * 1000);
}
function bjTodayKey() {
  // 返回今天北京时间，格式 M/DD
  const d = bjNow();
  return `${d.getUTCMonth()+1}/${String(d.getUTCDate()).padStart(2,'0')}`;
}
function bjTodayISO() {
  // 返回今天北京时间，格式 YYYY-MM-DD
  const d = bjNow();
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

// ============================================================
// 统计起始日期（可由用户通过日期选择器修改）
// 默认 2026-04-27，修改后影响 getDailyReturns/getNavSeries/DATES 切片
// ============================================================
let STAT_START_ISO = localStorage.getItem('stat_start_date') || '2026-04-27';

function isoToMD(iso) {
  // '2026-04-27' → '4/27'
  const [,mm,dd] = iso.split('-');
  return `${parseInt(mm)}/${dd}`;
}
function mdToISO(md) {
  // '4/27' → '2026-04-27'
  const [m, d] = md.split('/');
  return `2026-${String(parseInt(m)).padStart(2,'0')}-${String(parseInt(d)).padStart(2,'0')}`;
}

function onStatStartChange(val) {
  if (!val) return;
  STAT_START_ISO = val;
  localStorage.setItem('stat_start_date', val);
  // 重新计算 DATES（从新起点到今天）
  rebuildDates();
  buildDisplayDates();
  renderAll();
}

function resetStatStart() {
  STAT_START_ISO = '2026-04-27';
  localStorage.removeItem('stat_start_date');
  document.getElementById('statStartDate').value = '2026-04-27';
  rebuildDates();
  buildDisplayDates();
  renderAll();
}

// 根据 STAT_START_ISO 重新生成 DATES 数组
function rebuildDates() {
  const [sy, sm, sd] = STAT_START_ISO.split('-').map(Number);
  const start = new Date(Date.UTC(sy, sm-1, sd));
  const end = bjNow();
  const dates = [];
  const d = new Date(start);
  while (d <= end) {
    const day = d.getUTCDay();
    const iso = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      dates.push(`${d.getUTCMonth()+1}/${String(d.getUTCDate()).padStart(2,'0')}`);
    }
    d.setUTCDate(d.getUTCDate() + 1);
  }
  // 替换全局 DATES
  DATES.length = 0;
  dates.forEach(d => DATES.push(d));
}

// ============================================================
// 多账户管理系统（最多5个账户）
// 存储格式 localStorage:
//   'fund_accounts' → [{id, name}]
//   'fund_acc_amount_{accId}_{code}' → 当前持仓金额（正负均可，最终取各账户之和的正数）
// ============================================================
const MAX_ACCOUNTS = 5;
const ACCOUNTS_KEY = 'fund_accounts';
const DEFAULT_ACCOUNT = { id: 'all', name: '全部账户' }; // 虚拟"全部"账户，不可删


let currentAccountId = localStorage.getItem('current_account') || 'all'; // 当前选中账户

function getAccounts() {
  try { return JSON.parse(localStorage.getItem(ACCOUNTS_KEY) || '[]'); } catch { return []; }
}
function setAccounts(arr) { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(arr)); }

function accAmountKey(accId, code) { return `fund_acc_amount_${accId}_${code}`; }

// 读单个账户下某基金的金额（null 表示未设置）
function loadAccAmount(accId, code) {
  const v = localStorage.getItem(accAmountKey(accId, code));
  return v !== null ? parseFloat(v) : 0;
}
// 写单个账户下某基金的金额（delta=加减仓变化量，正负均可）
function saveAccAmount(accId, code, delta) {
  const current = loadAccAmount(accId, code);
  const newVal = current + delta;
  if (newVal <= 0) localStorage.removeItem(accAmountKey(accId, code));
  else localStorage.setItem(accAmountKey(accId, code), String(newVal));
}

// ============================================================
// 基金标记系统（优先考虑/考察观望/放弃/自定义）
// localStorage: 'fund_marks' → { "006533": "优先考虑", ... }
// ============================================================
const FUND_MARKS_KEY = 'fund_marks';
const MARK_PRESETS = ['优先考虑', '考察观望', '放弃'];

function getFundMarks() {
  try { return JSON.parse(localStorage.getItem(FUND_MARKS_KEY) || '{}'); } catch { return {}; }
}
function getFundMark(code) {
  return getFundMarks()[code] || '';
}
function setFundMark(code, text) {
  const marks = getFundMarks();
  if (text && text.trim()) marks[code] = text.trim();
  else delete marks[code];
  localStorage.setItem(FUND_MARKS_KEY, JSON.stringify(marks));
}

function markColor(text) {
  if (text === '优先考虑') return 'var(--red)';
  if (text === '考察观望') return 'var(--orange)';
  if (text === '放弃') return 'var(--muted)';
  return 'var(--blue)';
}
function markBg(text) {
  if (text === '优先考虑') return 'var(--red-bg)';
  if (text === '考察观望') return 'rgba(240,136,62,0.12)';
  if (text === '放弃') return 'rgba(139,148,158,0.12)';
  return 'rgba(88,166,255,0.12)';
}

function showMarkDialog(code, fundName) {
  const current = getFundMark(code);
  const presetBtns = MARK_PRESETS.map(p => {
    const active = current === p ? 'mark-active' : '';
    return `<button class="btn mark-btn ${active}" style="border-color:${current===p?markColor(p):'var(--border)'};color:${markColor(p)}" onclick="doSetMark('${code}','${p}')">${p}</button>`;
  }).join('');

  const html = `
    <div class="modal-overlay" id="markDlgOverlay" onclick="if(event.target===this)closeModal('markDlgOverlay')">
      <div class="modal-box" style="width:380px">
        <div class="modal-title">🏷️ 标记 — ${fundName.length > 14 ? fundName.substring(0,14)+'…' : fundName}</div>
        <div style="margin-bottom:10px;font-size:11px;color:var(--muted)">选择标记或自定义输入</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${presetBtns}</div>
        <div style="margin-bottom:8px;font-size:11px;color:var(--muted)">自定义：</div>
        <input type="text" id="markCustomInput" class="acc-amount-input" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px" placeholder="输入自定义标记文本" value="${current && !MARK_PRESETS.includes(current) ? current.replace(/"/g,'&quot;') : ''}">
        <div class="modal-footer">
          ${current ? `<button class="btn" style="margin-right:auto;color:var(--red)" onclick="doSetMark('${code}','')">清除标记</button>` : ''}
          <button class="btn" onclick="closeModal('markDlgOverlay')">取消</button>
          <button class="btn primary" onclick="doSetMarkCustom('${code}')">确认</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  // 回车确认
  const input = document.getElementById('markCustomInput');
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') doSetMarkCustom(code); });
}

function doSetMark(code, text) {
  setFundMark(code, text);
  closeModal('markDlgOverlay');
  renderTable();
  renderCards();
  toast(text ? `已标记为「${text}」` : '已清除标记', 'ok');
  autoCloudPush();
}

function doSetMarkCustom(code) {
  const input = document.getElementById('markCustomInput');
  const text = input ? input.value.trim() : '';
  setFundMark(code, text);
  closeModal('markDlgOverlay');
  renderTable();
  renderCards();
  toast(text ? `已标记为「${text}」` : '已清除标记', 'ok');
  autoCloudPush();
}

// 获取某基金在指定账户下的持仓（accId='all' 返回所有账户之和）
function getFundAmount(code, accId) {
  if (accId === 'all' || !accId) {
    // 所有账户之和
    const accs = getAccounts();
    let total = 0;
    accs.forEach(acc => { total += loadAccAmount(acc.id, code); });
    return total;
  }
  return loadAccAmount(accId, code);
}

// 判断某基金是否在指定账户下有持仓（用于筛选）
function isFundInAccount(code, accId) {
  if (accId === 'all' || !accId) return true;
  return loadAccAmount(accId, code) > 0;
}

// 获取当前账户下的活跃基金
function getAccountFunds() {
  const active = getActiveFunds();
  if (currentAccountId === 'all') return active;
  return active.filter(f => isFundInAccount(f.code, currentAccountId));
}

// ============================================================
// 账户栏渲染
// ============================================================
function renderAccountBar() {
  const accounts = getAccounts();
  const bar = document.getElementById('accountBar');
  if (!bar) return;
  const tabs = [
    `<button class="account-tab ${currentAccountId==='all'?'active':''}" onclick="switchAccount('all')">全部账户</button>`
  ];
  accounts.forEach(acc => {
    tabs.push(`<button class="account-tab ${currentAccountId===acc.id?'active':''}" onclick="switchAccount('${acc.id}')" title="点击切换到${acc.name}">${acc.name}</button>`);
  });
  if (accounts.length < MAX_ACCOUNTS) {
    tabs.push(`<button class="account-tab manage" onclick="showAccountManager()">＋ 新建账户</button>`);
  } else {
    tabs.push(`<button class="account-tab manage" onclick="showAccountManager()">⚙ 管理账户</button>`);
  }
  bar.innerHTML = tabs.join('');
}

function switchAccount(accId) {
  currentAccountId = accId;
  localStorage.setItem('current_account', accId);
  renderAccountBar();
  renderAll();
}

// ============================================================
// 账户管理弹窗
// ============================================================
function showAccountManager() {
  const accounts = getAccounts();
  const rows = accounts.map(acc => `
    <div class="acc-amount-row" style="gap:8px">
      <span class="acc-name-badge">${acc.name}</span>
      <span style="flex:1;font-size:11px;color:var(--muted)">账户ID: ${acc.id.substring(0,8)}...</span>
      <button class="btn" style="font-size:11px;padding:3px 8px;color:var(--red);border-color:var(--red)" onclick="deleteAccount('${acc.id}')">删除</button>
    </div>`).join('');
  const canAdd = accounts.length < MAX_ACCOUNTS;
  const html = `
    <div class="modal-overlay" id="accMgrOverlay" onclick="if(event.target===this)closeModal('accMgrOverlay')">
      <div class="modal-box">
        <div class="modal-title">⚙ 账户管理</div>
        <div style="margin-bottom:12px;font-size:12px;color:var(--muted)">最多创建 ${MAX_ACCOUNTS} 个账户，每个账户独立记录持仓</div>
        <div id="accList">${rows || '<div style="color:var(--muted);font-size:12px;padding:12px 0">暂无账户，请新建</div>'}</div>
        ${canAdd ? `<div style="margin-top:14px;display:flex;gap:8px;align-items:center">
          <input id="newAccName" type="text" placeholder="账户名称（如：招商银行）" maxlength="10"
            style="flex:1;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:12px;outline:none">
          <button class="btn primary" style="white-space:nowrap" onclick="doCreateAccount()">创建</button>
        </div>` : `<div style="margin-top:12px;font-size:11px;color:var(--muted)">已达上限（${MAX_ACCOUNTS}个），请删除一个后再创建</div>`}
        <div class="modal-footer">
          <button class="btn" onclick="closeModal('accMgrOverlay')">关闭</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function doCreateAccount() {
  const input = document.getElementById('newAccName');
  const name = input.value.trim();
  if (!name) { toast('请输入账户名称', 'err'); return; }
  const accounts = getAccounts();
  if (accounts.length >= MAX_ACCOUNTS) { toast(`最多 ${MAX_ACCOUNTS} 个账户`, 'err'); return; }
  if (accounts.some(a => a.name === name)) { toast('账户名称重复', 'err'); return; }
  const id = 'acc_' + Date.now();
  accounts.push({ id, name });
  setAccounts(accounts);
  closeModal('accMgrOverlay');
  renderAccountBar();
  toast(`✅ 账户"${name}"已创建`, 'ok');
  autoCloudPush();
}

function deleteAccount(accId) {
  if (!confirm('删除该账户后，该账户下所有持仓记录将被清除，确认？')) return;
  const accounts = getAccounts().filter(a => a.id !== accId);
  setAccounts(accounts);
  // 清理该账户的持仓数据
  const keys = Object.keys(localStorage).filter(k => k.startsWith(`fund_acc_amount_${accId}_`));
  keys.forEach(k => localStorage.removeItem(k));
  if (currentAccountId === accId) {
    currentAccountId = 'all';
    localStorage.setItem('current_account', 'all');
  }
  closeModal('accMgrOverlay');
  renderAccountBar();
  renderAll();
  toast('账户已删除', 'ok');
  autoCloudPush();}

// ============================================================
// 持仓金额弹窗（点击 input 时触发）
// 每次调整相当于"加减仓"操作
// ============================================================
function showAmountDialog(code, fundName) {
  const accounts = getAccounts();
  if (accounts.length === 0) {
    if (confirm('您尚未建立账户，是否立即创建？')) { showAccountManager(); }
    return;
  }
  const rows = accounts.map(acc => {
    const cur = loadAccAmount(acc.id, code);
    return `
      <div class="acc-amount-row">
        <span class="acc-name-badge">${acc.name}</span>
        <input type="number" class="acc-amount-input" id="delta_${acc.id}"
          placeholder="当前:${cur > 0 ? cur.toLocaleString() : '无'} 正=加仓 负=减仓"
          step="100" style="min-width:0">
        <span class="acc-total-hint" id="cur_${acc.id}">${cur > 0 ? '¥'+cur.toLocaleString() : '—'}</span>
      </div>`;
  }).join('');

  const html = `
    <div class="modal-overlay" id="amtDlgOverlay" onclick="if(event.target===this)closeModal('amtDlgOverlay')">
      <div class="modal-box">
        <div class="modal-title">💼 调整持仓 — ${fundName.length > 12 ? fundName.substring(0,12)+'…' : fundName}</div>
        <div style="margin-bottom:10px;font-size:11px;color:var(--muted)">输入加减仓金额（正数=加仓，负数=减仓），留空则不变</div>
        <div>${rows}</div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal('amtDlgOverlay')">取消</button>
          <button class="btn primary" onclick="doSaveAmounts('${code}')">确认</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function doSaveAmounts(code) {
  const accounts = getAccounts();
  let changed = false;
  accounts.forEach(acc => {
    const input = document.getElementById(`delta_${acc.id}`);
    if (!input) return;
    const val = input.value.trim();
    if (val === '' || val === '0') return;
    const delta = parseFloat(val);
    if (isNaN(delta)) return;
    saveAccAmount(acc.id, code, delta);
    changed = true;
  });
  closeModal('amtDlgOverlay');
  if (changed) {
    const fund = FUNDS.find(f => f.code === code);
    if (fund) fund.amount = getFundAmount(code, 'all');
    renderCards();
    renderTable();
    toast('✅ 持仓已更新', 'ok');
    autoCloudPush(); // 持仓变更后自动推送云端
  }
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ============================================================
// 历史收益查看功能
// 按各账户当前持仓金额，计算每个账户及全部账户的每日收益率
// 假设：当前持仓金额在过去每个交易日都持有相同金额（简化模型）
// ============================================================
function showHistoryReturns() {
  const accs = getAccounts();
  const cache = getCache();
  const dates = [...displayDates].filter(d => {
    // 只展示有数据的日期（至少一支基金有涨跌幅）
    return FUNDS.some(f => cache[cacheKey(f.code, d)] !== undefined);
  });

  if (dates.length === 0) {
    toast('⚠️ 暂无历史数据，请先获取', 'err');
    return;
  }

  // 按日期降序排列（最新在上）
  const parseMD = s => { const [m,d]=s.split('/'); return parseInt(m)*100+parseInt(d); };
  dates.sort((a,b) => parseMD(b) - parseMD(a));

  // 计算每个日期的各账户收益率
  const rows = dates.map(d => {
    const row = { date: d, accs: {}, allReturn: null, allGain: 0, allAmount: 0 };
    let totalGain = 0, totalAmount = 0;

    accs.forEach(acc => {
      let accGain = 0, accAmount = 0, accWithData = 0;
      FUNDS.forEach(f => {
        const amt = loadAccAmount(acc.id, f.code);
        if (amt <= 0) return;
        const v = cache[cacheKey(f.code, d)];
        accAmount += amt;
        if (v != null && !isNaN(v)) {
          accGain += amt * v / 100;
          accWithData++;
        }
      });
      const ret = accAmount > 0 ? (accGain / accAmount * 100) : null;
      row.accs[acc.id] = { return: ret, gain: accGain, amount: accAmount, hasData: accWithData > 0 };
      totalGain += accGain;
      totalAmount += accAmount;
    });

    row.allGain = totalGain;
    row.allAmount = totalAmount;
    row.allReturn = totalAmount > 0 ? (totalGain / totalAmount * 100) : null;
    return row;
  });

  // 计算累计收益
  let cumulativeGain = 0;
  rows.forEach(r => {
    cumulativeGain += r.allGain;
    r.cumulative = cumulativeGain;
  });

  // 构建表格 HTML
  const accCols = accs.map(acc => 
    `<th style="min-width:80px;text-align:right">${acc.name}<div style="font-size:9px;color:var(--muted);font-weight:400">收益率</div></th>`
  ).join('');
  
  const accGainCols = accs.map(acc =>
    `<th style="min-width:70px;text-align:right">${acc.name}<div style="font-size:9px;color:var(--muted);font-weight:400">收益(元)</div></th>`
  ).join('');

  const bodyRows = rows.map(r => {
    const dateLabel = fmtDate(r.date);
    const allRetCls = r.allReturn >= 0 ? 'color:var(--red)' : 'color:var(--green)';
    const allGainCls = r.allGain >= 0 ? 'color:var(--red)' : 'color:var(--green)';
    const cumCls = r.cumulative >= 0 ? 'color:var(--red)' : 'color:var(--green)';
    const allRetStr = r.allReturn !== null 
      ? `<span style="${allRetCls};font-weight:600">${r.allReturn >= 0 ? '+' : ''}${r.allReturn.toFixed(3)}%</span>` 
      : '<span style="color:var(--muted)">—</span>';
    const allGainStr = `<span style="${allGainCls}">${r.allGain >= 0 ? '+' : ''}${r.allGain.toFixed(0)}</span>`;
    const cumStr = `<span style="${cumCls}">${r.cumulative >= 0 ? '+' : ''}${r.cumulative.toFixed(0)}</span>`;

    const accCells = accs.map(acc => {
      const a = r.accs[acc.id];
      if (!a.hasData || a.return === null) 
        return `<td style="text-align:right;color:var(--muted)">—</td>`;
      const cls = a.return >= 0 ? 'color:var(--red)' : 'color:var(--green)';
      return `<td style="text-align:right;${cls}">${a.return >= 0 ? '+' : ''}${a.return.toFixed(3)}%</td>`;
    }).join('');

    const accGainCells = accs.map(acc => {
      const a = r.accs[acc.id];
      if (!a.hasData) 
        return `<td style="text-align:right;color:var(--muted)">—</td>`;
      const cls = a.gain >= 0 ? 'color:var(--red)' : 'color:var(--green)';
      return `<td style="text-align:right;${cls}">${a.gain >= 0 ? '+' : ''}${a.gain.toFixed(0)}</td>`;
    }).join('');

    return `<tr>
      <td style="font-weight:600;white-space:nowrap">${dateLabel}</td>
      <td style="text-align:right;font-weight:600">${allRetStr}</td>
      <td style="text-align:right">${allGainStr}</td>
      <td style="text-align:right">${cumStr}</td>
      ${accCells}
      ${accGainCells}
    </tr>`;
  }).join('');

  // 统计概要
  const totalCumulative = cumulativeGain;
  const avgDailyReturn = rows.length > 0 
    ? rows.reduce((s, r) => s + (r.allReturn || 0), 0) / rows.filter(r => r.allReturn !== null).length 
    : 0;
  const bestDay = rows.reduce((best, r) => 
    r.allReturn !== null && (best === null || r.allReturn > best.allReturn) ? r : best, null);
  const worstDay = rows.reduce((worst, r) => 
    r.allReturn !== null && (worst === null || r.allReturn < worst.allReturn) ? r : worst, null);

  const summaryHtml = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
      <div style="text-align:center;padding:10px;border:1px solid var(--border);border-radius:8px">
        <div style="font-size:11px;color:var(--muted)">累计收益</div>
        <div style="font-size:18px;font-weight:700;color:${totalCumulative >= 0 ? 'var(--red)' : 'var(--green)'}">${totalCumulative >= 0 ? '+' : ''}${totalCumulative.toFixed(0)} 元</div>
      </div>
      <div style="text-align:center;padding:10px;border:1px solid var(--border);border-radius:8px">
        <div style="font-size:11px;color:var(--muted)">日均收益率</div>
        <div style="font-size:18px;font-weight:700;color:${avgDailyReturn >= 0 ? 'var(--red)' : 'var(--green)'}">${avgDailyReturn >= 0 ? '+' : ''}${avgDailyReturn.toFixed(3)}%</div>
      </div>
      <div style="text-align:center;padding:10px;border:1px solid var(--border);border-radius:8px">
        <div style="font-size:11px;color:var(--muted)">最佳交易日</div>
        <div style="font-size:14px;font-weight:700;color:var(--red)">${bestDay ? '+' + bestDay.allReturn.toFixed(3) + '%' : '—'}</div>
        <div style="font-size:10px;color:var(--muted)">${bestDay ? fmtDate(bestDay.date) : ''}</div>
      </div>
      <div style="text-align:center;padding:10px;border:1px solid var(--border);border-radius:8px">
        <div style="font-size:11px;color:var(--muted)">最差交易日</div>
        <div style="font-size:14px;font-weight:700;color:var(--green)">${worstDay ? worstDay.allReturn.toFixed(3) + '%' : '—'}</div>
        <div style="font-size:10px;color:var(--muted)">${worstDay ? fmtDate(worstDay.date) : ''}</div>
      </div>
    </div>`;

  const html = `
    <div class="modal-overlay" id="historyReturnsOverlay" onclick="if(event.target===this)closeModal('historyReturnsOverlay')">
      <div class="modal-box" style="width:90vw;max-width:1200px;max-height:88vh">
        <div class="modal-title">📈 历史每日收益率（基于当前持仓金额）</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
          假设当前各账户持仓金额在过去每个交易日都保持不变，按当日实际涨跌幅计算收益率。
          <span style="color:var(--blue)">红=盈利 绿=亏损</span>
        </div>
        ${summaryHtml}
        <div class="scroll-body" style="max-height:45vh;overflow:auto;border:1px solid var(--border);border-radius:8px">
          <table style="width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap">
            <thead style="position:sticky;top:0;z-index:10">
              <tr style="background:rgba(88,166,255,0.08);border-bottom:2px solid var(--border)">
                <th style="min-width:50px;text-align:left;padding:6px 8px">日期</th>
                <th style="min-width:80px;text-align:right;padding:6px 8px">全部账户<div style="font-size:9px;color:var(--muted);font-weight:400">收益率</div></th>
                <th style="min-width:70px;text-align:right;padding:6px 8px">当日收益<div style="font-size:9px;color:var(--muted);font-weight:400">(元)</div></th>
                <th style="min-width:70px;text-align:right;padding:6px 8px">累计收益<div style="font-size:9px;color:var(--muted);font-weight:400">(元)</div></th>
                ${accCols}
                ${accGainCols}
              </tr>
            </thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn" onclick="exportHistoryCSV()">📥 导出CSV</button>
          <button class="btn primary" onclick="closeModal('historyReturnsOverlay')">关闭</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  // 存储数据供导出用
  window._historyReturnsData = { rows, accs, dates };
}

// 导出历史收益为 CSV
function exportHistoryCSV() {
  const data = window._historyReturnsData;
  if (!data) return;
  const { rows, accs } = data;
  const header = ['日期', '全部账户收益率(%)', '当日收益(元)', '累计收益(元)'];
  accs.forEach(acc => {
    header.push(`${acc.name}收益率(%)`, `${acc.name}收益(元)`);
  });
  const lines = [header.join(',')];
  rows.forEach(r => {
    const line = [fmtDate(r.date)];
    line.push(r.allReturn !== null ? r.allReturn.toFixed(4) : '');
    line.push(r.allGain.toFixed(2));
    line.push(r.cumulative.toFixed(2));
    accs.forEach(acc => {
      const a = r.accs[acc.id];
      line.push(a.return !== null ? a.return.toFixed(4) : '');
      line.push(a.gain.toFixed(2));
    });
    lines.push(line.join(','));
  });
  const csv = '\uFEFF' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `历史收益率_${bjTodayISO()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✅ CSV 已导出', 'ok');
}

// 根据指定日期生成投资分析（支持历史日期查看）
function showInvestAnalysis(targetDate) {
  const cache = getCache();
  const accs = getAccounts();
  const today = todayKey();
  // 如果没传日期，默认今天
  const selDate = targetDate || today;
  const displayFunds = getActiveFunds();

  if (displayFunds.length === 0) {
    toast('⚠️ 暂无基金数据', 'err');
    return;
  }

  // ---- 数据收集 ----
  const fundData = displayFunds.map(f => {
    const dynRet = calcRet(f);
    const ud = calcUpDownDays(f);
    const dynAvg = calcAvgDailyReturn(f);
    const totalAmount = getFundAmount(f.code, 'all');
    const todayVal = cache[cacheKey(f.code, selDate)];
    const sharpe = calcSharpe(f.code, cache);
    const maxdd = calcMaxDrawdown(f, getNavCache(), cache);
    const wr = calcWinRate(f.code, cache);
    const score = calcTotalScore(f, getNavCache(), cache).total;
    // 近5日涨跌趋势（基于选中日期往前5个交易日）
    const selIdx = DATES.indexOf(selDate);
    const recent5Dates = selIdx >= 0 ? DATES.slice(Math.max(0, selIdx - 4), selIdx + 1) : DATES.slice(-5);
    const recent5 = recent5Dates.map(d => cache[cacheKey(f.code, d)]).filter(v => v != null);
    const recent5Avg = recent5.length > 0 ? recent5.reduce((s,v) => s+v, 0) / recent5.length : null;
    // 连续亏损天数（从选中日期往前数）
    let consecLoss = 0;
    const datesBefore = DATES.filter(d => normDate(d) <= normDate(selDate)).reverse();
    for (const d of datesBefore) {
      const v = cache[cacheKey(f.code, d)];
      if (v != null) {
        if (v < 0) consecLoss++;
        else break;
      }
    }
    return {
      ...f, dynRet, totalAmount, todayVal, ud, dynAvg,
      sharpe, maxdd, wr, score, recent5Avg, consecLoss,
      hasAmount: totalAmount > 0
    };
  });

  // 各账户总持仓
  const accTotals = accs.map(acc => {
    let total = 0, todayGain = 0;
    fundData.forEach(fd => {
      const amt = loadAccAmount(acc.id, fd.code);
      if (amt > 0) {
        total += amt;
        if (fd.todayVal != null) todayGain += amt * fd.todayVal / 100;
      }
    });
    return { id: acc.id, name: acc.name, total, todayGain, todayReturn: total > 0 ? todayGain / total * 100 : 0 };
  });
  const allTotal = accTotals.reduce((s, a) => s + a.total, 0);
  const allTodayGain = accTotals.reduce((s, a) => s + a.todayGain, 0);

  // ---- 分析生成 ----
  const sections = [];

  // 1. 整体概况
  const overallTrend = allTodayGain >= 0 ? '盈利' : '亏损';
  const overallColor = allTodayGain >= 0 ? 'var(--red)' : 'var(--green)';
  sections.push({
    title: '📊 整体概况',
    items: [
      { text: `${normDate(selDate) === normDate(today) ? '今日' : fmtDate(selDate)}${overallTrend} <b style="color:${overallColor}">${allTodayGain >= 0 ? '+' : ''}${allTodayGain.toFixed(0)} 元</b>（收益率 ${allTotal > 0 ? (allTodayGain / allTotal * 100).toFixed(3) : 0}%）`, type: allTodayGain >= 0 ? 'positive' : 'negative' },
      ...accTotals.map(a => ({
        text: `${a.name}：持仓 ¥${a.total.toFixed(0)}，收益 <b style="color:${a.todayGain >= 0 ? 'var(--red)' : 'var(--green)'}">${a.todayGain >= 0 ? '+' : ''}${a.todayGain.toFixed(0)} 元</b>（${a.todayReturn.toFixed(3)}%）`,
        type: a.todayGain >= 0 ? 'positive' : 'negative'
      }))
    ]
  });

  // 2. 涨跌表现
  const withToday = fundData.filter(fd => fd.todayVal != null).sort((a,b) => b.todayVal - a.todayVal);
  const top3 = withToday.slice(0, 3);
  const bottom3 = withToday.slice(-3).reverse();
  if (top3.length > 0) {
    sections.push({
      title: '🔥 涨幅领先',
      items: top3.map(fd => ({
        text: `<b>${fd.name}</b>（${fd.code}）涨幅 <b style="color:var(--red)">+${fd.todayVal.toFixed(2)}%</b>${fd.hasAmount ? `，持仓收益约 +${(fd.totalAmount * fd.todayVal / 100).toFixed(0)} 元` : ''}`,
        type: 'positive'
      }))
    });
  }
  if (bottom3.length > 0) {
    sections.push({
      title: '⚠️ 跌幅靠前',
      items: bottom3.map(fd => ({
        text: `<b>${fd.name}</b>（${fd.code}）跌幅 <b style="color:var(--green)">${fd.todayVal.toFixed(2)}%</b>${fd.hasAmount ? `，持仓亏损约 ${(fd.totalAmount * fd.todayVal / 100).toFixed(0)} 元` : ''}`,
        type: 'negative'
      }))
    });
  }

  // 3. 持仓集中度分析
  const withAmount = fundData.filter(fd => fd.hasAmount).sort((a,b) => b.totalAmount - a.totalAmount);
  const concentrationItems = [];
  withAmount.forEach(fd => {
    const pct = allTotal > 0 ? fd.totalAmount / allTotal * 100 : 0;
    if (pct > 25) {
      concentrationItems.push({
        text: `<b>${fd.name}</b> 占比 <b style="color:#f0883e">${pct.toFixed(1)}%</b>（¥${fd.totalAmount.toFixed(0)}），持仓集中度偏高`,
        type: 'warning'
      });
    }
  });
  if (concentrationItems.length > 0) {
    sections.push({ title: '📌 持仓集中度提醒', items: concentrationItems });
  }

  // 4. 连续亏损预警
  const consecLossItems = fundData.filter(fd => fd.consecLoss >= 3 && fd.hasAmount).sort((a,b) => b.consecLoss - a.consecLoss);
  if (consecLossItems.length > 0) {
    sections.push({
      title: '🔴 连续亏损预警',
      items: consecLossItems.map(fd => ({
        text: `<b>${fd.name}</b> 连续 <b>${fd.consecLoss}</b> 日下跌，持仓 ¥${fd.totalAmount.toFixed(0)}，建议关注止损`,
        type: 'negative'
      }))
    });
  }

  // 5. 评分表现
  const scored = fundData.filter(fd => fd.score != null).sort((a,b) => b.score - a.score);
  if (scored.length > 0) {
    const excellent = scored.filter(fd => fd.score >= 70);
    const poor = scored.filter(fd => fd.score < 40);
    const scoreItems = [];
    if (excellent.length > 0) {
      scoreItems.push({
        text: `综合评分优秀（≥70）：${excellent.map(fd => `<b>${fd.name}</b>(${fd.score.toFixed(0)}分)`).join('、')}`,
        type: 'positive'
      });
    }
    if (poor.length > 0) {
      scoreItems.push({
        text: `综合评分偏低（<40）：${poor.map(fd => `<b>${fd.name}</b>(${fd.score.toFixed(0)}分)`).join('、')}${poor.some(fd => fd.hasAmount) ? '，持有这些低评分基金需谨慎' : ''}`,
        type: poor.some(fd => fd.hasAmount) ? 'warning' : 'info'
      });
    }
    // 评分说明
    scoreItems.push({
      text: `<span style="color:var(--muted);font-size:11px">评分模型v2：夏普比率25分（风险调整收益）+ 最大回撤20分（下行风险）+ 卡尔玛比率15分（收益效率）+ 修复天数20分（恢复能力）+ 胜率20分（一致性）。采用连续评分，无阶梯跳变。</span>`,
      type: 'info'
    });
    if (scoreItems.length > 1) sections.push({ title: '🏆 评分表现', items: scoreItems });
  }

  // 6. 近期趋势
  const trendingUp = fundData.filter(fd => fd.recent5Avg != null && fd.recent5Avg > 0.5 && fd.hasAmount);
  const trendingDown = fundData.filter(fd => fd.recent5Avg != null && fd.recent5Avg < -0.5 && fd.hasAmount);
  const trendItems = [];
  if (trendingUp.length > 0) {
    trendItems.push({
      text: `近5日日均涨幅 >0.5%：${trendingUp.sort((a,b)=>b.recent5Avg-a.recent5Avg).slice(0,5).map(fd => `<b>${fd.name}</b>(+${fd.recent5Avg.toFixed(2)}%/日)`).join('、')}`,
      type: 'positive'
    });
  }
  if (trendingDown.length > 0) {
    trendItems.push({
      text: `近5日日均跌幅 <-0.5%：${trendingDown.sort((a,b)=>a.recent5Avg-b.recent5Avg).slice(0,5).map(fd => `<b>${fd.name}</b>(${fd.recent5Avg.toFixed(2)}%/日)`).join('、')}`,
      type: 'negative'
    });
  }
  if (trendItems.length > 0) sections.push({ title: '📈 近5日趋势', items: trendItems });

  // 7. 综合建议
  const suggestions = [];
  // 建议分散持仓
  const maxConcentration = withAmount.length > 0 ? Math.max(...withAmount.map(fd => allTotal > 0 ? fd.totalAmount / allTotal * 100 : 0)) : 0;
  if (maxConcentration > 25) {
    suggestions.push({ text: '📌 <b>分散持仓</b>：最大单只基金占比超过25%，建议适当分散至其他优质基金以降低集中度风险', type: 'warning' });
  }
  // 建议关注止损
  if (consecLossItems.length > 0) {
    suggestions.push({ text: '🛡️ <b>关注止损</b>：有基金连续3日以上下跌，如趋势未见反转可考虑减仓止损', type: 'warning' });
  }
  // 建议关注低评分
  if (scored.filter(fd => fd.score < 40 && fd.hasAmount).length > 0) {
    suggestions.push({ text: '📉 <b>低评分基金</b>：持仓中有综合评分低于40的基金，长期持有需谨慎，可考虑替换为评分更高的同类基金', type: 'warning' });
  }
  // 积极面
  if (allTodayGain > 0) {
    suggestions.push({ text: '✅ <b>当日整体盈利</b>，继续保持当前持仓策略', type: 'positive' });
  } else if (allTodayGain < 0) {
    suggestions.push({ text: '💡 <b>当日整体亏损</b>，不必恐慌，短期波动是正常现象，关注长期趋势', type: 'info' });
  }
  // 加仓建议
  const goodButNoPosition = scored.filter(fd => fd.score >= 60 && !fd.hasAmount && fd.todayVal != null);
  if (goodButNoPosition.length > 0) {
    suggestions.push({ text: `💡 <b>可考虑加仓</b>：以下评分≥60但未持仓的基金值得关注：${goodButNoPosition.slice(0,3).map(fd => `<b>${fd.name}</b>(${fd.score.toFixed(0)}分)`).join('、')}`, type: 'info' });
  }
  if (suggestions.length > 0) sections.push({ title: '💡 综合投资建议', items: suggestions });

  // ---- 渲染 ----
  const sectionHtml = sections.map(sec => {
    const itemHtml = sec.items.map(item => {
      const bgColor = item.type === 'positive' ? 'rgba(255,100,100,0.06)'
        : item.type === 'negative' ? 'rgba(0,200,100,0.06)'
        : item.type === 'warning' ? 'rgba(240,136,62,0.08)'
        : 'rgba(88,166,255,0.06)';
      return `<div style="padding:8px 12px;border-radius:6px;background:${bgColor};margin-bottom:6px;font-size:13px;line-height:1.5">${item.text}</div>`;
    }).join('');
    return `<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--text)">${sec.title}</div>
      ${itemHtml}
    </div>`;
  }).join('');

  // 日期选择器：4/27以来所有交易日
  let dateOpts = DATES.map(d => {
    const sel = normDate(d) === normDate(selDate) ? 'selected' : '';
    return `<option value="${d}" ${sel}>${fmtDate(d)}</option>`;
  }).join('');
  // 今天不在DATES中时加入
  if (!DATES.some(d => normDate(d) === normDate(today))) {
    const sel = normDate(today) === normDate(selDate) ? 'selected' : '';
    dateOpts += `<option value="${today}" ${sel}>${fmtDate(today)}（今日）</option>`;
  }

  const html = `
    <div class="modal-overlay" id="investAnalysisOverlay" onclick="if(event.target===this)closeModal('investAnalysisOverlay')">
      <div class="modal-box" style="width:680px;max-width:92vw;max-height:88vh">
        <div class="modal-title" style="display:flex;align-items:center;gap:10px">
          🧠 投资分析
          <select id="analysisDateSelect" onchange="closeModal('investAnalysisOverlay');showInvestAnalysis(this.value)" style="font-size:13px;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);cursor:pointer">
            ${dateOpts}
          </select>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">
          基于当前持仓金额、当日涨跌幅、近期趋势和评分模型v2自动生成。<span style="color:#f0883e">仅供参考，不构成投资建议。</span>
        </div>
        <div class="scroll-body" style="max-height:65vh;overflow:auto;padding-right:4px">
          ${sectionHtml}
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn primary" onclick="closeModal('investAnalysisOverlay')">关闭</button>
        </div>
      </div>
    </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

// ============================================================
// 云同步系统（GitHub REST API）
// 将持仓金额+账户信息+统计起始日期 存为仓库的 fund-positions.json
// 用户配置 GitHub Personal Access Token 后即可跨设备同步
// ============================================================
const GH_TOKEN_KEY = 'fund_gh_token';
const GH_REPO = 'MrYZT/fund-dashboard';
const GH_FILE = 'fund-positions.json';
const GH_BRANCH = 'main';

function getGhToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }
function setGhToken(t) { localStorage.setItem(GH_TOKEN_KEY, t); }

// 导出所有持仓数据为 JSON 对象
function exportPositionsData() {
  const data = {
    version: 1,
    updatedAt: bjTodayISO() + ' ' + new Date().toLocaleTimeString(),
    accounts: getAccounts(),
    statStartDate: STAT_START_ISO,
    customFunds: JSON.parse(localStorage.getItem(CUSTOM_FUND_KEY) || '[]'),
    dividendSettledDate: getDividendSettledDate(),
    fundMarks: getFundMarks(),
    positions: {}
  };
  // 收集所有账户下所有基金的持仓金额
  const accs = getAccounts();
  const codes = FUNDS.map(f => f.code);
  accs.forEach(acc => {
    codes.forEach(code => {
      const v = loadAccAmount(acc.id, code);
      if (v > 0) {
        const key = `${acc.id}_${code}`;
        data.positions[key] = v;
      }
    });
  });
  return data;
}

// 导入持仓数据到 localStorage
function importPositionsData(data) {
  if (!data || data.version !== 1) return false;
  // 导入账户
  if (data.accounts && data.accounts.length > 0) {
    setAccounts(data.accounts);
  }
  // 导入统计起始日期
  if (data.statStartDate) {
    STAT_START_ISO = data.statStartDate;
    localStorage.setItem('stat_start_date', data.statStartDate);
    const dateInput = document.getElementById('statStartDate');
    if (dateInput) dateInput.value = data.statStartDate;
    rebuildDates();
    buildDisplayDates();
  }
  // 导入自定义基金列表
  if (data.customFunds && Array.isArray(data.customFunds)) {
    localStorage.setItem(CUSTOM_FUND_KEY, JSON.stringify(data.customFunds));
    loadCustomFunds();
  }
  // 导入分红结算日期（防止跨设备重复结算）
  if (data.dividendSettledDate) {
    setDividendSettledDate(data.dividendSettledDate);
  }
  // 导入基金标记
  if (data.fundMarks && typeof data.fundMarks === 'object') {
    localStorage.setItem(FUND_MARKS_KEY, JSON.stringify(data.fundMarks));
  }
  // 导入持仓金额
  if (data.positions) {
    // 先清除旧的持仓数据
    Object.keys(localStorage).filter(k => k.startsWith('fund_acc_amount_')).forEach(k => localStorage.removeItem(k));
    Object.entries(data.positions).forEach(([key, val]) => {
      localStorage.setItem(`fund_acc_amount_${key}`, String(val));
    });
  }
  return true;
}

  const el = document.getElementById('tokenStatus');
  if (!el) return;
  const token = getGhToken();

// 推送持仓数据到 GitHub
async function cloudPush() {
  let token = getGhToken();
  if (!token) {
    // 没 Token：弹窗输入，保存后自动继续推送
    showCloudSettings();
    window._pendingAction = 'push';
    return;
  }
  const data = exportPositionsData();
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  // 先获取文件当前 SHA（用于更新）
  const apiUrl = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
  let sha = null;
  try {
    const resp = await fetch(apiUrl, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.ok) {
      const json = await resp.json();
      sha = json.sha;
    }
  } catch(e) { /* 文件可能不存在 */ }

  const body = {
    message: `sync positions ${data.updatedAt}`,
    content: content,
    branch: GH_BRANCH
  };
  if (sha) body.sha = sha;

  try {
    const resp = await fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (resp.ok || resp.status === 201) {
      toast('☁️ 持仓数据已同步至云端', 'ok');
    } else {
      const err = await resp.json();
      toast('⚠️ 同步失败：' + (err.message || resp.status), 'err');
    }
  } catch(e) {
    toast('⚠️ 网络错误：' + e.message, 'err');
  }
}

// 从 GitHub 拉取持仓数据
async function cloudPull() {
  let token = getGhToken();
  if (!token) {
    showCloudSettings();
    window._pendingAction = 'pull';
    return;
  }
  const apiUrl = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
  try {
    const resp = await fetch(apiUrl, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) {
      toast('ℹ️ 云端尚无数据，请先推送', '');
      return;
    }
    if (!resp.ok) {
      toast('⚠️ 拉取失败：' + resp.status, 'err');
      return;
    }
    const json = await resp.json();
    const content = decodeURIComponent(escape(atob(json.content)));
    const data = JSON.parse(content);
    if (importPositionsData(data)) {
      renderAccountBar();
      renderCards();
      renderTable();
      toast('☁️ 已从云端恢复持仓数据', 'ok');
    } else {
      toast('⚠️ 云端数据格式不兼容', 'err');
    }
  } catch(e) {
    toast('⚠️ 网络错误：' + e.message, 'err');
  }
}

// 云同步设置弹窗（配置 GitHub Token）
function showCloudSettings() {
  const curToken = getGhToken();
  const masked = curToken ? curToken.substring(0, 4) + '****' + curToken.substring(curToken.length - 4) : '未设置';
  const html = `
    <div class="modal-overlay" id="cloudSettingsOverlay" onclick="if(event.target===this)closeModal('cloudSettingsOverlay')">
      <div class="modal-box" style="width:420px">

function clearGhToken() {
  localStorage.removeItem(GH_TOKEN_KEY);
  toast('Token 已清除', 'ok');
  updateTokenStatus();
  closeModal('cloudSettingsOverlay');
}

async function saveGhTokenAndTest() {
  const input = document.getElementById('ghTokenInput');
  const token = input.value.trim();
  if (!token) { toast('请输入 Token', 'err'); return; }
  // 测试 Token 是否有效
  try {
    const resp = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.ok) {
      const user = await resp.json();
      setGhToken(token);
      toast(`✅ Token 已保存（${user.login}），以后无需重复输入`, 'ok');
      updateTokenStatus();
      closeModal('cloudSettingsOverlay');
      // 如果是从 cloudPush/cloudPull 触发的，保存后自动继续执行
      const pending = window._pendingAction;
      window._pendingAction = null;
      if (pending === 'push') {
        setTimeout(() => cloudPush(), 300);
      } else if (pending === 'pull') {
        setTimeout(() => cloudPull(), 300);
      }
    } else {
      toast('⚠️ Token 无效，请检查', 'err');
    }
  } catch(e) {
    toast('⚠️ 网络错误', 'err');
  }
}

// 持仓更新后自动推送到云端（延迟5秒，避免频繁调用）
let _pushTimer = null;
function autoCloudPush() {
  if (!getGhToken()) return; // 没配 Token 则跳过
  if (_pushTimer) clearTimeout(_pushTimer);
  _pushTimer = setTimeout(() => cloudPush(), 5000);
}

// ============================================================
// 每日自动分红系统
// 每个交易日的涨跌幅收益自动滚入次日持仓（利润再投资/每日复利）
// 结算时机：init 时历史数据加载完成后自动执行
// 防重复：DIVIDEND_KEY 记录最后结算日，并随云同步跨设备共享
// ============================================================
const DIVIDEND_KEY = 'fund_dividend_settled_date';

function getDividendSettledDate() {
  return localStorage.getItem(DIVIDEND_KEY) || '';
}
function setDividendSettledDate(iso) {
  localStorage.setItem(DIVIDEND_KEY, iso);
}

// 结算单个交易日的分红：各账户各基金 持仓×涨跌幅 滚入持仓
function settleDividendForDate(md) {
  const cache = getCache();
  const accs = getAccounts();
  let dayDividend = 0;
  let fundCount = 0;

  accs.forEach(acc => {
    FUNDS.forEach(f => {
      const amount = loadAccAmount(acc.id, f.code);
      if (amount <= 0) return;
      const changePct = cache[cacheKey(f.code, md)];
      if (changePct === undefined || changePct === null || isNaN(changePct)) return;
      // 收益 = 持仓 × (涨跌幅/100)
      const dividend = amount * (changePct / 100);
      if (Math.abs(dividend) < 0.005) return; // 忽略极小变动
      saveAccAmount(acc.id, f.code, dividend);
      dayDividend += dividend;
      fundCount++;
    });
  });

  return { dividend: dayDividend, fundCount };
}

// 结算所有待结算的交易日（lastSettled之后、今天之前）
// 幂等：通过 lastSettledDate 保证不会重复结算同一天
function settlePendingDividends() {
  const lastSettledISO = getDividendSettledDate();
  const todayMD = bjTodayKey();
  const todayISO = bjTodayISO();

  // 首次启用：设为今天，不追溯历史（之前的持仓是用户手动管理的）
  if (!lastSettledISO) {
    setDividendSettledDate(todayISO);
    toast('💡 已启用每日分红功能，将从明日起自动结算当日涨跌收益并滚入持仓', '');
    return;
  }

  const cache = getCache();
  // 找出需要结算的交易日：lastSettled之后、今天之前（今天涨跌未定，不结算）
  const datesToSettle = DATES.filter(d => {
    const iso = mdToISO(d);
    if (normDate(d) === normDate(todayMD)) return false; // 跳过今天
    if (iso <= lastSettledISO) return false; // 跳过已结算
    return true;
  });

  if (datesToSettle.length === 0) return;

  let totalDividend = 0;
  let settledDates = 0;
  let settledFundCount = 0;

  datesToSettle.forEach(md => {
    // 检查该日是否有涨跌幅数据（至少一支基金有数据才结算）
    let hasData = false;
    FUNDS.forEach(f => {
      if (cache[cacheKey(f.code, md)] !== undefined) hasData = true;
    });
    if (!hasData) return; // 没数据，跳过等下次

    const result = settleDividendForDate(md);
    totalDividend += result.dividend;
    settledFundCount += result.fundCount;
    settledDates++;
    setDividendSettledDate(mdToISO(md));
  });

  if (settledDates > 0) {
    const sign = totalDividend >= 0 ? '+' : '';
    toast(`📊 已结算 ${settledDates} 个交易日分红，收益 ${sign}${totalDividend.toFixed(2)} 元（${settledFundCount}笔）`, totalDividend >= 0 ? 'ok' : 'err');
    renderCards();
    renderTable();
    autoCloudPush(); // 分红变更后推送云端
  }
}

// 工具函数（使用北京时间）
function todayKey() {
  return bjTodayKey();
}
function normDate(s) {
  if (!s) return '';
  const [m,day] = s.split('/');
  return `${parseInt(m)}/${String(parseInt(day)).padStart(2,'0')}`;
}
function fmtDate(s) {
  const [m,day] = s.split('/');
  return `${parseInt(m)}/${parseInt(day)}`;
}

// 自动生成从指定日期到今天（北京时间）的所有交易日（工作日-节假日）
function generateWorkdays(startISO) {
  const [sy, sm, sd] = (startISO || '2026-04-27').split('-').map(Number);
  const start = new Date(Date.UTC(sy, sm-1, sd));
  const end = bjNow(); // 北京时间当前
  const dates = [];
  const d = new Date(start);
  while (d <= end) {
    const day = d.getUTCDay();
    const iso = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      dates.push(`${d.getUTCMonth()+1}/${String(d.getUTCDate()).padStart(2,'0')}`);
    }
    d.setUTCDate(d.getUTCDate() + 1);
  }
  return dates;
}

  const custom = FUNDS.filter(f => !hardcodedCodes.includes(f.code)).map(f => ({
    name: f.name, code: f.code, sNav: f.sNav, buy: f.buy, def: f.def, tag: f.tag
  }));

// 从 localStorage 恢复自定义基金
function loadCustomFunds() {
  try {
    const custom = JSON.parse(localStorage.getItem(CUSTOM_FUND_KEY) || '[]');
    if (!custom.length) return;
    custom.forEach(cf => {
      if (!FUNDS.find(f => f.code === cf.code)) {
        FUNDS.push({
          seq: FUNDS.length + 1,
          name: cf.name, code: cf.code,
          buy: cf.buy || null, def: cf.def || null, tag: cf.tag || null,
          sNav: cf.sNav || 1, latestNav: null, ret: null, days: 0,
          sumR: 0, up: 0, dn: 0, avg: 0, amount: 0, dr: []
        });
      }
    });
  } catch(e) { console.error('[loadCustomFunds]', e); }
}

// ============================================================
// 旧 localStorage 持仓金额迁移（fund_amount_{code} → fund_acc_amount_{accId}_{code}）
// ============================================================
function migrateOldAmounts() {
  const defaultAccId = 'acc_1';
  // 检查是否有账户，如果没有则创建默认账户
  const accs = getAccounts();
  let targetAccId;
  if (accs.length > 0) {
    targetAccId = accs[0].id;
  } else {
    targetAccId = defaultAccId;
    setAccounts([{id: defaultAccId, name: '默认账户'}]);
  }
  // 扫描旧格式的 fund_amount_* 键
  let migrated = 0;
  Object.keys(localStorage).forEach(k => {
    if (k.startsWith('fund_amount_') && !k.startsWith('fund_acc_amount_')) {
      const code = k.replace('fund_amount_', '');
      const val = parseFloat(localStorage.getItem(k));
      if (val > 0) {
        const newKey = accAmountKey(targetAccId, code);
        if (!localStorage.getItem(newKey)) {
          localStorage.setItem(newKey, String(val));
          migrated++;
        }
      }
      localStorage.removeItem(k);
    }
  });
  if (migrated > 0) {
    console.log(`[migrateOldAmounts] 迁移了 ${migrated} 条旧持仓数据`);
  }
}

const RECYCLE_KEY = 'fund_recycle_bin';

function getHiddenCodes() {
  try { return JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]'); } catch { return []; }
}
function setHiddenCodes(arr) { localStorage.setItem(HIDDEN_KEY, JSON.stringify(arr)); }

function getActiveFunds() {
  const hidden = getHiddenCodes();
  return FUNDS.filter(f => !hidden.includes(f.code));
}

function getRecycledFunds() {
  const hidden = getHiddenCodes();
  return FUNDS.filter(f => hidden.includes(f.code));
}

function removeFund(code) {
  const hidden = getHiddenCodes();
  if (!hidden.includes(code)) {
    hidden.push(code);
    setHiddenCodes(hidden);
  }
  // 如果是自定义基金，从 localStorage 也移除
  try {
    const custom = JSON.parse(localStorage.getItem(CUSTOM_FUND_KEY) || '[]');
    const filtered = custom.filter(c => c.code !== code);
    if (filtered.length !== custom.length) {
      localStorage.setItem(CUSTOM_FUND_KEY, JSON.stringify(filtered));
    }
  } catch(e) {}
  renderAll();
}

function restoreFund(code) {
  const hidden = getHiddenCodes().filter(c => c !== code);
  setHiddenCodes(hidden);
  renderAll();
}

// 搜索基金（通过名称或代码）—— 改版：支持多结果列表选择
async function addFundBySearch(query) {
  const q = query.trim();
  if (!q) return null;
  // 先检查是否已在列表中
  const existing = FUNDS.find(f => f.code === q || f.name.includes(q));
  if (existing) {
    const hidden = getHiddenCodes();
    if (hidden.includes(existing.code)) {
      restoreFund(existing.code);
      return existing;
    }
    alert(`该基金已在看板中：${existing.name} (${existing.code})`);
    return null;
  }
  // 搜索：代码→精确匹配，名称→多结果列表
  try {
    let results;
    if (q.match(/^\d{6}$/)) {
      // 精确代码搜索
      const info = await fetchFundInfoByCodeJsonp(q);
      if (!info) {
        // jsonpgz失败时fallback到F10DataApi
        const info2 = await fetchFundInfoByF10(q);
        if (!info2) { alert('未找到该基金代码'); return null; }
        results = [info2];
      } else {
        results = [info];
      }
    } else {
      // 名称关键词搜索，返回列表供选择
      results = await fetchFundInfoByName(q);
      if (!results || results.length === 0) { alert('未找到匹配的基金'); return null; }
      if (results.length > 1) {
        // 多结果：让用户选择
        const chosen = await showSearchResultPicker(results);
        if (!chosen) return null;
        results = [chosen];
      }
    }
    const info = results[0];
    // 再次检查是否已在列表中
    if (FUNDS.find(f => f.code === info.code)) {
      alert(`该基金已在看板中`);
      return null;
    }
    const newFund = {
      seq: FUNDS.length + 1,
      name: info.name,
      code: info.code,
      buy: null, def: null, tag: null,
      sNav: info.nav || 1,
      latestNav: null, ret: null, days: 0, sumR: 0, up: 0, dn: 0, avg: 0,
      amount: 0, dr: []
    };
    FUNDS.push(newFund);
    saveCustomFunds();
    renderAll();
    // 新增基金后自动补齐该基金的历史数据（force 确保获取）
    toast(`🔄 正在获取 ${info.name} 的历史数据...`, '');
    try {
      await fetchSingleFundHistory(newFund);
      renderAll();
    } catch(e) {
      console.error('[addFundBySearch] 历史数据获取失败:', e);
      toast(`⚠️ ${info.name} 历史数据获取失败，请点击「补全历史数据」`, 'err');
    }
    return newFund;
  } catch(e) {
    console.error('[addFundBySearch]', e);
    alert('添加基金失败：' + e.message);
    return null;
  }
}

// 通过 fundgz JSONP 按代码精确查询（复用 _estCallbacks 路由机制）
function fetchFundInfoByCodeJsonp(code) {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
    const cleanup = () => { try { document.head.removeChild(script); } catch(e) {} };
    const timer = setTimeout(() => { delete _estCallbacks[code]; resolve(null); cleanup(); }, 8000);
    _estCallbacks[code] = (data) => {
      clearTimeout(timer);
      delete _estCallbacks[code];
      if (data && data.fundcode) {
        resolve({ code: data.fundcode, name: data.name, nav: parseFloat(data.dwjz) || null });
      } else {
        resolve(null);
      }
      cleanup();
    };
    script.onerror = () => { clearTimeout(timer); delete _estCallbacks[code]; resolve(null); cleanup(); };
    document.head.appendChild(script);
  });
}

// 通过东方财富基金搜索API按名称关键词搜索（返回多结果）
function fetchFundInfoByName(keyword) {
  return new Promise((resolve) => {
    const cbName = '_fundSearchCb_' + Date.now();
    window[cbName] = function(data) {
      cleanup();
      if (!data || !data.Datas || data.Datas.length === 0) { resolve([]); return; }
      const results = data.Datas.slice(0, 20).map(d => ({
        code: d.CODE || d.FundCode,
        name: d.NAME || d.ShortName,
        nav: null
      }));
      resolve(results);
    };
    const script = document.createElement('script');
    script.src = `https://fundsuggest.eastmoney.com/FundSearch/api/FundSearchAPI.ashx?m=1&key=${encodeURIComponent(keyword)}&cb=${cbName}`;
    let done = false;
    const cleanup = () => {
      done = true;
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
      delete window[cbName];
    };
    const timeout = setTimeout(() => {
      if (done) return;
      cleanup();
      resolve([]);
    }, 8000);
    script.onerror = () => {
      if (done) return;
      cleanup();
      resolve([]);
    };
    document.head.appendChild(script);
  });
}

// 通过F10DataApi按代码获取基本信息（fallback）
function fetchFundInfoByF10(code) {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    const todayISO = bjTodayISO();
    script.src = `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${code}&page=1&sdate=2026-04-27&edate=${todayISO}&per=3`;
    let done = false;
    const cleanup = () => {
      done = true;
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
      delete window.apidata;
    };
    const timeout = setTimeout(() => {
      if (done) return;
      cleanup();
      resolve(null);
    }, 8000);
    script.onload = () => {
      if (done) return;
      try {
        const raw = window.apidata;
        if (!raw || !raw.content) { cleanup(); resolve(null); return; }
        const tmp = document.createElement('div');
        tmp.innerHTML = raw.content;
        const rows = tmp.querySelectorAll('tbody tr');
        if (rows.length === 0) { cleanup(); resolve(null); return; }
        const nameMatch = raw.content.match(/<t[h][^>]*>([^<]+)/);
        const name = nameMatch ? nameMatch[1].trim() : code;
        const lastRow = rows[rows.length - 1];
        const cells = lastRow.querySelectorAll('td');
        const nav = cells.length >= 2 ? parseFloat(cells[1].textContent.trim()) : null;
        cleanup();
        resolve({ code, name, nav });
      } catch(e) { cleanup(); resolve(null); }
    };
    script.onerror = () => { if (done) return; cleanup(); resolve(null); };
    document.head.appendChild(script);
  });
}

        <div style="max-height:300px;overflow-y:auto">${listHtml}</div>

    window._pickSearchResult = (idx) => { overlay.remove(); resolve(results[idx]); };
    window._cancelSearchPicker = () => { overlay.remove(); resolve(null); };
  });
}

// ============================================================
// 缓存工具
// ============================================================
function getCache() {
  try { return JSON.parse(localStorage.getItem('fund_cache_v2') || '{}'); } catch { return {}; }
}
function setCache(c) { localStorage.setItem('fund_cache_v2', JSON.stringify(c)); }

function cacheKey(code, date) { return `${code}__${normDate(date)}`; }

// ============================================================
// 净值缓存（用于动态计算总收益率）
// key: "nav_{code}__{YYYY-MM-DD}"
// ============================================================
function navCacheKey(code, isoDate) { return `nav_${code}__${isoDate}`; }

function getNavCache() {
  try { return JSON.parse(localStorage.getItem('fund_nav_cache_v1') || '{}'); } catch { return {}; }
}
function setNavCache(c) { localStorage.setItem('fund_nav_cache_v1', JSON.stringify(c)); }

// 从净值缓存中取最新净值（取最近日期）
function getLatestNavFromCache(code) {
  const nc = getNavCache();
  // 找所有该基金的净值条目
  const prefix = `nav_${code}__`;
  const entries = Object.keys(nc)
    .filter(k => k.startsWith(prefix))
    .map(k => ({ date: k.replace(prefix, ''), nav: nc[k] }))
    .sort((a, b) => b.date.localeCompare(a.date)); // 降序
  return entries.length > 0 ? entries[0] : null;
}

// 计算总收益率：(latestNav / startNav - 1) * 100
// startNav 优先取统计起始日的净值，没有则用 sNav（4/27）
function calcRet(f) {
  const entry = getLatestNavFromCache(f.code);
  if (!entry) return null;
  const nc = getNavCache();
  const startNav = nc[navCacheKey(f.code, STAT_START_ISO)] || f.sNav;
  return (entry.nav / startNav - 1) * 100;
}

// Init cache from excel data (使用SEED_DATES对齐dr数组)
function initCache() {
  const cache = getCache();
  FUNDS.forEach(f => {
    SEED_DATES.forEach((d, i) => {
      const v = f.dr[i];
      if (v !== null && v !== undefined) {
        const k = cacheKey(f.code, d);
        if (cache[k] === undefined) cache[k] = v;
      }
    });
  });
  setCache(cache);
}

// Get value for a fund on a date
function getVal(code, date) {
  const cache = getCache();
  return cache[cacheKey(code, date)] ?? null;
}

// ============================================================
// 基金评估模型指标计算
// 每日自动更新，无需额外 API 调用
// ============================================================
const RISK_FREE = 0.015; // 无风险利率 1.5%（中国1年期国债估算）

// 获取日收益率数组（小数形式）
function getDailyReturns(code, cache) {
  const fund = FUNDS.find(f => f.code === code);
  const returns = [];
  DATES.forEach((d) => {
    let v = cache ? cache[cacheKey(code, d)] : getVal(code, d);
    if (v === null && fund) {
      const seedIdx = SEED_DATE_MAP[normDate(d)];
      if (seedIdx !== undefined) v = fund.dr[seedIdx];
    }
    if (v != null) returns.push(v / 100);
  });
  return returns;
}

// 获取净值时间序列（从统计起点开始）
// 优先从净值缓存取，不足时从日收益率重建
function getNavSeries(f, navCache, cache) {
  const nc = navCache || getNavCache();
  const prefix = `nav_${f.code}__`;
  // 从缓存中找起点净值（统计起始日）
  const startISO = STAT_START_ISO;
  // 起点净值：如果缓存中有该日期净值则使用，否则用 sNav（原始4/27净值）
  const startNavCached = nc[navCacheKey(f.code, startISO)];
  const startNav = startNavCached || f.sNav;

  let series = Object.keys(nc)
    .filter(k => k.startsWith(prefix))
    .map(k => ({ date: k.replace(prefix, ''), nav: nc[k] }))
    .filter(e => e.date >= startISO)
    .sort((a, b) => a.date.localeCompare(b.date));
  // 确保起点
  if (series.length === 0 || series[0].date > startISO) {
    series.unshift({ date: startISO, nav: startNav });
  }
  // 净值缓存不足（<2条），从日收益率重建
  if (series.length < 2) {
    const c = cache || getCache();
    series = [{ date: startISO, nav: startNav }];
    let nav = startNav;
    DATES.forEach((d) => {
      let v = c[cacheKey(f.code, d)];
      if (v === undefined) {
        const seedIdx = SEED_DATE_MAP[normDate(d)];
        if (seedIdx !== undefined) v = f.dr[seedIdx];
      }
      if (v != null) {
        nav = nav * (1 + v / 100);
        const [m, day] = d.split('/');
        const iso = `2026-${String(parseInt(m)).padStart(2,'0')}-${String(parseInt(day)).padStart(2,'0')}`;
        series.push({ date: iso, nav: parseFloat(nav.toFixed(4)) });
      }
    });
  }
  return series;
}

// 1. 年化波动率 = stdev(daily) × √252
function calcVolatility(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length < 5) return null;
  const mean = returns.reduce((a,b)=>a+b,0) / returns.length;
  const sumSq = returns.reduce((s,r)=>s + (r-mean)*(r-mean), 0);
  const stdev = Math.sqrt(sumSq / (returns.length - 1));
  return stdev * Math.sqrt(252) * 100;
}

// 2. 最大回撤 = 从峰值到谷底的最大跌幅
function calcMaxDrawdown(f, navCache, cache) {
  const series = getNavSeries(f, navCache, cache);
  if (series.length < 2) return null;
  let peak = series[0].nav;
  let maxDD = 0;
  for (let i = 1; i < series.length; i++) {
    if (series[i].nav > peak) peak = series[i].nav;
    const dd = (series[i].nav - peak) / peak;
    if (dd < maxDD) maxDD = dd;
  }
  return maxDD * 100;
}

// 3. 夏普比率 = (年化收益率 - Rf) / 年化波动率
function calcSharpe(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length < 5) return null;
  let cumulative = 1;
  returns.forEach(r => cumulative *= (1 + r));
  const days = returns.length;
  const annualReturn = Math.pow(cumulative, 252 / days) - 1;
  const mean = returns.reduce((a,b)=>a+b,0) / returns.length;
  const sumSq = returns.reduce((s,r)=>s + (r-mean)*(r-mean), 0);
  const annualVol = Math.sqrt(sumSq / (returns.length - 1)) * Math.sqrt(252);
  if (annualVol === 0) return null;
  return (annualReturn - RISK_FREE) / annualVol;
}

// 4. 胜率 = 盈利天数占比
function calcWinRate(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length === 0) return null;
  const up = returns.filter(r => r > 0).length;
  return (up / returns.length) * 100;
}

// ============================================================
// 总评分模型（满分100）v2
// 五维度加权，连续评分（无阶梯跳变）
// 权重：夏普比率25% + 最大回撤20% + 卡尔玛比率15% + 修复天数20% + 胜率20%
// ============================================================

// 连续评分辅助：将值从 [lo, hi] 线性映射到 [0, maxScore]，超出范围 clamp
function _linearScore(value, lo, hi, maxScore) {
  if (value == null) return 0;
  const t = Math.max(0, Math.min(1, (value - lo) / (hi - lo)));
  return Math.round(t * maxScore * 10) / 10; // 保留1位小数
}

function calcTotalScore(f, cache, navCacheArg) {
  const nc = navCacheArg || getNavCache();
  const c  = cache || getCache();

  // 1. 夏普比率 (25分) — 范围 [-1, 3] 映射到 [0, 25]
  //    夏普<0 风险调整后亏损，0-1一般，1-2良好，>2优秀
  const sharpe = calcSharpe(f.code, c);
  const sScore = _linearScore(sharpe, -1, 3, 25);

  // 2. 最大回撤 (20分) — 越小越好，范围 [-30%, 0%] 映射到 [0, 20]
  //    0%无回撤=满分，-15%中等，>-30%极差
  const maxdd = calcMaxDrawdown(f, nc, c);
  const dScore = _linearScore(maxdd, -30, 0, 20);

  // 3. 卡尔玛比率 (15分) — 年化收益率/|最大回撤|，范围 [-1, 5] 映射到 [0, 15]
  //    <0 亏损放大，0-1一般，1-3良好，>3优秀
  const calmar = calcCalmar(f, nc, c);
  const cScore = _linearScore(calmar, -1, 5, 15);

  // 4. 修复天数 (20分) — 越短越好，反向映射 [30天, 0天] → [0, 20]
  //    0天=已恢复满分，<=7天良好，>30天或未恢复=0分
  const recovery = calcRecoveryDays(f, nc, c);
  let rScore = 0;
  if (recovery !== null) {
    if (recovery > 0) {
      // 已恢复：天数越少分越高，[30, 0] → [0, 20]
      rScore = _linearScore(-recovery, -30, 0, 20);
    } else {
      // 未恢复（负值，绝对值=距谷底天数）
      rScore = 0;
    }
  }

  // 5. 胜率 (20分) — 范围 [30%, 75%] 映射到 [0, 20]
  //    <40%很低，50%一般，>60%良好，>70%优秀
  const wr = calcWinRate(f.code, c);
  const wScore = _linearScore(wr, 30, 75, 20);

  const total = Math.round((sScore + dScore + cScore + rScore + wScore) * 10) / 10;
  return { total, sScore, dScore, cScore, rScore, wScore };
}

// 5. 修复天数 = 最大回撤后净值恢复到前高所需交易日数
// 返回 null 无数据 / 数字 已恢复 / 负数 未恢复(取绝对值=距谷底天数)

// 6. 卡尔玛比率 = 年化收益率 / |最大回撤|（越大越好）
function calcCalmar(f, navCache, cache) {
  const nc = navCache || getNavCache();
  const c  = cache || getCache();
  const maxdd = calcMaxDrawdown(f, nc, c);
  if (maxdd === null || maxdd >= 0 || maxdd === 0) return null; // 无回撤时无意义
  const returns = getDailyReturns(f.code, c);
  if (returns.length < 5) return null;
  let cumulative = 1;
  returns.forEach(r => cumulative *= (1 + r));
  const days = returns.length;
  const annualReturn = Math.pow(cumulative, 252 / days) - 1;
  return annualReturn / Math.abs(maxdd);
}

function calcRecoveryDays(f, navCache, cache) {
  const series = getNavSeries(f, navCache, cache);
  if (series.length < 3) return null;
  
  let peak = series[0].nav;
  let maxDD = 0, troughIdx = 0, peakAtTrough = series[0].nav;
  
  for (let i = 1; i < series.length; i++) {
    if (series[i].nav > peak) peak = series[i].nav;
    const dd = (series[i].nav - peak) / peak;
    if (dd < maxDD) {
      maxDD = dd;
      troughIdx = i;
      peakAtTrough = peak;
    }
  }
  
  // 已从谷底完全恢复
  for (let i = troughIdx + 1; i < series.length; i++) {
    if (series[i].nav >= peakAtTrough) {
      return i - troughIdx;
    }
  }
  
  // 尚未恢复：返回负值（绝对值=距谷底天数），方便展示时区分
  return -(series.length - 1 - troughIdx);
}
