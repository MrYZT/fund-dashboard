<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金表现统计看板</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --red: #f85149;
  --green: #3fb950;
  --red-bg: rgba(248,81,73,0.12);
  --green-bg: rgba(63,185,80,0.12);
  --blue: #58a6ff;
  --hover: rgba(31,39,51,0.8);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
}
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 11px; color: var(--muted); }
.actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #21262d;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn:hover { border-color: var(--blue); background: rgba(88,166,255,0.08); }
.btn.primary { background: #1f6feb; border-color: #1f6feb; }
.btn.primary:hover { background: #388bfd; border-color: #388bfd; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
.dot.ok { background: var(--green); }
.dot.err { background: var(--red); }
.dot.loading { background: #f0883e; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.main { padding: 14px 16px; overflow-x: auto; }
.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
  min-width: 700px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.card-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
.card-val { font-size: 20px; font-weight: 700; }
.card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

.table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: auto;
}
.table-caption {
  padding: 8px 14px;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: rgba(88,166,255,0.03);
  display: flex;
  align-items: center;
  gap: 8px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
}
thead th {
  background: #1c2128;
  color: var(--muted);
  font-weight: 500;
  padding: 8px 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
th.name-col {
  text-align: left;
  min-width: 200px;
  position: sticky;
  left: 0;
  z-index: 20;
  background: #1c2128;
  border-right: 1px solid var(--border);
}
th.today { background: #1a2535; color: var(--blue); }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { background: #252d3a; color: #c9d1d9; }
th.sort-asc, th.sort-desc { color: var(--blue); }
th.sort-asc::after { content: " ▲"; font-size: 9px; }
th.sort-desc::after { content: " ▼"; font-size: 9px; }
th.fixed-th { position: sticky; z-index: 11; background: #1c2128; }
th.fixed-th.name-col { z-index: 21; }
.sort-reset { cursor: pointer; font-size: 11px; color: var(--muted); margin-left: 8px; }
.sort-reset:hover { color: var(--text); }
tbody tr { border-bottom: 1px solid rgba(48,54,61,0.5); }
tbody tr:hover { background: var(--hover); }
tbody tr:last-child { border-bottom: none; }
td {
  padding: 8px 10px;
  text-align: center;
  vertical-align: middle;
}
td.name-col {
  text-align: left;
  position: sticky;
  left: 0;
  background: var(--card);
  z-index: 5;
  border-right: 1px solid var(--border);
}
tbody tr:hover td.name-col { background: rgba(22,27,34,0.95); }
.fname { font-weight: 500; }
.fcode { display: inline-block; font-size: 10px; color: var(--muted); background: #21262d; padding: 1px 5px; border-radius: 3px; margin-top: 2px; }
.tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
  vertical-align: middle;
}
.tag-blue { background: rgba(88,166,255,0.12); color: var(--blue); }
.tag-orange { background: rgba(240,136,62,0.12); color: #f0883e; }
.tag-red { background: var(--red-bg); color: var(--red); }

.pct {
  display: inline-block;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 11.5px;
  min-width: 52px;
  text-align: center;
}
.up { color: var(--red); background: var(--red-bg); }
.dn { color: var(--green); background: var(--green-bg); }
.zero { color: var(--muted); }
.na { color: var(--muted); font-style: italic; font-weight: 400; background: none; }
.total-up { color: var(--red); font-weight: 700; font-size: 13px; }
.total-dn { color: var(--green); font-weight: 700; font-size: 13px; }

/* 模型评估列样式 */
.model-good { color: var(--red); font-weight: 700; }
.model-mid  { color: #f0883e; font-weight: 600; }
.model-bad  { color: var(--green); font-weight: 600; }
th.model-col { font-size: 11px; cursor: help; }
th.model-col:hover { color: var(--blue); }
.model-wrap { display: inline-block; text-align: center; min-width: 52px; }
.model-sub { font-size: 9px; color: var(--muted); font-weight: 400; display: block; line-height: 1; margin-top: 1px; }

td.today-td { background: rgba(88,166,255,0.04); }

.bar-wrap { display: flex; align-items: center; gap: 5px; justify-content: center; }
.bar { flex: 1; max-width: 55px; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-num { font-size: 11px; color: var(--text); min-width: 26px; text-align: right; }

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 12px;
  z-index: 999;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-width: 340px;
}
.toast.show { display: block; animation: toastIn 0.25s ease; }
.toast.ok { border-color: var(--green); }
.toast.err { border-color: var(--red); }
@keyframes toastIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }

.progress-overlay {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #21262d;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 12px;
  z-index: 998;
  display: none;
  min-width: 260px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.progress-overlay.show { display: block; }
.prog-bar-outer { background: rgba(255,255,255,0.08); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
.prog-bar-inner { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.3s; }
</style>
</head>

    </div>
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="progress-overlay" id="progOverlay">
  <div id="progText">正在获取数据...</div>

// ============================================================
// 缓存工具
// ============================================================
function getCache() {
  try { return JSON.parse(localStorage.getItem('fund_cache_v2') || '{}'); } catch { return {}; }
}
function setCache(c) { localStorage.setItem('fund_cache_v2', JSON.stringify(c)); }

function cacheKey(code, date) { return `${code}__${normDate(date)}`; }

// ============================================================
// 净值缓存（用于动态计算总收益率）
// key: "nav_{code}__{YYYY-MM-DD}"
// ============================================================
function navCacheKey(code, isoDate) { return `nav_${code}__${isoDate}`; }

function getNavCache() {
  try { return JSON.parse(localStorage.getItem('fund_nav_cache_v1') || '{}'); } catch { return {}; }
}
function setNavCache(c) { localStorage.setItem('fund_nav_cache_v1', JSON.stringify(c)); }

// 从净值缓存中取最新净值（取最近日期）
function getLatestNavFromCache(code) {
  const nc = getNavCache();
  // 找所有该基金的净值条目
  const prefix = `nav_${code}__`;
  const entries = Object.keys(nc)
    .filter(k => k.startsWith(prefix))
    .map(k => ({ date: k.replace(prefix, ''), nav: nc[k] }))
    .sort((a, b) => b.date.localeCompare(a.date)); // 降序
  return entries.length > 0 ? entries[0] : null;
}

// 计算总收益率：(latestNav / sNav - 1) * 100
function calcRet(f) {
  const entry = getLatestNavFromCache(f.code);
  if (!entry) return null;
  return (entry.nav / f.sNav - 1) * 100;
}

// Init cache from excel data (使用SEED_DATES对齐dr数组)
function initCache() {
  const cache = getCache();
  FUNDS.forEach(f => {
    SEED_DATES.forEach((d, i) => {
      const v = f.dr[i];
      if (v !== null && v !== undefined) {
        const k = cacheKey(f.code, d);
        if (cache[k] === undefined) cache[k] = v;
      }
    });
  });
  setCache(cache);
}

// Get value for a fund on a date
function getVal(code, date) {
  const cache = getCache();
  return cache[cacheKey(code, date)] ?? null;
}

// ============================================================
// 基金评估模型指标计算
// 每日自动更新，无需额外 API 调用
// ============================================================
const RISK_FREE = 0.015; // 无风险利率 1.5%（中国1年期国债估算）

// 获取日收益率数组（小数形式）
function getDailyReturns(code, cache) {
  const fund = FUNDS.find(f => f.code === code);
  const returns = [];
  DATES.forEach((d) => {
    let v = cache ? cache[cacheKey(code, d)] : getVal(code, d);
    if (v === null && fund) {
      const seedIdx = SEED_DATE_MAP[normDate(d)];
      if (seedIdx !== undefined) v = fund.dr[seedIdx];
    }
    if (v != null) returns.push(v / 100);
  });
  return returns;
}

// 获取净值时间序列（从4/27起点开始）
// 优先从净值缓存取，不足时从日收益率重建
function getNavSeries(f, navCache, cache) {
  const nc = navCache || getNavCache();
  const prefix = `nav_${f.code}__`;
  let series = Object.keys(nc)
    .filter(k => k.startsWith(prefix))
    .map(k => ({ date: k.replace(prefix, ''), nav: nc[k] }))
    .filter(e => e.date >= '2026-04-27')
    .sort((a, b) => a.date.localeCompare(b.date));
  // 确保起点为4/27的sNav
  if (series.length === 0 || series[0].date > '2026-04-27') {
    series.unshift({ date: '2026-04-27', nav: f.sNav });
  }
  // 净值缓存不足（<2条），从日收益率重建
  if (series.length < 2) {
    const c = cache || getCache();
    series = [{ date: '2026-04-27', nav: f.sNav }];
    let nav = f.sNav;
    DATES.forEach((d) => {
      let v = c[cacheKey(f.code, d)];
      if (v === undefined) {
        const seedIdx = SEED_DATE_MAP[normDate(d)];
        if (seedIdx !== undefined) v = f.dr[seedIdx];
      }
      if (v != null) {
        nav = nav * (1 + v / 100);
        const [m, day] = d.split('/');
        const iso = `2026-${String(parseInt(m)).padStart(2,'0')}-${String(parseInt(day)).padStart(2,'0')}`;
        series.push({ date: iso, nav: parseFloat(nav.toFixed(4)) });
      }
    });
  }
  return series;
}

// 1. 年化波动率 = stdev(daily) × √252
function calcVolatility(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length < 5) return null;
  const mean = returns.reduce((a,b)=>a+b,0) / returns.length;
  const sumSq = returns.reduce((s,r)=>s + (r-mean)*(r-mean), 0);
  const stdev = Math.sqrt(sumSq / (returns.length - 1));
  return stdev * Math.sqrt(252) * 100;
}

// 2. 最大回撤 = 从峰值到谷底的最大跌幅
function calcMaxDrawdown(f, navCache, cache) {
  const series = getNavSeries(f, navCache, cache);
  if (series.length < 2) return null;
  let peak = series[0].nav;
  let maxDD = 0;
  for (let i = 1; i < series.length; i++) {
    if (series[i].nav > peak) peak = series[i].nav;
    const dd = (series[i].nav - peak) / peak;
    if (dd < maxDD) maxDD = dd;
  }
  return maxDD * 100;
}

// 3. 夏普比率 = (年化收益率 - Rf) / 年化波动率
function calcSharpe(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length < 5) return null;
  let cumulative = 1;
  returns.forEach(r => cumulative *= (1 + r));
  const days = returns.length;
  const annualReturn = Math.pow(cumulative, 252 / days) - 1;
  const mean = returns.reduce((a,b)=>a+b,0) / returns.length;
  const sumSq = returns.reduce((s,r)=>s + (r-mean)*(r-mean), 0);
  const annualVol = Math.sqrt(sumSq / (returns.length - 1)) * Math.sqrt(252);
  if (annualVol === 0) return null;
  return (annualReturn - RISK_FREE) / annualVol;
}

// 4. 胜率 = 盈利天数占比
function calcWinRate(code, cache) {
  const returns = getDailyReturns(code, cache);
  if (returns.length === 0) return null;
  const up = returns.filter(r => r > 0).length;
  return (up / returns.length) * 100;
}

// 5. 修复天数 = 最大回撤后净值恢复到前高所需交易日数
// 返回 null 无数据 / 数字 已恢复 / 负数 未恢复(取绝对值=距谷底天数)
function calcRecoveryDays(f, navCache, cache) {
  const series = getNavSeries(f, navCache, cache);
  if (series.length < 3) return null;
  
  let peak = series[0].nav;
  let maxDD = 0, troughIdx = 0, peakAtTrough = series[0].nav;
  
  for (let i = 1; i < series.length; i++) {
    if (series[i].nav > peak) peak = series[i].nav;
    const dd = (series[i].nav - peak) / peak;
    if (dd < maxDD) {
      maxDD = dd;
      troughIdx = i;
      peakAtTrough = peak;
    }
  }
  
  // 已从谷底完全恢复
  for (let i = troughIdx + 1; i < series.length; i++) {
    if (series[i].nav >= peakAtTrough) {
      return i - troughIdx;
    }
  }
  
  // 尚未恢复：返回负值（绝对值=距谷底天数），方便展示时区分
  return -(series.length - 1 - troughIdx);
}

// ============================================================
// JSONP / API (串行，避免回调函数名冲突)
// ============================================================
const _q = [];
let _qRunning = false;

// 通用 JSONP fetcher 工厂：为不同 API 创建独立的回调函数名
function makeJsonp(cbName, timeout = 6000) {
  return (url) => new Promise((res, rej) => {
    const script = document.createElement('script');
    const prev = window[cbName];
    let done = false;
    window[cbName] = (data) => {
      done = true;
      window[cbName] = prev;
      try { document.head.removeChild(script); } catch(e){}
      res(data);
    };
    script.onerror = () => {
      window[cbName] = prev;
      try { document.head.removeChild(script); } catch(e){}
      rej(new Error('JSONP error for ' + cbName));
    };
    script.src = url;
    document.head.appendChild(script);
    setTimeout(() => {
      if (!done) { window[cbName] = prev; try{document.head.removeChild(script);}catch(e){} rej(new Error('JSONP timeout for ' + cbName)); }
    }, timeout);
  });
}

// 实时估算 API（固定回调名 jsonpgz）
const jsonpFetch = makeJsonp('jsonpgz');

async function fetchEstimate(code) {
  return new Promise(r => {
    _q.push({ code, resolve: r });
    if (!_qRunning) _runQ();
  });
}
async function _runQ() {
  _qRunning = true;
  while (_q.length > 0) {
    const { code, resolve } = _q.shift();
    try {
      const url = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
      const d = await jsonpFetch(url);
      resolve(d);
    } catch(e) { resolve(null); }
    await sleep(100);
  }
  _qRunning = false;
}

async function fetchHistory(code, startDate, endDate) {
  // 通过 fund.eastmoney.com/pingzhongdata/{code}.js 获取历史净值
  // 该接口为 JS 变量赋值文件，不受 Referer 限制，可从任意域名加载
  // 串行调用，避免全局变量 Data_netWorthTrend 被并发覆盖
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?v=${Date.now()}`;
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('pingzhongdata timeout for ' + code));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      try { document.head.removeChild(script); } catch(e) {}
    }

    script.onload = () => {
      try {
        const trendData = window.Data_netWorthTrend;
        if (!trendData || !trendData.length) {
          cleanup();
          resolve(null);
          return;
        }
        const startTs = new Date(startDate + 'T00:00:00+08:00').getTime();
        const endTs = new Date(endDate + 'T00:00:00+08:00').getTime();

        const records = [];
        let prevNav = null;
        trendData.forEach(item => {
          if (item.x >= startTs && item.x <= endTs) {
            const d = new Date(item.x);
            // 东方财富时间戳是北京时间（UTC+8）零点，用UTC方法解析以保证跨时区正确
            const bjTs = item.x + 8 * 3600 * 1000;
            const dBJ = new Date(bjTs);
            const isoDate = `${dBJ.getUTCFullYear()}-${String(dBJ.getUTCMonth()+1).padStart(2,'0')}-${String(dBJ.getUTCDate()).padStart(2,'0')}`;
            const nav = item.y;
            let jzzzl = '';
            if (item.equityReturn != null && item.equityReturn !== 0) {
              jzzzl = String(item.equityReturn);
            } else if (prevNav !== null && prevNav > 0) {
              jzzzl = ((nav - prevNav) / prevNav * 100).toFixed(2);
            }
            records.push({
              FSRQ: isoDate,
              DWJZ: String(nav),
              JZZZL: jzzzl
            });
            prevNav = nav;
          } else if (item.x < startTs) {
            prevNav = nav;
          }
        });
        cleanup();
        resolve(records);
      } catch(e) {
        cleanup();
        reject(e);
      }
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('Failed to load pingzhongdata for ' + code));
    };

    document.head.appendChild(script);
  });
}

let displayDates = [];
let sortCol = 'upDays';    // 当前排序列（默认：盈利天数降序）
let sortDir = 'desc';    // 排序方向: asc / desc

// 计算某基金从4/27到当天的盈利天数/亏损天数
function calcUpDownDays(f) {
  const cache = getCache();
  const today = todayKey();
  let up = 0, dn = 0;
  DATES.forEach((d) => {
    if (normDate(d) > normDate(today)) return;
    let v = cache[cacheKey(f.code, d)];
    if (v === undefined) {
      const seedIdx = SEED_DATE_MAP[normDate(d)];
      if (seedIdx !== undefined) v = f.dr[seedIdx];
    }
    if (v == null) return;  // 跳过无数据日期
    if (v > 0) up++;
    else if (v < 0) dn++;
  });
  return { up, dn };
}

// 对基金列表排序
function getSortedFunds() {
  const list = [...FUNDS];
  const cache = getCache();
  const today = todayKey();
  
  const valFn = (f) => {
    switch (sortCol) {
      case 'seq': return f.seq;
      case 'name': return f.name;
      case 'code': return f.code;
      case 'ret': {
        const dynRet = calcRet(f);
        return dynRet !== null ? dynRet : (f.sumR || 0);
      }
      case 'sharpe': return calcSharpe(f.code, cache) ?? null;
      case 'maxdd': return calcMaxDrawdown(f, getNavCache(), cache) ?? null;
      case 'recovery': return calcRecoveryDays(f, getNavCache(), cache) ?? null;
      case 'vol': return calcVolatility(f.code, cache) ?? null;
      case 'winrate': return calcWinRate(f.code, cache) ?? null;
      case 'buy': return f.buy ?? null;
      case 'def': return f.def ?? null;
      case 'avg': return f.avg ?? null;
      case 'upDays': return calcUpDownDays(f).up;
      case 'dnDays': return calcUpDownDays(f).dn;
      default: {
        const v = cache[cacheKey(f.code, sortCol)];
        return v ?? null;
      }
    }
  };
  
  list.sort((a, b) => {
    const va = valFn(a), vb = valFn(b);
    // 处理字符串排序
    if (typeof va === 'string' && typeof vb === 'string') {
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    // 数字排序，null/undefined 排最后
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    return sortDir === 'asc' ? va - vb : vb - va;
  });
  
  return list;
}

function buildDisplayDates() {
  displayDates = [...DATES];
  const today = todayKey();
  if (!displayDates.some(d => normDate(d) === normDate(today))) {
    displayDates.push(today);
  }
  // 从缓存中找出 DATES 之外的新日期（如 5/28 历史数据已拉取），按日期排序插入
  const cache = getCache();
  const seen = new Set(displayDates.map(d => normDate(d)));
  const extraDates = [];
  FUNDS.forEach(f => {
    Object.keys(cache).forEach(k => {
      const prefix = f.code + '__';
      if (k.startsWith(prefix)) {
        const d = k.substring(prefix.length);
        const nd = normDate(d);
        if (!seen.has(nd)) {
          seen.add(nd);
          extraDates.push(d);
        }
      }
    });
  });
  // 去重排序：按 M/D 解析后排序
  const parseMD = s => { const [m,d]=s.split('/'); return parseInt(m)*100+parseInt(d); };
  extraDates.sort((a,b) => parseMD(a)-parseMD(b));
  // 插入到合适位置（today 之前，DATES 末尾之后）
  displayDates = [...DATES];
  extraDates.forEach(d => {
    if (!displayDates.some(dd => normDate(dd) === normDate(d))) {
      displayDates.push(d);
    }
  });
  if (!displayDates.some(d => normDate(d) === normDate(today))) {
    displayDates.push(today);
  }
  // 最终按日期排序
  displayDates.sort((a,b) => parseMD(a)-parseMD(b));
}

      <div class="card-label">平均总收益率</div>
      <div class="card-val" style="color:var(--red)">+${avgRet}%</div>
      <div class="card-sub">自4/27 至最新净值日</div>
    </div>
    <div class="card">
      <div class="card-label">今日行情</div>
      <div class="card-val">
        <span style="color:var(--red)">涨${up}</span>
        <span style="color:var(--muted);font-size:14px"> / </span>
        <span style="color:var(--green)">跌${dn}</span>
        <span style="color:var(--muted);font-size:14px"> / </span>
        <span style="color:var(--muted);font-size:14px">待${noData}</span>
      </div>
      <div class="card-sub">${today} 估算数据</div>
    </div>
    <div class="card">
      <div class="card-label">最强 / 最弱</div>
      <div class="card-val" style="font-size:14px">
        <span style="color:var(--red)">+${best.dynRet.toFixed(1)}%</span>
        <span style="color:var(--muted);font-size:12px"> / </span>
        <span style="color:${worst.dynRet >= 0 ? 'var(--red)' : 'var(--green)'}">+${worst.dynRet.toFixed(1)}%</span>
      </div>
      <div class="card-sub">${best.name.substring(0,5)} / ${worst.name.substring(0,5)}</div>
    </div>
  `;
}

function renderTable() {
  const today = todayKey();
  const todayN = normDate(today);
  const cache = getCache();
  
  // 构建排序态indicator的列名
  function sortCls(col) {
    if (col !== sortCol) return 'sortable';
    return `sortable sort-${sortDir}`;
  }
  
  // Header
  const fixedThs = `
    <th class="name-col fixed-th ${sortCls('name')}" onclick="setSort('name')">基金名称</th>
    <th class="${sortCls('code')}" style="min-width:64px" onclick="setSort('code')">代码</th>
    <th class="${sortCls('ret')}" style="min-width:76px" onclick="setSort('ret')">总收益率</th>
    <th class="model-col ${sortCls('sharpe')}" style="min-width:64px" onclick="setSort('sharpe')" title="(年化收益−Rf)/年化波动率，>1优秀">夏普<div class="model-sub">比率</div></th>
    <th class="model-col ${sortCls('maxdd')}" style="min-width:64px" onclick="setSort('maxdd')" title="区间最大净值回撤，越小越稳">最大<div class="model-sub">回撤</div></th>
    <th class="model-col ${sortCls('recovery')}" style="min-width:58px" onclick="setSort('recovery')" title="最大回撤后恢复到前高所需交易日数">修复<div class="model-sub">天数</div></th>
    <th class="model-col ${sortCls('vol')}" style="min-width:68px" onclick="setSort('vol')" title="日收益年化标准差，<20%稳定">年化<div class="model-sub">波动率</div></th>
    <th class="model-col ${sortCls('winrate')}" style="min-width:54px" onclick="setSort('winrate')" title="盈利天数占比，>60%优秀">胜率</th>
    <th class="${sortCls('buy')}" style="min-width:76px" onclick="setSort('buy')">收益能力</th>
    <th class="${sortCls('def')}" style="min-width:76px" onclick="setSort('def')">防守能力</th>
    <th class="${sortCls('avg')}" style="min-width:66px" onclick="setSort('avg')">平均日收益</th>
    <th class="${sortCls('upDays')}" style="min-width:62px" onclick="setSort('upDays')">盈利<span style="color:var(--red);font-size:10px">天数</span></th>
    <th class="${sortCls('dnDays')}" style="min-width:62px" onclick="setSort('dnDays')">亏损<span style="color:var(--green);font-size:10px">天数</span></th>
  `;
  const dateThs = displayDates.map(d => {
    const nd = normDate(d);
    const isToday = nd === todayN;
    return `<th class="date-col sortable${isToday?' today':''} ${sortCls(d)}" style="min-width:54px" onclick="setSort('${d}')">${fmtDate(d)}${isToday?'<br><span style="font-size:9px">今日</span>':''}</th>`;
  }).join('');
  document.getElementById('thead').innerHTML = `<tr>${fixedThs}${dateThs}</tr>`;
  
  // Rows (sorted)
  const sorted = getSortedFunds();
  const navCacheAll = getNavCache();
  const rows = sorted.map(f => {
    // 动态总收益率：优先用净值缓存计算，否则用固定sumR
    const dynRet = calcRet(f);
    const retVal = dynRet !== null ? dynRet : f.sumR;
    const retCls = retVal >= 0 ? 'total-up' : 'total-dn';
    const retSign = retVal >= 0 ? '+' : '';
    
    // 净值来源标注
    const navEntry = getLatestNavFromCache(f.code);
    const navTip = navEntry ? `title="净值日期: ${navEntry.date} | 净值: ${navEntry.nav}"` : '';
    
    // === 模型评估指标（基于缓存数据，每日自动更新） ===
    const sharpe = calcSharpe(f.code, cache);
    const maxdd = calcMaxDrawdown(f, navCacheAll, cache);
    const vol = calcVolatility(f.code, cache);
    const wr = calcWinRate(f.code, cache);
    const recovery = calcRecoveryDays(f, navCacheAll, cache);
    
    const sharpeHtml = sharpe !== null
      ? `<span class="${sharpe >= 1 ? 'model-good' : sharpe >= 0.5 ? 'model-mid' : 'model-bad'}">${sharpe.toFixed(2)}</span>`
      : '<span class="pct na">—</span>';
    const maxddHtml = maxdd !== null
      ? `<span class="${maxdd > -5 ? 'model-good' : maxdd > -15 ? 'model-mid' : 'model-bad'}">${maxdd.toFixed(2)}%</span>`
      : '<span class="pct na">—</span>';
    const recHtml = recovery !== null
      ? recovery > 0
        ? `<span class="${recovery <= 3 ? 'model-good' : recovery <= 10 ? 'model-mid' : 'model-bad'}">${recovery}天</span>`
        : `<span class="model-bad" title="尚未恢复，距谷底已${-recovery}天">未恢复</span>`
      : '<span class="pct na">—</span>';
    const volHtml = vol !== null
      ? `<span class="${vol < 20 ? 'model-good' : vol < 40 ? 'model-mid' : 'model-bad'}">${vol.toFixed(1)}%</span>`
      : '<span class="pct na">—</span>';
    const wrHtml = wr !== null
      ? `<span class="${wr >= 60 ? 'model-good' : wr >= 45 ? 'model-mid' : 'model-bad'}">${wr.toFixed(0)}%</span>`
      : '<span class="pct na">—</span>';
    
    // 盈利/亏损天数
    const ud = calcUpDownDays(f);
    const upHtml = `<span style="color:var(--red);font-weight:600">${ud.up}</span>`;
    const dnHtml = `<span style="color:var(--green);font-weight:600">${ud.dn}</span>`;
    
    const buyHtml = f.buy != null
      ? `<div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:${f.buy}%;background:${f.buy>85?'var(--red)':'var(--blue)'}"></div></div><span class="bar-num">${f.buy}</span></div>`
      : '<span style="color:var(--muted)">—</span>';
    
    const defHtml = f.def != null
      ? `<div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:${f.def}%;background:var(--green)"></div></div><span class="bar-num">${f.def}</span></div>`
      : '<span style="color:var(--muted)">—</span>';
    
    const avgHtml = f.avg != null
      ? `<span class="pct ${f.avg>0?'up':'dn'}">${f.avg>0?'+':''}${f.avg.toFixed(3)}%</span>`
      : '<span class="pct na">—</span>';
    
    const tagHtml = f.tag
      ? `<span class="tag ${f.tag==='压舱石'?'tag-blue':f.tag==='波动较大'?'tag-red':'tag-orange'}">${f.tag}</span>`
      : '';
    
    const dailyCells = displayDates.map(d => {
      const nd = normDate(d);
      const isToday = nd === normDate(today);
      const v = getVal(f.code, d);
      
      let inner;
      if (v === null) {
        inner = isToday
          ? `<span class="pct na" id="c_${f.code}">—</span>`
          : `<span class="pct na">—</span>`;
      } else {
        const cls = v > 0 ? 'up' : v < 0 ? 'dn' : 'zero';
        const sign = v > 0 ? '+' : '';
        inner = `<span class="pct ${cls}" id="c_${f.code}">${sign}${v.toFixed(2)}%</span>`;
      }
      return `<td${isToday?' class="today-td"':''}>${inner}</td>`;
    }).join('');
    
    return `<tr>
      <td class="name-col">
        <div class="fname">${f.name}${tagHtml}</div>
        <div class="fcode">${f.code}</div>
      </td>
      <td>${f.code}</td>
      <td><span class="${retCls}" id="ret_${f.code}" ${navTip}>${retSign}${retVal.toFixed(2)}%</span></td>
      <td>${sharpeHtml}</td>
      <td>${maxddHtml}</td>
      <td>${recHtml}</td>
      <td>${volHtml}</td>
      <td>${wrHtml}</td>
      <td>${buyHtml}</td>
      <td>${defHtml}</td>
      <td>${avgHtml}</td>
      <td>${upHtml}</td>
      <td>${dnHtml}</td>
      ${dailyCells}
    </tr>`;
  }).join('');
  
  document.getElementById('tbody').innerHTML = rows;
  document.getElementById('cnt').textContent = FUNDS.length;
}

// 排序切换函数
const SORT_LABELS = {
  'name': '基金名称', 'code': '代码', 'ret': '总收益率', 'sharpe': '夏普比率',
  'maxdd': '最大回撤', 'recovery': '修复天数', 'vol': '年化波动率', 'winrate': '胜率',
  'buy': '收益能力', 'def': '防守能力',
  'avg': '平均日收益', 'upDays': '盈利天数', 'dnDays': '亏损天数', 'seq': '默认'
};

function setSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  // 更新排序信息提示
  const label = SORT_LABELS[col] || col;
  document.getElementById('sortInfo').textContent = `排序: ${label} ${sortDir==='asc'?'↑':'↓'}`;
  renderTable();
  renderCards();
}

function resetSort() {
  sortCol = 'upDays';
  sortDir = 'desc';
  document.getElementById('sortInfo').textContent = '';
  renderTable();
  renderCards();
}

function updateCellUI(code, date, val) {
  const nd = normDate(date);
  const todayN = normDate(todayKey());
  if (nd !== todayN) return;  // Only update today cell in real-time
  
  const el = document.getElementById(`c_${code}`);
  if (!el) return;
  const cls = val > 0 ? 'up' : val < 0 ? 'dn' : 'zero';
  const sign = val > 0 ? '+' : '';
  el.className = `pct ${cls}`;
  el.textContent = `${sign}${val.toFixed(2)}%`;
}

// 实时更新总收益率单元格
function updateRetUI(f) {
  const el = document.getElementById(`ret_${f.code}`);
  if (!el) return;
  const dynRet = calcRet(f);
  if (dynRet === null) return;
  const cls = dynRet >= 0 ? 'total-up' : 'total-dn';
  const sign = dynRet >= 0 ? '+' : '';
  el.className = cls;
  el.textContent = `${sign}${dynRet.toFixed(2)}%`;
  
  // 更新tooltip
  const navEntry = getLatestNavFromCache(f.code);
  if (navEntry) el.title = `净值日期: ${navEntry.date} | 净值: ${navEntry.nav}`;
}

// ============================================================
// 获取操作
// ============================================================
async function fetchTodayData() {
  const btn = document.getElementById('fetchTodayBtn');
  const dot = document.getElementById('statusDot');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> 获取中...';
  dot.className = 'dot loading';
  
  const today = todayKey();
  const todayN = normDate(today);
  const cache = getCache();
  const navCache = getNavCache();
  
  // 今天ISO日期
  const now = new Date();
  const todayISO = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  
  let ok = 0, fail = 0;
  
  showProg('正在获取今日估算涨跌幅...', 0);
  
  for (let i = 0; i < FUNDS.length; i++) {
    const f = FUNDS[i];
    showProg(`正在获取 ${f.name.substring(0,8)}...`, Math.round((i/FUNDS.length)*100));
    
    try {
      const d = await fetchEstimate(f.code);
      if (d && d.gszzl !== '' && d.gszzl !== undefined) {
        const val = parseFloat(d.gszzl);
        if (!isNaN(val)) {
          cache[cacheKey(f.code, today)] = val;
          updateCellUI(f.code, today, val);
          ok++;
          
          // 同时存储估算净值用于实时总收益率计算
          if (d.gsz && parseFloat(d.gsz) > 0) {
            const estimatedNav = parseFloat(d.gsz);
            // 用特殊key标记为估算值（今日日期+"_est"）
            navCache[navCacheKey(f.code, todayISO)] = estimatedNav;
            // 实时更新总收益率单元格
            updateRetUI(f);
          }
        } else fail++;
      } else fail++;
    } catch(e) { fail++; }
  }
  
  setCache(cache);
  setNavCache(navCache);
  hideProg();
  renderCards();
  renderTable();
  
  const nowT = new Date();
  document.getElementById('updateTime').textContent = 
    `更新于 ${nowT.getHours()}:${String(nowT.getMinutes()).padStart(2,'0')}`;
  dot.className = `dot ${fail > ok ? 'err' : 'ok'}`;
  btn.disabled = false;
  btn.innerHTML = '⟳ 获取今日涨跌幅';
  
  toast(fail === 0 
    ? `✅ 已更新全部 ${ok} 支基金今日涨跌幅及收益率` 
    : `✅ 更新 ${ok} 支 | ⚠️ ${fail} 支获取失败`, 
    fail > 0 ? 'err' : 'ok');
}

async function fetchAllHistory({ autoFetchToday = true } = {}) {
  const btn = document.getElementById('fetchTodayBtn');
  const dot = document.getElementById('statusDot');
  btn.disabled = true;
  dot.className = 'dot loading';
  
  // 使用北京时间（UTC+8）计算日期，避免 toISOString() 返回 UTC 日期导致少一天
  const nowBJ = new Date(Date.now() + 8 * 3600 * 1000);
  const endDate = nowBJ.toISOString().split('T')[0];
  const sdBJ = new Date(Date.now() + 8 * 3600 * 1000); sdBJ.setDate(sdBJ.getDate() - 40);
  const startDate = sdBJ.toISOString().split('T')[0];
  
  const cache = getCache();
  const navCache = getNavCache();
  let updated = 0, yesterdayUpdated = 0;
  
  // 计算昨天日期 (M/D 格式)，用北京时间避免 UTC 偏移
  const yesterdayBJ = new Date(Date.now() + 8 * 3600 * 1000 - 86400 * 1000);
  const yesterdayKey = `${yesterdayBJ.getUTCMonth()+1}/${yesterdayBJ.getUTCDate()}`;
  
  showProg('正在补全历史净值数据...', 0);
  
  for (let i = 0; i < FUNDS.length; i++) {
    const f = FUNDS[i];
    showProg(`补全 ${f.name.substring(0,8)} 历史数据...`, Math.round((i/FUNDS.length)*100));
    
    try {
      const hist = await fetchHistory(f.code, startDate, endDate);
      if (hist) {
        hist.forEach(item => {
          const isoDate = item.FSRQ.substring(0, 10); // YYYY-MM-DD
          // 直接从字符串解析，完全避免 Date 对象时区问题
          const [yyyy, mm, dd] = isoDate.split('-');
          const dk = `${parseInt(mm)}/${dd}`; // M/DD 格式，如 6/10
          
          // 存涨跌幅（允许覆盖，确保最新数据）
          const val = parseFloat(item.JZZZL);
          if (!isNaN(val)) {
            const k = cacheKey(f.code, dk);
            const wasUndef = cache[k] === undefined;
            cache[k] = val;
            if (wasUndef) updated++;
            if (dk === yesterdayKey) yesterdayUpdated++;
          }
          
          // 存净值（总是用最新值覆盖）
          const dwjz = parseFloat(item.DWJZ);
          if (!isNaN(dwjz)) {
            navCache[navCacheKey(f.code, isoDate)] = dwjz;
          }
        });
      }
    } catch(e) { console.warn('History fetch failed for', f.code, e); }
    
    await sleep(150);
  }
  
  // 确保昨天日期在 displayDates 中
  if (!displayDates.some(d => normDate(d) === normDate(yesterdayKey))) {
    displayDates.push(yesterdayKey);
    displayDates.sort((a,b) => {
      const pa = (s => {const [m,d]=s.split('/');return parseInt(m)*100+parseInt(d);})(a);
      const pb = (s => {const [m,d]=s.split('/');return parseInt(m)*100+parseInt(d);})(b);
      return pa - pb;
    });
  }
  
  setCache(cache);
  setNavCache(navCache);
  renderCards();
  renderTable();
  hideProg();
  
  dot.className = 'dot ok';
  btn.disabled = false;
  
  const yMsg = yesterdayUpdated > 0 ? ` 含昨日 ${yesterdayKey} 共${yesterdayUpdated}条` : '';
  toast(`📅 历史数据补全完成，新增 ${updated} 条涨跌幅记录${yMsg}`, 'ok');
  
  // 历史数据拉完后，自动获取今日实时估算（由调用方控制）
  if (autoFetchToday) {
    // 确保按钮可用才触发今日获取
    setTimeout(() => {
      if (!document.getElementById('fetchTodayBtn').disabled) {
        fetchTodayData();
      }
    }, 600);
  }
}

// ============================================================
// UI 工具
// ============================================================
function showProg(txt, pct) {
  const el = document.getElementById('progOverlay');
  el.className = 'progress-overlay show';
  document.getElementById('progText').textContent = txt;
  document.getElementById('progBar').style.width = pct + '%';
}
function hideProg() {
  document.getElementById('progOverlay').className = 'progress-overlay';
}
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 4000);
}

// ============================================================
// 启动
// ============================================================

// 判断当前是否在交易时间（工作日 9:00-15:00）
function isTradingTime() {
  const now = new Date();
  const day = now.getDay();
  if (day === 0 || day === 6) return false;
  const h = now.getHours();
  const m = now.getMinutes();
  const t = h * 60 + m;
  return t >= 9 * 60 && t < 15 * 60;
}

// 自动刷新定时器
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(() => {
    if (isTradingTime()) {
      console.log('[AutoRefresh] 交易时间自动刷新...');
      fetchTodayData();
    }
  }, 5 * 60 * 1000); // 每5分钟
}

// 获取最近一个交易日（向前查找）
function getLastTradingDay() {
  const d = new Date();
  for (let i = 0; i < 7; i++) {
    const day = d.getDay();
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (day !== 0 && day !== 6 && !HOLIDAYS_2026.has(iso)) {
      return normDate(`${d.getMonth()+1}/${d.getDate()}`);
    }
    d.setDate(d.getDate() - 1);
  }
  return todayKey();
}

async function init() {
  initCache();
  buildDisplayDates();
  renderCards();
  renderTable();
  
  // 每次打开都强制拉取历史（覆盖昨天及更早缺失数据），再刷今日估值
  setTimeout(async () => {
    toast('🔄 正在自动获取最新数据...', '');
    await fetchAllHistory({ autoFetchToday: false });
    setTimeout(() => fetchTodayData(), 500);
  }, 800);
  
  // 启动交易时间自动刷新
  startAutoRefresh();
}

window.addEventListener('load', init);
